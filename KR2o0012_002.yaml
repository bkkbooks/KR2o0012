body:
  text: 兩漢筆記卷二宋錢時撰高祖帝以天下初定子幼昆弟少懲秦孤立而亡欲大封同姓以填撫天下春正月丙午分楚王信地為二國以淮東五十三縣立從兄將軍賈為荆王以薛郡東海彭城三十六縣立弟文信君交為楚王壬子以雲中鴈門代郡五十三縣立兄宜信侯喜為代王以膠東膠西臨災濟北博陽城陽郡七十三縣立微時外婦之子肥為齊王諸民能齊言者皆以與齊天子之制地方千里公侯皆方百里伯七十里子男五十里不能五十里不達於天子附於諸侯曰附庸名山大澤則不以封都城過百雉國之害也安有命之王爵連城數十南面稱孤而能遺子孫以無禍者古之封侯所以命德同姓異姓其度一也且天子守在四夷二帝三王豈皆同姓而後能填撫天下哉裂土地而大封之不擇賢愚而世襲之其不度甚矣七國之變蓋不待智者而後知也將以圖安適以速亂寵之者所以禍之歟因觀自古地大兵強而俾之世襲未有不叛者漢事可監矣而唐不悟藩鎮之禍往往反甚於漢惟我本朝置使按察或遷或易權在朝廷自先王封建之法壞而綱維防範其制莫良於此中興以來獨一蜀帥世掌兵柄而卒以稔禍可不戒哉帝悉去秦苛法為簡易群臣飲酒爭功醉或妄呼拔劍擊柱帝益厭之叔孫通説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀帝曰得無難乎叔孫通曰五帝異樂三王不同禮禮者因時世人情為之節文者也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行者為之於是叔孫通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛以得親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所起積德百年而後可興也吾不忍為公所為公去矣無汙我叔孫通笑曰若真鄙儒也不知時變遂與所徴三十人西上及左右為學者與其弟子百餘人為綿蕞野外習之月餘言於上曰可試觀矣上使行禮曰吾能為此乃使羣臣習肄七年冬十月長樂宮成諸侯羣臣皆朝賀先平明謁者治禮以次引入殿門陳東西鄉衛官俠陛下及羅立廷中皆執兵張旗幟於是皇帝傳警輦出房引諸侯王以下至吏六百石以次奉賀莫不震恐肅敬至禮畢復置法酒諸侍坐殿上皆伏抑首以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢歡譁失禮者於是帝曰吾乃今日知為皇帝之貴也乃拜叔孫通為太常賜金五百斤初秦有天下悉內六國禮儀采擇其尊君抑臣者存之及通制禮頗有所增損大抵皆襲秦故自天子稱號下至佐僚及宫室官名少所變改孔子曰克己復禮為仁又曰人而不仁如禮何魯兩生之罪叔孫通正洙泗之家法也禮云禮云玉帛云乎哉夫禮本於太一分而為天地轉而為隂陽變而為四時列而為鬼神君臣之所以義者此也父子之所以親者此也夫婦之所以親者此也長幼之所以序者此也朋友之所以信者此也人而無禮則近於禽獸綱淪法斁天地易位其禍可勝言乎先王之成憲至秦而大壞所謂尊君抑臣者不過嚴刑以繩之峻法以束之耳安有所謂禮哉至其後也亂臣賊子無父無君詐命而誅扶蘇舉兵入宮而弒胡亥此人道之深痛無禮之極禍也有王者作所宜一洗汙俗以反先王之盛尚忍踵之為故事乎高帝起自匹夫得綿蕞粳粃而行之已不翅足矣安知禮為何事惜也有魯兩生而不見於用遂使叔孫通茍襲秦舊著為定式而後來者終已不改可勝歎哉八年胸奴冒頓數苦北邊上患之問劉敬劉敬曰天下初定士卒罷於兵未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久逺子孫為臣耳然恐陛下不能為上曰奈何對曰陛下誠能以適長公主妻之厚奉遺之彼必慕以為閼氏生子必為太子陛下以嵗時漢所餘彼所鮮數問遺因使辨士風諭以禮節冒頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮者哉可無戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼知不肯貴近無益也帝曰善欲遣長公主吕后日夜泣曰妾唯太子一女奈何棄之胸奴上竟不能遣九年冬上取家人子名為長公主以妻單于使劉敬往結和親約夫所貴於中國者明王在上立德無頗政教修明綱常不紊此夷狄之所以懷服也舜曰柔逺能邇而難壬人蠻夷率服益曰罔違道以干百姓之譽罔咈百姓以從已之欲無怠無荒四夷來王豈他有所謂御戎之䇿也哉中國失所以為尊而戾戾然以強弱較勝負譬猶學士大夫不自愛重而與市井無賴角一旦之力蛇掉頭虎卷尾呀然奮矣愚嘗謂四夷交侵中國失德之明驗高祖有天下為衣冠禮樂之主不思所以懷服之道而乃忿然輕舉取辱白登知力之不可勝也而又不悟忍配子女以庶幾其不敢抗墮王綱而亂族類辱二帝三王之統開萬世無窮之祻婁敬不足道也而在廷諸臣曾無一人非之嗚呼閭閻細民不輕許嫁堂堂中國捐帝姬為羇縻夷狄之具而不知耻其後武帝結烏孫共滅胡雖岑取以大母為妻而且聽之矣可為哀痛已哉十年定陶戚姬有寵於上生趙王如意上以太子仁弱謂如意類已雖封為趙王帝留之長安上之關東戚姬常從日夜啼泣欲立其子吕后年長常留守益疏上欲廢太子而立趙王大臣爭之皆莫能得御史大夫周昌廷爭之強上問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑吕后側耳於東廂聽既罷見昌為跪謝曰微君太子幾廢時趙王年十嵗上憂萬嵗之後不全也符璽御史趙堯請為趙王置貴強相及吕后太子羣臣素所敬憚者上曰誰可者堯曰御史大夫昌其人也上乃以昌相趙而以堯代昌為御史大夫大寶曰位非一家之私物主器者長乃萬世之公論寵溺嬖妾而輕搖儲二高帝於是大繆矣且以吕后之悍黠屠韓彭如磔鼠孱然童稚豈區區之名所能尊之如意縱立必不能保其無禍於身後觀人彘可見雖幸羽翼既成太子無恙而吕后自此視諸庶孽若仇敵矣豈獨慘烈之祻發於如意戚姬而已乎使帝不溺於邪處之有道相視一體無以生吕后嫉妬之心其於庶孽將由己出惠帝雖死高帝未為無後也安忍提劉氏戮力百戰僅奪之天下而委之非類后只一子耳享國日淺又無嫡孫徘徊無聊臨朝擅命一旦忿發王諸吕黜劉氏而莫之恤高帝寵召之也嗚呼泗上亭長間關百戰而成帝業終其身師旅不解幾死矢石之下而乃湛於愛欲骨肉相仇不一再傳國命幾絶可為萬世戒矣十一年陸生時時前説稱詩書帝罵之曰乃公居馬上而得之安事詩書陸生曰居馬上得之寧可以馬上治之乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯秦始皇皆以極武而亡鄉使秦已并天下法先聖行仁義陛下安得而有之帝有慙色曰試為我著秦所以失天下吾所以得之者及古成敗之國陸生乃粗述存亡之徵凡著十二篇每奏一篇帝未嘗不稱善左右呼萬嵗號其書曰新語謂行仁義法先聖足以保天下自孟軻氏殁未聞斯語嗚呼是儒者之言也詐力之徒爭馳競逐但計事之利害不顧理之是非權謀以為賢橫逆以為強威刑以為固安知仁義之為何事也哉古先聖王所以位天地育萬物維持三綱五常於不壞者仁義而已矣易傳有云立人之道曰仁與義人道不立本心晦亡泯泯棼棼與禽獸無異弱肉強食天下壞亂如之何其可保也高祖天姿寬大儼然長民之器惜乎粗武不學而在廷又無儒者陳仁義於王前觀其聞賈之言遽有慚色新語每奏孜孜稱善是孰使之然哉即此知慚稱善之心即仁義之心賈也真能如孔孟之告齊魯如伊周之輔太甲成王乘其善端闡明仁義之旨使之一惟先聖之是法則漢其三代矣賈有是言而學不足以進此謂湯武逆取而順守是未嘗真知仁義之為仁義也嗟夫帝有疾惡見人卧禁中詔户者無得入群臣絳灌等莫敢入十餘日舞陽侯樊噲排闥直入大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙高之事乎帝笑而起顧命大臣道揚末命薨於路寢不死於婦人之手此先君所以得正其終而嗣君所以得正其始也安有卧病危疑之日拒羣臣於户外而獨與一宦者處乎後世宫門隔絶易主於內而外廷不知有不忍言者舞陽侯之慮逺矣秋七月淮南王布反汝隂侯滕公召故楚令君薛君問之令君曰是固當反滕公曰上裂地而封之疏爵而王之其反何也令君曰往年殺彭越前年殺韓信此三人者同功一體之人也自疑禍及身故反耳滕公言之上上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上計對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣上曰是計將安出對曰出下計上曰何謂廢上中計而出下計對曰布故驪山之徒也自致萬乘之主此皆為身不顧後為百姓萬世慮者也故曰出下計上曰善於是自將兵而東羣臣居守皆送至霸上留侯病自強起至曲郵見上曰楚人剽疾願上無與爭鋒因説上令大子為將軍監關中兵布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮隂彭越今皆已死餘不足畏故遂反果如薛公之言東擊荆荆王賈走死富陵盡劫其兵渡淮擊楚楚發兵與戰為三軍布破其一軍其二軍散走布遂引兵而西十二年冬十月上與布兵遇於蘄西布兵精甚上壁庸城望布軍置陳如項籍軍上惡之與布相望見遙謂布曰何苦而反布曰欲為帝耳上怒罵之遂大戰布軍敗走渡淮數止戰不利與百餘人走江南上令别將追之番陽人殺布兹鄉民田舍漢所王諸將獨張耳吳芮以疾終其餘乃無一不反者高帝末年誅戮盡矣人謂地大兵強其勢則然以此觀之雖所居有必反之勢而所王者蓋不能不反人也何則商周革命皆以方伯之尊合天下諸侯以舉事故事定而天下乂安秦雖無道不旋踵而亡然亦有國數百年而後得天下是以罷侯置守惟所欲為而莫或制之若漢高帝非有德於民非有功於世非有位於朝廷之上與羣盜起布衣五載而成帝業自古及今未嘗有也當是時嶄然出頭角者莫不皆有得鹿之志而高帝其翹楚耳是故非此曹則無與共成功非捐地而王之則必不為我用是諸人者不得為王不止為王而不反其勢亦不止師之上六有曰開國承家小人勿用小人勿用必亂邦也而况於王乎况於盜賊之雄乎後世往往以能保功臣善光武而謂帝為少恩噫帝則少恩矣變主識物人誰敢爭羣盜分贓不愜即鬭其所以得之者固不同也十一月上過魯以太牢祠孔子孔子之道如天地覆載如日月照臨萬乘之主拜跪俯伏北面而師尊之為百代衣冠禮樂之主太牢盛典在今日豈足為異然自當時言之是栖栖者顧何人哉其生也奔走齊魯宋衛之郊而道不行其歿也戰國從橫異端滋熾為儀為秦為朱為翟為申為韓為鞅為斯而道不明區區所賴以垂世詔後者在書亦且厄於坑焚湮沒而不耀而高帝則又溺冠騎項粗武不學之人耳間關百戰收天下於羣雄之手曾何有於異代之匹夫也夫莫大於天地莫重於宗廟社稷寂然未聞修舉其所經歷皆古帝王之都亦寂然不聞推崇今而過魯非有故事之可循也而太牢之祠乃汲汲乎孔子是果何所見哉異時兵將屠城聞絃誦之聲亦固有感於魯矣而乃翁馬上得之安事詩書其氣習自若也一聞陸生行仁義法先聖之説而知慙著古今得失成敗之故而稱善曾未數月而遂有此其殆深有感於秦歟孔氏家風一朝而尊超卓邁倫標示千古三復斯舉使人端拜祇贊為吾道賀也相國何以長安地狹上林中多空地棄願令民得入田母收藁為禽獸食上大怒曰相國多受賈人財物乃為請吾苑下相國廷尉械繫之自成湯咸至於帝乙成王畏相蕭相國佐帝定天下功第一入田苑地未為非也遽繫之廷尉此何禮哉後世子孫殺戮大臣如刈草菅有以啓之矣雖然畏相非嚴憚之若芒刺背上也孟子曰惟大人為能格君心之非相之足畏必大人而後可上擊布時為流矢所中行道疾甚吕后迎良醫醫入見曰疾可治上嫚之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲何益遂不使治疾孔子大聖人自謂五十而知天命高帝非真有見於是也良由天姿勇決不撓於死生之變向使知學其所進豈易量哉或曰我生不有命在天紂嘗有是言矣何如曰此則紂之所以亡也若無事修為一委諸命而可則王其疾敬德召公何以告成王吕后問曰陛下百嵗後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次上曰此後亦非乃所知也人主之職在擇相一相定而天下無餘事吕后至此一語不他及可謂切問矣數公者固高帝平日之所嘗試然劉氏社稷卒賴綘侯北軍之助以安若目擊其事而處之者抑何見之明哉或者因是遂謂高帝逆知有吕氏之禍此大不然吕氏之禍蓋惠帝既殁發於無聊之思當是時年方壯安得預料其必死而為之慮乎若周勃重厚少文天下雖有變終不肯負劉氏是則可必也故高帝之言適與事契耳吕后以悍篡國固無所逃罪而此擇相之問與帝知人之明則可為後世法矣雖然湯之崩也付太甲於伊尹武王之崩也付成王於周公二公聖人也大明斯道進嗣君於帝王之盛豈止為保家之計而已高帝擇相志在安劉此如田夫野叟辛勤致富戞戞然惟恐失之是數公者能為高帝保家於身後非望其輔嗣君為三代之規摹也嗚呼必若伊周者而後可也史臣謂帝規摹宏逺愚於此則深病其未宏逺云右高祖十二年五年始即皇帝位在位八年崩年五十三惠帝太后令永巷囚戚夫人髠鉗衣赭衣令舂遣使召趙王如意使者三反趙相周昌謂使者曰高帝屬臣趙王趙王年少竊聞太后怨戚夫人欲召趙王并誅之臣不敢遣王王且亦病不能奉詔太后怒先使人召昌昌至長安乃使人復召趙王王來未到帝知太后怒自迎趙王霸上與入宫自挾與起居飲食太后欲殺之不得間元年冬十二月帝晨出射趙王少不能蚤起太后使人持鴆飲之犂明帝還趙王已死太后遂斷戚夫人手足去眼輝耳飲瘖藥使居厠中命曰人彘居數日乃召帝觀人彘帝見問知其戚夫人乃大哭因病嵗餘不能起使人請太后曰此非人所為臣為太后子終不能治天下帝以此日飲為淫樂不聽政堯舜之道孝弟而已矣惠帝友愛出於天性全護趙王無所不盡其至真有不待勉強而後從事者如許美質得大賢為之師傅發明此心日著日察堯舜之道豈外是哉一見人彘為之大哭謂此非人所為斯亦良心之動惻怛不能自禁意則善矣惜也未嘗學問不明於義理縱母后殘酷往事無及自今以往孜孜孝道轉移感動豈無其方胡可為是欎欎自陷於非義乎儼然居憂敗度敗禮而莫之檢此不得師傅之明驗也讀太甲三書安得不為之慨歎二年秋七月蕭何薨何置田宅必居窮僻處為家不治垣屋曰後世賢師吾儉不賢毋為勢家所奪帝王盛時明良遇會不聞有此稱贊後世絶無而僅有而後書之以為美談是則可歎也雖然蕭何一掾主吏耳從高祖起豐沛為佐命元勳能斂然清儉若此無何之功居何之位承迎從諛貪濁成風黷貨而無厭廣田宅而不知止者寧不愧死於斯人矣哉以曹參為相國參代何為相舉事無所變更一遵何約束擇郡國吏木訥於文辭重厚長者即召除為丞相史吏之言文刻深欲務聲名者輒斥去之日夜飲醇酒卿大夫以下吏及賓客見參不事事來者皆欲有言參輒飲以醇酒間欲有所言復飲之醉而後去終莫得開説參子窋為中大夫帝怪相國不治事以為豈少朕與使窋歸以其私問參參怒笞窋二百曰趣入侍天下事非若所當言也至朝時帝讓參曰乃者我使諫君也參免冠謝曰陛下自察聖武孰與高帝上曰朕乃安敢望先帝又曰陛下觀臣能孰與蕭何賢上曰君似不及也參曰陛下言之是也高帝與蕭何定天下法令既明今陛下垂拱參等守職遵而勿失不亦可乎帝曰善參為相國出入三年百姓歌之曰蕭何為法較若畫一曹參代之守而勿失載其凊淨民以寧一脫暴秦水火之中出百戰干戈之後民不聊生甚矣一旦乍得休息知有生之可樂此清淨寧一所以歌也然責以相業則烏可以為是哉太宰之職古有成憲太甲成王其不敢望湯武也明矣伊尹周公亦將醇飲不事事乎况吕后殘忍於上而惠帝方失德於湎淫此正尚賴正救之時進戒荒寧之日而但日夜從事於醇酒則將焉用彼相也四年冬十月立皇后張氏后帝姊魯元公主女也太后欲為重親故以配帝人主天下之表儀禮法之所自出也安有母舅而可以妻甥乎不典甚矣婦人姑息類多愛女但欲使之綢繆於母家安知敗常亂倫之可醜也特書之為後世戒除挾書律始皇三十四年燒書陳餘謂孔鮒曰秦滅先王之籍而子為書籍之主其危哉子魚曰吾將藏之以待其求高祖五年引兵欲屠魯聞絃誦之聲則是藏書已有出者矣向使斯時即除挾書之律下詔求之則非特書藏未久不甚壞而經生學士亦未甚老也惠帝四年挾書之律雖除而求書之詔未下逮至文帝天下遂亡治尚書者獨故秦博士伏生年過九十詔太常使人受之裁二十餘篇而已他可知也武帝末年屋壁之藏始出而錯亂磨滅弗可復知者多矣可勝歎哉右惠帝在位七年崩年二十四高皇后太子即皇帝位年幼或曰太后元年欲王諸吕問王陵陵據白馬之盟力沮之問平勃平勃乃共贊之其是非固易見也然安社稷定劉氏二公者終酬其語則何如愚謹對曰欲王諸吕特其小小者耳二三大臣與太后同受高帝之天下以遺其後嗣豈太后所得私哉潛育異姓一旦奉之以為君當是時王陵陳平為左右相而周勃為太尉將相合謀扶義而起一正君而國定何不可之有少帝之立也寂然不聞一語王陵之戇獨發於欲王諸吕之日已後矣非劉氏而帝乃不可共擊乎自是以後不特諸吕日長炎炎更立常山以偽易偽倏彼倏此惟所命之羣臣頓首奉詔無不可者顧何取於社稷之臣也或者見其誅諸吕於太后既歿之後廢偽主迎代王適符初語遂謂平勃殆有定謀者平患諸吕力不能制燕居深念幾無䇿矣用陸賈計始交歡綘侯深相結豈有定謀者乎後日之事特出於天幸耳愚每觀史至文帝二年陳平薨未嘗不為之驚惋文帝二年太后崩之又二年也使平勃不幸先太后而死則天下事去矣尚復能有所為乎身為將相曽不能討賊於篡立之始而徼幸集事於竊國八年之後斷以大義將逃罪之不暇而何暇以為功也右高皇后八年崩據唐鑑則天例不宜有紀然八年之內兩立少帝皆所名惠帝子非劉氏與中宗事不同姑從史舊揭其始末而不書在位庶有警於方來兩漢筆記卷二
