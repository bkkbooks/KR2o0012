body:
  text: 兩漢筆記卷三宋錢時撰文帝元年冬十二月詔曰法者治之正也今犯法已論而使無罪之父母妻子同産坐之及為收帑朕甚不取其除收帑諸相坐律令舜罰弗及嗣文王罪人不孥而况於父母乎高祖入關約法三章餘悉去秦苛法曷為而收帑相坐復仍秦舊此蕭相國定律之罪也文帝即位而首除之知所先務矣又明年盜高廟玉環而乃不勝其怒欲致之族抑何歟三月立太子母竇氏為皇后皇后清河觀津人有弟廣國字少君幼為人所略賣傳十餘家聞竇后立乃上書自陳召見驗問得實乃厚賜田宅金錢與兄長君家於長安綘侯灌將軍等曰吾屬不死命且縣此兩人兩人所出微不可不為擇師傅賓客又復效吕氏大事也於是乃選士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人戚里之禍大抵主於驕縱而不知學寵之以富貴而不教之以禮義是猶狂藥飲人而望其勿狂無是理也綘灌斯言雖懲往事然為擇師傅賔客實處后族萬世不易之至論豈特所出之微然哉向使文帝亦以其處妻黨者處母黨則薄將軍必不以殺漢使死矣時有獻千里馬者帝曰鸞旗在前屬車在後吉行日五六十里師行三十里朕乘千里馬獨先安之於是還其獻馬與道里費而下詔曰朕不受獻也其令四方毋復來獻人主之好惡風俗之樞機也一投之入則靡然環向者皆蠧心之路矣文帝始即位而却千里馬天下聞之孰敢有不正伺吾便者哉旅獒之書曰玩人喪德玩物喪志又曰志以道寧言以道接以文帝之質美得若召太保者輔之而進於道豈易量也帝益明習國家事朝而問右丞相勃曰天下一嵗决獄幾何勃謝不知又問一嵗錢榖入幾何勃又謝不知惶愧汗出沾背上問左丞相平平曰有主者上曰主者謂誰平曰陛下即問决獄責廷尉問錢穀責治粟內史上曰茍各有主者而君所主者何事也平謝曰陛下不知其駑下使待罪宰相宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯內親附百姓使卿大夫各得任其職焉帝乃稱善右丞相大慙出而責讓陳平曰君獨不素教我對陳平笑曰若居其位不知其任耶且陛下即問長安中盜賊數君欲彊對耶於是綘侯自知其能不如平逺矣居頃之乃謝病請歸相印上許之秋八月辛未右丞相勃免左丞相平專為丞相冢宰之職以九職任萬民而生財之有源以九賦斂財賄而取財之有制以九式均節財用而用財之有度是故膳夫則㑹之庖人則㑹之酒正則㑹之大府外府職嵗職帑司裘掌皮典絲典枲莫不有㑹非冢宰乃爾屑屑不憚煩也經邦大務正在理財理財與聚斂異後世言理財者止於聚斂而論者遂以錢榖之問不至廟堂為得體是大不然用之無節取之無藝邦計日匱民力日屈則國不足以為國矣豈徒一治粟內史之守而已哉臯陶士也而相禹蘇忿生司寇也而為三公冢宰掌建邦之六典刑典其一也嵗終則受百官府之㑹三嵗則大計羣吏之治而誅賞之是固無所不當問况獄者生人之司命邦之安危係焉周公位冢宰而立政一書拳拳乎庶獄孰謂主在廷尉而宰相無與也嚴刑峻法民不堪命苛斂暴取民不聊生此正宰相非才之明驗豈固置斯人於度外而他有所謂燮理隂陽之道撫安中外之術哉文帝初政問之及此斯正因事進戒培植本根之日勃武臣相非其任也不足多罪平而有知所宜惕然反觀講求事實而乃務為捷給以自詫誕斷之大義曽不若勃謝不知之為愈也且惠帝六年平始為左丞相明年帝崩太后臨朝以阿意而右遷兩立少帝皆非劉氏諸吕用事海內大亂天妖地怪無所不有漢祚中絶整整八年平蓋無日而不居相位也太后歿而誅諸吕事殆出於天幸文帝即位平且以功不如勃遜之矣今才數月而自陳相業有如此寧不厚愧矣哉吳公薦洛陽人賈誼帝召以為博士是時賈生年二十餘帝愛其辭博一嵗中超遷至大中大夫賈生請改正朔易服色定官名興禮樂以立漢制更秦法帝謙讓未遑也顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞曽無一語及於教化豈固若是而遂足以為邦歟曰不然雍也可使南面則許之漆雕開自未能信則說之孔子斯言為顔氏子而發也使道德不足以仁民教化不足以善俗則舞韶簫奏桑林而遂謂之虞商固未可也是故非六律不能正五音而非師曠之聰亦不能用六律非規矩不能成方貟而非離婁之明公輸子之巧亦不能用規矩秦之法凶人之具也是豈可以一朝居哉賈生言之而文帝謙遜未遑何也得非即位之初務為安靜姑仍舊貫不敢變更歟抑亦道德當先教化亦皆有所未遑也至於太初始用夏正色黃數五定官協律以至宗廟朝儀無所不變而漢之治道固亦武帝耳雖改猶不改也惜哉二年上所幸慎夫人在禁中常與皇后同席坐及坐郎署袁盎引却愼夫人坐愼夫人怒不肯坐上亦怒起入禁中盎因前說曰臣聞尊卑有序則上下和今陛下既已立后愼夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以為愼夫人適所以禍之也陛下獨不見人彘乎於是上乃說召語愼夫人愼夫人賜盎金五十斤治天下莫先於刑家而刑家之道莫嚴於謹微古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章婦順故天下內和而家理也九嬪掌婦學之法以教九御皆屬於冢宰而三夫人之於后則猶三公之於王坐而論婦禮無官職豈孽妾上僣相與為淫亂者哉後世不以德選而惟愛欲之是寵瀆情踰分敗禮亂倫以至骨肉相仇身膏白刃四國交亂九廟為墟蓋不特一人彘之禍而已慎夫人與后同席禁中天子出幸上林習且為常其跡著矣袁盎諫之而帝恱之夫人又從而賞之此雖發於懼禍然不賢亦不能爾也衣不曳地雅稱弋綈刑家之道有然哉五月詔曰古之治天下朝有進善之旌誹謗之木所以通治道而來諫者也今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來逺方之賢良其除之朝廷以言為諱非宗社之福也且天下有道則庶人不議使有可議安能禁人之言雖禁亦何益哉上無諱過之名下有敢言之氣明白洞達有聞即改呼吸開利脉絡貫通天下烏有不治者秦為無道切切然畏人之議已於是嚴誹謗訞言之法而偶語者且棄市此非特其君之罪也往往姦臣誤國惟恐其過上聞是以鉗天下之口以塗一人之耳目譬猶市井小兒欲人之不見也而自掩其兩眼良可憫笑及至其後盜滿天下而二世不知兵入宫幃而二世不覺方怒責宦者曰公何不早告我宦者曰使臣早言皆已誅安得至今萬乘之貴四海之富乞為黔首而不可得矣豈特無以來逺方之賢良哉前三年冬十二月免丞相勃遣就國乙亥以太尉灌嬰為丞相禹宅百揆而征苗周公位冢宰而征淮夷古之居其任者皆大聖大賢是故畢公以司馬而為太師亦無不可也可以為文可以為武入相出將奚所擇哉漢之太尉司馬職也用為丞相猶有古人文武不分之意然而人物則大不同矣綘灌之儔拔城陷陳從高帝起草萊定天下賞之則可貴之則可使之掌兵柄則可冢宰之職豈其任也高帝垂殁謂勃可令為太尉文帝即位陳平乃以右丞相遜之嗚呼冢宰掌建邦之六典以佐王治邦國豈武夫健將賞功之具也哉平也既知宰相上佐天子如是其重大而以之遜勃何也草昧之初姑置勿論漢至文帝宜知所審矣一失於勃又再失於灌嬰踵武相承名益不正更丞相為大司徒固已舛謬其後遂位大司馬於司徒之上專揔軍國之大務而終不識冢宰之為何職矣可勝嘆哉初趙王敖獻美人於高祖得幸有娠及貫高事發美人亦坐繫河內美人母弟趙兼因辟陽侯審食其言吕后吕后妬弗肯白美人已生子恚即自殺吏奉其子詣上上悔名之曰長令吕后母之而葬其母真定后封長為淮南王淮南王蚤失母常附吕后故孝惠吕后時得無患而心怨辟陽侯以為不彊爭之於吕后使其母恨而死也及帝即位淮南王自以最親驕蹇數不奉法上常寬假之是嵗入朝從上入苑囿獵與上同車常謂上大兄王有材力能扛鼎乃往見辟陽侯自袖鐡椎椎辟陽侯令從者魏敬剄之馳走闕下肉袒謝罪帝傷其志為親故赦弗治當是時薄太后及太子諸大臣皆憚淮南王淮南王以此歸國益驕恣出入稱警蹕稱制擬於天子袁盎諌曰諸侯太驕必生患上不聽元年有司請蚤建太子上曰朕既不德縱不能博求天下賢聖有德之人而禪天下而曰豫建太子是重吾不德也又曰楚王季父也吳王兄也淮南王弟也今不選舉而曰必子人其以朕為忘賢有德者而專於子非所以憂天下也嗚呼美矣三代而下聞斯言哉六年淮南王長乃以謀叛死得非大公無我之論反有以啓凶人賊子之心乎曰雖然帝則不為無罪也感念同氣友愛不忘為之擇師傅明禮義弗納於邪可也今也驕蹇不法則寬假之讎殺辟陽則赦弗治警蹕稱制擬於天子有言者則不聽自作法令行於其國逐漢置使請自置相二千石則曲意以從至甚也擅殺不辜爵人至關內侯數上書不遜順乃始切責風諭以為警戒則既晚矣鄭莊公居共叔段於京祭仲曰無使滋蔓蔓難圗也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃忍哉斯人之言雖文帝友愛非莊公比然飬成其惡而不能裁之以義則一而已愛之者所以禍之歟張釋之為公車令太子與梁王共車入朝不下司馬門於是釋之追止太子梁王無得入殿門遂劾不下公門不敬奏之薄太后聞之帝免冠謝教兒子不謹薄太后乃使使承詔赦太子梁王然後得入紀綱者天子之紀綱也人臣為天子守紀綱而天子伸之則上下不至於陵遲而世道立矣太子梁王不下司馬門而張釋之劾不敬帝即免冠謝太后而自咎教子之不謹夫如是誰敢亂其紀綱哉因觀當時人臣大抵皆嚴於法守使人悚然有不可玩之勢皆文帝有以養成其風節也是故於袁盎之卻坐則屈宫妾以伸紀綱於釋之之劾不下司馬門則屈世子以伸紀綱於周亞夫之營細栁則屈天子之尊以伸紀綱此天下所以不亂而文帝之所以稱賢也敬表而出之為後世撓法狥情者之戒六年梁太傅賈誼上疏曰夫樹國固必相疑之勢下數被其殃上數爽其憂甚非所以安上而全下也臣竊跡前事大抵彊者先反長沙乃二萬五千戶耳功少而最完勢疏而最忠非獨性異人也亦形勢然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也則天下之大計可知也欲諸王之皆忠附則莫若令如長沙王欲臣子勿葅醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海內之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻輳並進而歸命天子割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之一寸之地一人之衆天子亡所利焉誠以定治而已如此則卧赤子天下之上而安植遺腹朝委裘而天下不亂漢懲秦孤立之敗大封同姓跨州兼郡連城數十宫室百官同制京師史氏謂矯枉過正是矣賈誼請衆建諸侯而少其力可為當時的論其言茍用安有七國之變哉主父偃竊取而行於元朔間已後矣論者未免為文帝惜之然以愚觀於事勢則蓋有說也自帝而上異姓之王相繼以反誅而同姓固未有一人叛者高后臨朝擅王諸吕漢祚中絶者八年矣微朱虛東牟與二三大臣共起而誅諸吕定劉氏則漢之為漢今何如也帝自藩邸入繼大統然已寒之灰續垂亡之脉尾大之禍未見而宗彊之助方新後雖有濟北淮南之釁而興居發於失職奪功旋即敗死厲王長者當時之論往往咎在不為置嚴傅相驕蹇弗度以至於是然亦事覺即廢徙無能為皆非由地大也賈生年少痛哭而言於帝之心宜未盡合自七國叛其禍方著天下無異姓彊大之憂而所可慮者獨在同姓惟見其害而不見其利與文帝時大不侔矣此主父偃之說所以得行歟雖然責之以先見之明以義斷恩知幾弭禍則文帝亦不為無罪也夏殷周為天子皆數十世秦為天子二世而亡人性不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮有司齊肅端冕見之南郊過闕則下過廟則趨故自為赤子而教固已行矣孩提有識三公三少明孝仁禮義以道習之遂去邪人不使見惡行於是選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子初生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也孔子曰少成若天性習慣如自然習與智長故切而不愧化與心成故中道若性夫三代之所以長久者以其輔翼太子有此具也及秦而不然使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰前車覆後車誡秦世之所以亟絶者其轍跡可見也然而不避是後車又將覆也天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積慣則左右而已夫胡粵之人生而同聲嗜欲不異及其長而成俗纍數譯而不能相通有雖死而不相為者則教習然也臣故曰選左右早諭教是急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也愚觀賈誼書至此一章未嘗不為之反覆詠歎所習邪正若縑素然投之丹則赤投之墨則黑豈不甚可畏哉聲色玩好之時少而親師傅之時多猶恐鴻鵠將至一暴而十寒况不擇師傅而日與不正人處也是故賈誼斯言可詔萬世但不知所謂正人者何人道術者何道諭教者何教耳去聖逾逺異端滋熾當時學者不入於黃老即入於申韓為申韓者道申韓為黃老者道黃老各守其說自以為是文帝賢君也誼之言猶在耳也未幾朝錯為太子舍人門大夫首請擇聖人之術以賜太子而其說乃在乎知術數錯申韓者也其以刑名之書為聖人之術固也文帝豈以錯為不正而用之錯亦豈以其學為不正而言之乎是則尤可畏也後世縉紳之論未嘗不曰人主者帝王之學非儒生章句文墨之謂是固然矣抑嘗真知帝王之學安所用其力乎曰人心惟危道心惟微惟精惟一允執厥中者舜也曰安汝止惟幾惟康者禹也曰不邇聲色不殖貨利曰懋昭大德建中于民者湯也曰於緝熙敬止曰不識不知順帝之則者文王也抑亦於此深求其㫖而得其所謂學矣乎不然是謾語也是具文也發踪指迷未見端的使有志於聖學者果安所用其力也三代而上不可得而詳矣獨伊尹傅說周公召公之書所以啓迪訓誘自始學以至成德教法井井典刑具在有王者作感念賈生之言而一以伊傅周召為講明聖學之標凖則庶幾其不悖矣至若師傅之正不正則又在上之人以古聖賢為的而擇焉十二年朝錯言於上曰貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪爵者上之所擅出於口而無窮粟者民之所種生於地而不乏夫得高爵與免罪人之所甚欲也使天下人入粟於邉以受爵免罪不過三嵗塞下之粟必多矣帝從之令民入粟邉拜爵免罪賞罰者人主之操柄而非人主所得私也天也故曰天命有德五服五章哉天討有罪五刑五用哉是故古之聖王官以崇德所以使為善者勸刑以抵罪所以使為惡者懲為善者勸則天下莫不樂於為君子矣為惡者懲則天下莫不耻於為小人矣今欲貴粟而使人主之操柄聽命於富民之手錯不足道也而帝亦謂然哉十三年齊太倉令淳于意有罪當刑詔獄逮繫長安其少女緹縈上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道無繇也妾願沒入為官婢以贖父刑罪使得自新天子憐悲其意五月詔曰詩曰豈弟君子民之父母今人有過教未施而刑已加焉或欲改行為善而道無由至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也豈為民父母之意哉其除肉刑有以易之盡令罪人各以輕重不亡逃有年而免具為令文帝之除肉刑是矣古聖用之然且非歟曰不然治古之世有井田以為飬有學校以為教有比閭族黨以為居有冠婚喪祭以為禮凡所以善人心厚風俗之道無所不盡其至然猶懼其或入於非義以亂吾俗也於是為之法制以防之畫之衣冠以威之垂之象魏以曉習之又嵗時讀法以訓諭之是明刑者所以弼教也折民於刑者所以降典也好生之德洽於民心比屋可封人人有士君子之行肉刑雖具而未必用也後世教化不明先王所以善人心厚風俗之道掃地盡矣每見所謂一門之內大者可殺小者可論未嘗不為之痛心疾首嗚呼是誰之咎哉人欲橫奔風俗敗壞無禮無義以妄為常爪剛者抉力彊者搏紛紛籍籍與禽獸無異上之人不思所以致此者何由凡古人假之以弼教降典哀矜惻怛而不忍者一切假之為勝民之具矣是故刑辟愈繁而姦愈不可止夫如是而以肉刑為重肉刑其果重乎文帝謂教未施而刑已加良可敬服雖然此事殆未易輕於置論愚是以於肉刑之除感世變之非古而為之重歎也是時上既躬修𤣥默而將相皆舊功臣少文多質懲惡亡秦之政論議務在寬厚耻言人之過失化行天下告訐之俗易吏安其官民樂其業畜積嵗增户口寖息風俗篤厚禁罔疏闊罪疑者豫民是以刑罰大省至於斷獄四百有刑錯之風焉耻言人過失習俗最美最可嘉尚夫羞惡之心人皆有之知所羞惡則見人之過如己有過自應耻言故凡輕於議人終日呶呶搖吻鼓喙而不知耻者必身安於非義不自恥其耻者也况朝廷議論四方之樞機一是一非為模為楷後世薄惡不特不耻言人過而已而且詆誹大道誣毁正人訐發隂私風聞失實以此媚上以此謀身此其用心曾穿窬狗彘之不若乃方偃然自詭以為得計夫如是何以飬亷耻之節厚風俗之原哉文帝時非有道德教化一一如先王之盛也公卿之間耻言人過而遂化行天下告訐俗易風移篤厚幾至刑錯然則人心之良未嘗泯滅有感斯應如草從風孟子曰無耻之耻無耻矣朝廷之上一知所耻而天下之耻心生焉奈之何為人上而不知所務也十五年趙人新垣平以望氣見上言長安東北有神氣成五采於是作渭陽五帝廟十六年夏四月上郊祀五帝於渭陽五帝廟於是貴新垣平至上大夫賜纍千金而使博士諸生刺六經中作王制謀議巡狩封禪事又於長門道北立五帝壇甚矣異端邪說之善幻也武帝好大喜誇其受文成五利之詐固宜文帝崇朴為天下先乃斂退務實之主賈誼請去秦法立漢制則謙遜未遑張釋之言便宜事則首命之曰卑之毋甚高論夫誰得而入之新垣平何人也其言一投遂且貴寵立廟壇議封禪相與為非禮之禮而不悟得非公孫臣土德之應有以蕩其心而神氣五采之說遂妖妄於郊見五帝之後乎周公作無逸而終之曰古之人猶胥訓告胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑吁可以為戒矣平又言臣候日再中居頃之日卻復中於是始更以十七年為元年日行一度一嵗一周天瞬息不停晷刻不爽安有卻而復中之理乎一日之不再中亦猶一君之無再元也妖人習幻妄或得以變亂蠢愚之耳目豈謂文帝而亦信之未幾平敗則可以悔矣而改元之繆終成其詐而弗之變遂使萬世承訛至有一君而改數元者其說乃自新垣平始甚為文帝惜也二年八月申屠嘉為丞相嘉為人亷直門不受私謁是時太中大夫鄧通方愛幸賞賜纍巨萬帝常燕飲通家其寵幸無比嘉常入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召通詣丞相府不來且斬通通恐入言上上曰汝第往吾令使人召若通詣丞相免冠跣足頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬吏今行斬之通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相此吾弄臣君釋之鄧通既至為上泣曰丞相幾殺臣有虞之朝以巧言令色孔壬為可畏而孔子答為邦之問亦曰逺佞人文帝平時身則衣弋綈幃帳則無文繡以至宫室苑囿車騎御服罷露臺治霸陵無一事不以朴儉先天下及於鄧通一有所溺賞纍巨萬賜之銅山燕飲其家寵幸無比乃全不類帝平時之所為者戲弄殿廷之上而丞相言之切矣則曰君勿言吾私之檄召而折辱之是矣則又曰吾弄臣君釋之奪其聰明幾於無耻戀戀愛護莫能斷割甚矣小人之可畏而難逺也以文帝之賢猶不免此萬世之下可不深懲而痛絶之乎七年遺詔曰朕既不德無以佐百姓今崩又使重服久臨以罹寒暑之數哀人父子傷長老之志損其飲食絶鬼神之祭祀以重吾不德謂天下何其令天下吏民令到出臨三日皆釋服毋禁取婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無跣絰帶無過三寸毋布車及兵器毋發民哭臨宫殿中殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁毋得擅哭臨已下棺服大功十五日小功十四日纎七日釋服朞而小祥又朞而大祥中月而禫此天下之通喪也君親同之三代而上未之有改是可率意而輕變乎春秋以後禮廢樂壞必有不能盡如古制者宰豫洙泗高第且發朞已久矣之問滕世子行三年之喪而父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行此可見矣然未有如文帝截然定為三十六日之制而以功緦易斬衰者遂使短喪相承為歷代之典故是教天下後世臣子之忍於君父也豈不繆哉雖然景帝則尤可罪也滕世子不能自决復問孟子孟子曰是在世子世子曰然是誠在我文帝姑息以為仁而不明先王之大道固也言之而不行則已矣為景帝者獨無人子之心乎獨不能斷之以義作滕世子之見乎屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰違而道一果食之微且不可從父於非義况父命以短喪而遂從之食稻衣錦而安焉如之何其可也因考高帝崩二十三日而葬惠帝二十四日文帝才七日且即位四年而作顧成廟又預治霸陵皆不典此由在廷之臣無知禮者是以舛繆若此故雖短喪亦不以為異也右文帝在位二十三年崩年四十六景帝二年六月丞相申屠嘉薨時內史朝錯數請間言事輒聽寵幸傾九卿法令多所更定丞相嘉自絀所言不用疾錯錯為內史東出不便更穿一門南出南出者太上皇廟堧垣也嘉聞錯穿宗廟垣為奏請誅錯客有語錯錯恐夜入宫上謁自歸上至朝嘉請誅內史錯上曰錯所穿非真廟垣乃外堧垣故穴官居其中且又我使為之錯無罪丞相嘉謝罷朝嘉謂長史曰吾悔不先斬錯乃請之為錯所賣至舍因毆血而死錯以此愈貴此有以見景帝習於朝錯之術數而不正大也申屠嘉為丞相首折小臣之無禮文帝雖極寵幸檄召而不敢庇度已困通而始召之此其氣象儼然如泰山喬嶽使朝廷之體增重景帝即位所宜敬禮而委心焉設使有罪當罷即罷耳奈何偏狥所愛遂虛置於無用使錯穿廟垣以便其私固已不正大之甚逆知丞相之欲罪之也錯夜入謁私相為謀而且以身當之此何為者哉皆由平時術數習熟機變以為巧比周以為私竟使先朝重臣飲恨而死是可歎也因觀文帝十五年錯請削諸侯及法令可更定者書凡三十篇上雖竒其材而不盡聽必有見於錯者矣景帝一即位而前日之不聽者盡用無餘兹固景之不如文逺甚而錯小器亦速死之道也夫梁孝王以竇太后少子故有寵王四十餘城居天下膏腴地賞賜不可勝道府庫金錢且百巨萬珠玉寶器多於京師築東苑方五百餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里招延四方豪俊之士如吳人枚乘嚴忌齊人羊勝公孫詭鄒陽蜀人司馬相如之屬皆從之遊每入朝上使使持節以乘輿駟馬迎梁王於闕下既至寵幸無比入則侍上同輦出則同車射獵上林中因上疏請留且半嵗梁侍中郎謁者著籍引出入天子殿門與漢宫官無異前三年冬十月梁王來朝時上未置太子與梁王宴飲從容言曰千秋萬嵗後傳於王王辭謝雖知非至言然心內喜太后亦然詹事竇嬰引巵酒進上曰天下者高祖之天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰嬰因病免太后除嬰門籍不得朝請梁王以此益驕又前六年賈誼請衆建諸侯而少其力固的論矣十一年梁王揖薨則請為王立後大益梁睢陽地使梁足以扞齊趙淮陽足以禁吳楚帝從誼計遂徙淮陽王武為梁王北界泰山西至高陽得大縣四十餘城是何誼言之自背也夫梁淮陽固文帝子也今日之梁淮陽即前日之齊趙吳楚今日而使其力足以扞禁寧保他日之不齊趙吳楚也耶當時諸侯王固患在彊大誼之為計固主於分其地弱其勢也縱未能遂行之抑損之制正當自帝子始以示天下至公一旦有所施為舉無得而辭於我矣奈何復大封其子以之抗制諸國而能使之恬然不我怨者况諸侯王錯列宇內又豈一梁王所能蕃扞之乎天下者高帝之天下又皆高帝之孫子所親者日寵之所踈者日削之七國之變未必不有激於此也景帝三年梁王來朝帝從容宴飲有相傳之一語王以此益驕中二年遂求為漢嗣殺袁盎賴田叔得不死人皆咎帝一語之失有以致之愚謂階之為禍自賈誼始矣朝錯數上書言吳過可削文帝寬不忍罰以此吳日恣橫及帝即位錯說上曰昔高帝初定天下昆弟少諸子弱大封同姓齊七十餘城楚四十餘城吳五十餘城封三庶孽分天下半今吳王前有太子之郤詐稱病不朝於古法當誅文帝弗忍因賜几杖德至厚當改過自新反益驕溢即山鑄錢煮海水為鹽誘天下亡人謀作亂今削之亦反不削亦反削之其反亟禍小不削反遲禍大上令公卿列侯宗室雜議莫敢難及楚王戊來朝錯因言戊往年為薄太后服私姦服舍請誅之詔赦削東海郡及前年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣廷臣方議削吳吳王恐削地無已因發謀舉事念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之於是使中大夫應高口說膠西王膠西群臣或聞王謀諫曰諸侯地不能當漢十二為叛逆以憂太后非計也今承一帝尚云不易假令事成兩主分爭患乃益生王不聽遂發使約齊菑川膠東濟南皆詐諾及削吳㑹稽豫章郡書至吳王遂先起兵誅漢吏二千石以下膠西膠東菑川濟南楚趙亦皆反齊王後悔背約城守吳王起兵於廣陵西涉淮因并楚兵發使遣諸侯書罪狀朝錯欲合兵誅之大抵積弊不可以驟革深根固蒂之病不可以頓除除之速革之遽則未有不召變致亂者七國之禍自高帝而種此根矣至文帝時有國各三數十年而其兆日益以著賈誼請分之而帝不聽朝錯請削之而帝不忍此其弊雖若寬縱以飬禍然未能害其能容也景帝即位推恩於同姓威刑不耀而德澤日加使之有感而無怨可懷而不可怒然後取誼之䇿裂土地而侯封之不然者削之不服者誅之內之不失骨肉之親外不廢國家之法夫誰曰不可安有嗣服未幾吾先帝之所優容而不忍者捃托往事一切行之頓舉驟發不少遼緩使諸國合為一怨仇然相向若蝟毛而起此固勢之所必至無足怪也錯之言不行於文帝而栽培醖釀於儲宫則有日矣一旦得君傾倒而出以快其平日之所欲為而不顧嗚呼錯亦小丈夫矣哉論者往往謂錯以忠而受禍是不然世固有為謀雖忠而舉措之失宜區處之乖方以至誤國禍天下者多矣君子不謂忠也於錯乎何恤後元年帝居禁中召周亞夫賜食獨置大胾無切肉又不置箸亞夫心不平顧謂尚席取箸上視而笑曰此非不足君所乎亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以葬者取庸苦之不與錢庸知其盜買縣官器怨而上變告子事連汙亞夫既聞上下吏吏簿責亞夫亞夫不對上罵之曰吾不用也召詣廷尉廷尉責問曰若侯欲反何亞夫曰臣所買器乃葬器也何謂反乎吏曰君縱不欲反地上即欲反地下耳吏侵之益急初吏捕亞夫亞夫欲自殺其夫人止之以故得不死遂入廷尉因不食五日嘔血而死文帝之遺其後嗣者相則有申屠嘉將則有周亞夫兩人剛方不撓有氣節使之輔少主必有可觀而皆以憤悶嘔血死甚可為景帝惜也文帝且崩戒太子曰即有緩急周亞夫真可任將兵其於細栁得之審矣而卒定七國之亂豈負文帝知人之明哉栗太子之廢而固爭之大臣職也而帝遂疏之其辨侯王信之非約諫侯徐盧等之非所以勸後皆至論也而帝遂免之此固已不滿人意至若賜食大胾不署箸則輕薄甚矣豈人君之所以禮貌大臣者哉帝乃目送之曰此鞅鞅非少主臣是時太子年十四得非將有所屬而不足於此故有是言乎愚謂欲觀大臣之氣節授之以輔遺託孤之重寄者其禮亦不如是也反覆而觀諸景帝大抵得於朝錯者為多二年夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女工者也農事傷則飢之本也女工害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減太官省繇賦欲天下務農蠶素有蓄積以備災害彊毋攘弱衆毋暴寡老耆以夀終幼孤得遂長今嵗或不登民食頗寡其咎安在或詐僞為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也姦法與盜盜甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪布告天下使明知朕意景不如文亦明矣然言治者必曰文景何也蓋自春秋戰國歷暴秦更劉項戰鬭之禍㝢宇分裂生民塗炭至於文帝乃始以朴儉先天下務農重穀省刑罰薄稅斂而遂措斯世於休飬生息之地三代而下未之有也景帝嗣服雖不如文而此數事所以厚民元氣飬國命脉者則能遵守無所變亂是以相繼四十年海內富庶風俗醇厚而西都之盛獨稱文景歟右景帝在位十六年崩年四十八兩漢筆記卷三
