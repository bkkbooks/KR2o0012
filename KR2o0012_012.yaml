body:
  text: 兩漢筆記卷十二宋錢時撰桓帝元嘉元年春正月朔羣臣朝賀大將軍冀帶劒入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劒冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖百寮肅然河南尹不疑嘗舉陵孝亷乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色是非之心人皆有之雖甚凶逆而本心之良未嘗泯滅也梁冀以弒君之惡挾定䇿之功殺戮忠賢如割草菅誰得而嬰之至於張陵一叱則跪謝不暇是孰使之然哉乃知夫朝本未嘗不肅亂臣賊子本亦未嘗不知畏惟夫君德不剛小人擅命是以委靡頽敗而不自振桓帝而明於是非不繆於舉錯若陵等輩分處要地朝綱人紀一掃而清之即日可以丕變夫安有不可為者是時最多君子而帝所信任則小人也貶斥誅夷幾無遺類而天下遂大亂悲夫延熹元年夏五月甲戌晦日有食之太史令陳授因小黃門徐璜陳日食之變咎在大將軍冀冀聞之諷雒陽令收考授死於獄帝由是怒冀冀之惡甚矣當時奮不顧身而言之者非不多且切矣往往如觸忌諱如捍頭目公卿大臣禍不旋踵何一太史令之死而乃由是怒冀邪嗚呼非為陳授而怒也為小黃門而怒也譬之庸暗無識之徒黨縱悍僕陵犯長上恬弗之戒未必不反羽翼以佐其風一旦忽有違言於其所私則計行而怒突發矣何者冀帝之所黨而宦官則尤帝之所眤比也此梁氏所以竟族於五侯之手而五侯專恣之禍所以踵冀而愈烈歟二年尚書令陳蕃上疏薦五處士豫章徐稚彭城姜肱汝南袁閎京兆韋著潁川李曇帝悉以安車𤣥纁備禮徵之皆不至帝又徵安陽魏桓其鄉人勸之行桓曰夫干祿求進所以行志也今後宮千數其可損乎廏馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出居其位而不得行其志是茍祿而已况不免於刑誅乎魏桓之言處亂世之至論也經曰素其位而行不願乎其外夫士君子之自立縱不得行於天下豈不可行於其鄉縱不得行於其鄉豈不可行於其家縱有處人道之不幸不得行於其家抑豈不可行於其身苟行矣仰不愧俯不怍浩乎天地裕如也焉往而不自得滔滔渾渾行險以僥幸者自古及今不知其幾萬萬欲何為哉欲何為哉七年郭泰性明知人好奬訓士類陳國童子魏昭請於泰曰經師易遇人師難遭願在左右供給灑掃泰許之泰嘗不在命昭作粥粥成進泰泰呵之曰為長者作粥不加意敬使不可食以杯擲地昭更為粥重進泰復呵之如此者三昭姿容無變乃曰吾始見子之面而今而後知卿心耳遂友而善之禮曰幼子常視母誑此教法之先務也安有用詐而可為人師乎郭泰號當時人物之英茅孟諸人出其陶冶疑若坐進於道師表一時欲驗童子之誠而詐以試之是奚可也貞觀中有請陽怒以試直佞者帝曰君自為詐何以責臣下之直朕方以至誠治天下權譎小數嘗竊恥之卿䇿雖善朕不取也嗚呼唐太宗而有是語哉八年李膺復拜司𨽻校尉時小黃門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付雒陽獄受辭畢即殺之讓訴寃於帝帝召膺詰以不先請便加誅之意對曰昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司𨽻何愆乃遣出自此諸黃門常侍皆鞠躬屏氣休沐不敢出宫省帝怪問其故並叩頭泣曰畏李校尉時朝廷日亂綱紀頽弛而膺獨持風裁以聲名自髙士有被其容接者名為登龍門云愚每觀漢季人物之盛未嘗不為之慨歎非謂其有進於道也風節凜凜無世俗之過是可喜也孔子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為大抵務學當先氣節惟不苟於行檢而後可與入道耳牽纒沒溺未能自拔於流俗沈痼之疾方在膏肓而欲語向上事作向上人物難哉此狂狷之士所以猶有取焉而皇極之教亦惟不協極不罹咎者而受之也世衰俗薄汙濁成風上下相挺習於無恥如蛆蠅臭腐生死糞溷中渾渾滔滔曽不知反回視漢季堅節正操挺然特立何翅霄壤當是時有聖人為依歸一變而入堯舜之道必無賜之貨殖必無求之聚斂必無商之出悅紛華其見必果不溺於凡近其守必固不搖於氣習豈易得哉奈何生不逢時皇不建極隨所偏勝莫或挽回世愈暗而抗志愈髙變愈激而立行愈峻錚錚然與羣小爭勝負共相標榜植為聲名中外承風臧否相尚而成黨錮之禍愚是以悲斯人之徒之不幸而為之重歎也右桓帝在位二十一年崩年三十六靈帝建寧二年初李膺等雖廢錮天下士大夫皆髙尚其道而汙穢朝廷希之者唯恐不及更共相標榜為之稱號以竇武陳蕃劉淑為三君君者言一世之所宗也李膺荀翌杜密王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭泰范滂尹勳巴肅及南陽宗慈陳留夏馥汝南蔡衍泰山羊陟為八顧顧者言能以德行引人者也張儉翟超岑晊苑康及山陽劉表汝南陳翔魯國孔昱山陽檀敷為八及及者言其能導人追宗者也度尚及東平張邈王孝東郡劉儒泰山胡母班陳留秦周魯國蕃嚮東萊王章為八厨厨者言能以財救人者也及陳竇用事復舉拔膺等陳竇誅膺等復廢宦官疾惡膺等每下詔書輒申黨人之禁侯覽怨張儉尤甚覽鄉人朱並素佞邪為儉所棄承覽意指上書告儉與同鄉二十四人别相署號共為部黨圖危社稷而儉為之魁詔刋章捕儉等冬十二月大長秋曹節因此諷有司奏諸鈎黨者故司空虞放及李膺杜密朱㝢荀翌翟超劉儒范滂等請下州郡捕治是時上年十四問節等曰何以為鉤黨對曰鉤黨者即黨人也上曰黨人何用為惡而欲誅之邪對曰皆相舉羣輩欲為不軌上曰不軌欲如何對曰欲圖社稷上乃可其奏或謂李膺可去矣曰事不不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死門生故吏並被禁錮侍御史蜀郡景毅子顧為膺門徒未有録牒不及於譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍茍安而已遂自表免歸汝南督郵吳導受詔捕范滂至征羌抱詔書閉傳舍伏牀而泣一縣不知所為滂聞之曰必為我也即自詣獄縣令郭楫大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪纍君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黃泉存亡各得其所惟大人割不可忍恩勿增感戚母曰汝今得與李杜齊名死亦何恨既有令名復求壽考可兼得乎滂跪受教再拜而辭顧其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡行路聞之莫不流涕凡黨人死者百餘人妻子皆徙邊天下豪傑及儒學有行義者宦官一切指為黨人有怨隙者因相陷害睚䀝之忿濫入黨中州郡承旨或有未嘗交關亦離禍毒其死徙廢禁者又六七百人郭泰聞黨人之死私為之慟曰詩云人之云亡邦國殄瘁漢室滅矣但未知瞻烏爰止竟于誰之屋耳泰雖好臧否人倫而不危言激論故能處濁世而怨禍不及焉易曰天地不交否君子以儉德辟難孔子又曰邦無道危行言孫漢季諸子皆一時名節卓然有志於天下憤羣邪之塞路傷公論之不伸區區愛君憂國之忠欲發而不得逞是以危言駭論痛抵而力排之而不知言不孫德不儉非吾聖人處否之道也卒罹於禍豈足怪哉雖然其所以關天下之大勢則不細矣安順而下國命絶續危於綴旒姦人弄權朝綱昏亂而宗廟社稷賴以僅存者朝廷內外尚有人焉而亂賊之徒猶知所忍也若無鉤黨之禍忠臣義士斥死無遺而國家所恃為元氣者索然為之掃地於是英雄豪傑心輕其上各自為謀而四分五裂之勢由此始矣嗚呼天下虛器也有人則重無人則輕重則安於泰山輕則危於纍卵黨錮禍作羣盜踵興於是在內則睥睨乎朝廷在外則割據乎土宇此國無君子之效也不有君子其何能國信哉中平六年夏帝崩皇子辨即皇帝位太后臨朝以後將軍袁隗為太傅與大將軍何進參録尚書事進既秉朝政忿蹇碩圖已隂規誅之袁紹勸進悉誅宦官秋七月袁紹復說何進曰前竇武欲誅內寵而反為所害者但坐言語漏泄五營兵士皆服畏中人而竇氏反用之自取禍滅今將軍兄弟並領徑兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患以垂名後世不可失也進乃白太后請罷中常侍以下以三署郎補其處太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人共對事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出納號令今不悉廢後必為患而太后母舞陽君及何苗數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右擅權以弱社稷太后疑以為然進新貴素敬憚中官雖外慕大名而內不能斷故事久不決紹等又為畫䇿多召四方猛將及諸將豪傑使並引兵向京城以脅太后進然之典軍校尉曹操聞而笑曰宦者之官古今宜有但世主不當假之權寵使至於此既治其罪當誅元惡一獄吏足矣何至紛紛召外兵乎欲盡誅之事必宣露吾見其敗也宦官為漢氏膏肓之禍其來逺矣夫以拳拳憤世嫉邪之忠一旦秉鈞當國於上則清宫掖肅朝綱誠當時第一急務然天下之事治之有標本行之有先後權宜度勢固有不容直遂而驟施者竇武何進之敗良有以歟夫國之有閹宦猶愛女嬖妾之在閨閫浸潤膚受言最易行又况漢廷竊命弄權習成故事當嗣君童幼母后臨朝之日所以朝夕承迎給事左右者何啻骨肉之相依倚豈外廷疏逺可遽撼搖也靈帝之立甫十二辨甫十四方爾䝉稚未知所適安能挺然特拔為公道主盟也哉為大臣者真有見乎天下之大勢優容寬假勿遽齟齬於羣小朝廷宿弊徐徐而處之勿峻勿迫遽駭聽聞同列一心以輔養君德為己任尊崇有道為師為保正其習氣發其本心本心無蔽則是非日明是非日明則邪正日辨仇士良且以人主讀書為戒况知學者邪正瞭然則君子日親小人日疏然後惟吾所為無不可者而何閹宦之足言也竇武何進輔遺託孤不聞有此規模靈帝八月而釁開辨才五月而難作其視羣小瞪然若對枰奕而爭勝負於一著之先誅惡之謀未行而犯順之訴先入矣幾何其不敗也進既就戮袁紹遂勒兵闕下閉宫門捕宦者無小大悉誅之至使天子奔播狼狽夜出逐螢光而走忠君愛國之義其舉措顧當爾耶去疾而喪軀去小人而喪天下吁可痛也已右靈帝在位二十二年崩年三十四獻帝九月董卓集羣僚於崇德前殿遂脅太后䇿廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為𢎞農王立陳留王協為帝袁隗解帝璽綬以奉陳留王扶𢎞農王下殿北面稱臣太后鯁涕羣臣含悲莫敢言者卓又議太后踧迫永樂宫至令憂死逆婦姑之禮乃遷太后於永安宫赦天下董卓率諸官上書追理陳蕃何武及諸黨人悉復其爵位遣使弔祠擢用其子孫十二月戊戌以司徒黃琬為太尉司空楊彪為司徒光祿勳荀爽為司空初尚書武威周毖城門校尉汝南伍瓊說董卓矯桓靈之政擢用天下名士以收衆望卓從之命毖瓊與尚書鄭太長史何顒等沙汰穢惡顯拔幽滯於是徵處士荀爽陳紀韓融申屠蟠復就拜爽平原相行至宛陵遷光祿勳視事三日進拜司空自被徵命及登台司凡九十三日又以紀為五官中郎將融為大鴻臚爽等皆畏卓之暴無敢不至獨申屠蟠得徵書人勸之行蟠笑而不答卓終不能屈年七十餘以壽終是非之心人皆有之非可以文欺也位居首相禮絶百僚不能正身以率下推誠以任賢亂賊之心自知負天下之公議而區區然縻好爵託名流為粉飾之具此何為者哉卓誠巨姦無所逃罪也若真能感悟自悔其非收召諸賢傾心委倚使朝廷之上一變而為君子之規模宗社奠安海宇清晏不特身免刑戮亦可長保祿位蓋愆補過尚庶幾焉而卓則不如是也嗚呼亦愚矣且天下治亂初無常勢君子出處要有定論果賢者耶烏可以小數羈縻也諫不行言不聽膏澤不下於民而但緘默固位恬不知恥又可謂賢乎申屠蟠一窮處士耳前不陷於黨錮後不罹於賊網超然逺韻不可衆玷萬世之下與有光榮君子審諸建安元年曹操在許謀迎天子衆以為山東未定韓暹楊奉負功恣睢未可卒制荀彧曰自天子䝉塵將軍首唱義兵徒以山東擾亂未遑逺赴今鑾駕旋軫東京榛蕪義士有存本之思兆民懷感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶𢎞義以致英俊大德也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪傑生心後雖為慮亦無及矣韓暹矜功專恣董承患之因潛召操操乃將兵詣雒陽既至奏韓暹楊奉之罪暹懼誅單騎奔楊奉帝以暹奉有翼車駕之功詔一切勿問辛亥以曹操領司𨽻校尉録尚書事操於是誅尚書馮碩等三人討有罪也封衛將軍董承等十三人為列侯賞有功也贈射聲校尉沮俊為𢎞農太守矜死節也操引董昭並坐問曰今孤來此當施何計昭曰將軍興義兵以誅暴亂入朝天子輔翼王室此五伯之功也此下諸將人殊異意未必服從今留匡弼事藝不便惟有移駕幸許耳操曰此孤本志也楊奉近在梁耳聞其精兵得無為孤纍乎昭曰奉少黨援心相憑結鎮東費亭之事皆奉所定宜時遣使厚遺答謝以安其意說京都無糧欲車駕暫幸魯陽魯陽近許轉運稍易可無縣乏之憂奉為人勇而寡慮必不見疑操曰善即遣使詣奉庚申車駕出轘轅而東遂遷都許己巳幸曹操營以操為大將軍武平侯始立宗廟社稷於許董卓造亂兵滿寰中當是時真能扞王于艱誅叛討逆一心享上而無所利於其間焉則名莫正言莫順忠臣義士聞風興起慨然而心服矣備已依仗必不脫之而西去䇿既撫納必不背之而東歸漢祚危而再安劉氏墜而復振豐功偉績萬世流芳豈不偉哉操也不然中懷羿莽之姦外假威文之名一時瑣瑣可以詐力勝者固扼而奪之氣至於英雄豪傑之士則有不可得而欺者是以智力相將爪牙競奮終無以勝之而鼎足之勢遂分名為勤王實乃竊國天下清議不加於吳蜀而操為漢代之賊雖萬世不可磨也悲矣七年曹操下書責孫權任子權召羣僚㑹議張昭秦松等猶豫不決權引周瑜詣吳夫人前定議瑜曰昔楚國初封不滿百里之地繼嗣賢能廣土開境遂據荆揚至於南海傳業延祚九百餘年今將軍承父兄餘資兼六部之衆兵精糧足將士用命鑄山為銅煮海為鹽境內富饒人不思亂有何逼迫而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往如此便見制於人也極不過一侯印僕從十餘人車數乘馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂彼自亡之不暇焉能害人吳夫人曰公瑾議是也公瑾與伯符同年小一月耳我視之如子也汝其兄事之遂不送質江左之勢定於赤壁之一戰操破荆州乘勝東下號八十萬向微公瑾決此大計六郡之衆寧足恃乎論者遂謂此為公瑾功第一以愚觀之拒質子殆若孩視權者質子一入人得以制其命後日雖欲奏赤壁之捷不可得矣瑜謂若曹氏率義以正天下將軍事之未晚此時固以賊視老瞞所謂人人得而誅之者奈之何入質子坐受其縛乎建安十五年瑜請孫權取蜀并張魯然後據襄陽以䠞操此其規模正自不苟未幾而瑜則死矣使瑜尚在必不肯以荆州借劉備備得荆州而吳蜀之勢始分吳蜀分而江左遂無復可以進取瑜之才略固不敢望之以王佐而一人之身所以係國勢者如此愚故悉言之權也不能討賊以奬王室而乃汲汲稱臣於曹氏未篡之先是又在操下矣回視未晚之言抑何背也偷安一隅臣事亂賊僣名竊號終何為哉十二年初琅邪諸葛亮寓居襄陽隆中每自比管仲樂毅時人莫之許也惟潁川徐庶與崔州平謂為信然劉備在荆州訪士於襄陽司馬徽徽曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛備問為誰曰諸葛孔明龎士元也徐庶見備於新野備器之庶謂備曰諸葛孔明卧龍也將軍豈願見之乎備曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之備由是詣亮凡三往乃見因屏人曰漢室傾頽姦臣竊命孤不度德量力欲信大義於天下而智術淺短遂用猖獗至于今日然志猶未巳君謂計將安出亮曰今曹操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東已歷三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳㑹西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之土劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之胄信義著於四海若跨有荆益保其岩阻撫和戎越結好孫權內修政治外觀時變則霸業可成漢室可興矣備曰善於是與亮情好日密關羽張飛不悅備解之曰孤之有孔明猶魚之有水也願諸君勿復言羽飛乃止三代而下識見超卓忠貫天地如諸葛孔明者蓋寡敢輕訾之哉伊尹耕於有莘之野而樂堯舜之道孔明躬耕南陽而乃以管樂自比殆見昭烈又謂霸業可成則其所學非古帝王之學明矣跨有荆益是亮素定之規模也久假荆州於權而不歸僞附劉璋於蜀而奪之國兩地雖皆漢比之盜賊不足多道然以詐取之則固未可九合諸侯一匡天下亦不如是也荆州既分吳蜀則既有違言矣關羽攻樊可謂誅操一大機㑹而不知孫權之議其後竟使吳魏連和致羽於死回視結好為援之語無乃未酬乎孔明之功固多可紀春秋責賢者備愚是以拳拳猶未滿也二十四年魏王操表孫權為驃騎將軍假節領荆州牧封南昌侯權遣校尉梁㝢入貢又遣朱光等歸上書稱臣於操稱說天命以權書示外曰是兒欲踞吾箸爐火上邪侍中陳羣等皆曰漢祚已終非適今日殿下功德巍巍羣生注望故孫權在逺稱臣此天人之應異氣齊聲殿下宜正大位復何疑哉操曰若天命在吾吾為周文王矣曹操微時聞許邵亂世姦雄之語大喜而去是其賊心已呈露矣建安元年遷帝都許則視漢鼎已若橐中物矣十七年贊拜不名劒履上殿明年封魏公加九錫後二年弒伏后鴆皇子明年進爵為王明年夏設天子旌旗出入警蹕冬冕十有二旒乘金根車立太子而篡漢之全體已具矣至是孫權上書稱臣在廷請正大位而乃託周文王以自詭抑何歟先儒謂東都風俗之美故亂臣賊子猶畏名義而自抑固善以愚觀之殆有說焉操姦雄之尤也奮身羣盜之中而所假託以令天下者徒有輔漢之名耳紹術布表雖已誅滅而吳蜀方鼎峙焉一旦去所依憑遂正位號則堂堂敵國皆將與我並帝寧得而禦之觀操為王備亦稱王丕篡帝備即稱帝此可見矣亂之實其貫已盈乃獨存區區之名忍而未取者豈真有禮義亷恥之心哉平日姦謀尚欲藏覆庶幾假漢室事征討以遂其混一之圖故也未幾操死丕即篡漢急急不少遼緩老姦之與兒態昭乎其辨而乃翁蹤跡亦不可得而掩矣右獻帝在位三十一年建安二十五年曹丕篡漢奉帝為山陽公建興十一年崩年五十四昭烈帝建安二十六年夏四月丙午漢中王即皇帝位於成都武擔之南大赦改元章武以諸葛亮為丞相許靖為司徒建安二十五年曹丕篡漢是歲已改元黃初矣按昭烈即位奏告之文則曰惟建安二十六年是漢之正朔蜀未嘗改也今從之人心之公天下之正理萬世不可磨也故家遺族淪落異邦一旦遇先世奴𨽻於道途猶依依不忍有戀主之意况四百年帝王之墜緒有能起而續之者而以偏方逺裔外之可乎建安二十五年冬十月曹丕篡漢明年夏四月昭烈即帝位于蜀是天命猶未絶人心猶未厭而漢氏之脈猶未墜也愚於曹丕特書曰篡而取昭烈系兩漢之後以備一代之始末且使亂臣賊子知萬世清議凜然如一日庶或知所懼云章武三年帝病篤命丞相亮輔太子以尚書李嚴為輔帝謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死帝又為詔敕太子曰人五十稱夭吾年已六十有餘何所復恨但以卿兄弟為念耳勉之勉之勿以惡小而為之勿以善小而不為惟賢惟德可以服人汝父德薄不足效也汝與丞相從事事之如父夏四月癸巳帝崩于永安宫三國志魏書帝死書崩蜀書主死書殂故資治通鑑因之魏曰帝蜀曰主而死則皆曰殂昭烈嗣武二祖統系于漢非曹氏篡賊之比先儒標題則固帝蜀而書崩矣今特從之建安十三年或勸劉備攻劉琮荆州可得備曰劉荆州臨亡託我以孤遺背信自濟吾所不為又十六年龎統勸取益州備曰今之與吾為水火者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小利而失信義於天下奈何㫖哉言乎方羣雄競奮狙詐相扼而能作是見也後雖弗克盡如初志此其識慮超逺則固卓絶流俗之上矣故至此日吐出肺腑炳炳烺烺有如此曹操一生姦譎穿窬漢鼎其將死也乃獨瑣瑣下及分香賣履之事真情所發烏可彊乎或者聞君自取之言遂議昭烈知嗣子庸懦將牢籠孔明而用之者嗚呼市井小數安知正大之用心也匹夫櫝一簮以自富猶戛戛然為子孫身後之慮漢髙帝百戰以有天下迢至歲晚惑於嬖孹竟貽吕氏之禍愚是以三歎為昭烈書之安樂思公建興五年三月丞相亮率諸軍北駐漢中使長史張裔參軍蔣琬統留府事臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事事無大小悉以咨之必能使行陳和睦優劣得所也親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命于亂世不求聞達于諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲巳足當奬帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣之所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則責攸之禕允之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所言遂行屯于沔陽臣子之節莫大於公忠不公則無以服天下之心不忠則不足以任天下之事出師一表武侯所以光輔少主經略中原者於是乎在可以為後世之法矣嘗考亮受顧命是歲即與吳連和又二年平南中又二年始出師漢沔最見當日進取規模慨然自許期於必效此其算略必有一定之見天假之年使得展盡底藴尚可還中原之舊而武侯不幸死矣侯之死漢運之終歟右安樂思公在位四十一年景耀六年降魏命為安樂縣公晉太始七年薨諡曰思年六十六兩漢筆記卷十二
