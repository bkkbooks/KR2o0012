body:
  text: 兩漢筆記卷八宋錢時撰光武淮陽王更始二年秋蕭王擊銅馬於鄡銅馬食盡夜遁蕭王追擊於館陶大破之受降未盡而髙湖重連從東南來與銅馬餘衆合蕭王復與大戰於蒲陽悉破降之封其渠帥為列侯諸將未能信賊降者亦不自安王知其意敇令降者各歸營勒兵自乘輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉以降人分配諸將衆遂數十萬人之情以赤子視之則雖盜賊亦將視我如父母以盜賊視之則雖骨肉亦將視我如仇讎嗚呼人一心也天下一家也尊君親上寧有二哉迫於飢寒苦於苛暴遂無聊賴羣起而亂天下然而一旦感動則未有不翕然心服者其本心之良本未嘗泯滅也彼方破降懷不自安而我不能示之以不疑處之以無事猜猜然如納虎豹於圈檻則是我且未免自盜賊其心矣安能使反側之徒遂忘機於我也觀此一節便見光武有君人之量此其所以成再造之功歟建武元年諸將上尊號王不聽行到南平棘復固請之王不許諸將且出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其所志耳今大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無為久自苦也大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗召馮異詣鄗問四方動靜異曰更始必敗宗廟之憂在於大王宜從衆議會儒生強華自關中奉赤伏符來詣王曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主羣臣因復奏請六月己未王即皇帝位于鄗南改元大赦孟子曰三代之得天下也以仁其失天下也以不仁安有所謂符命也哉自王莽詐偽竊國欺天罔人而符命興焉甚至五威班行四十二篇於天下言之可為羞忸光武者出豁達大度一時豪傑翕然歸之此即天命祚漢者未艾而光武為真主不疑矣今而即位猶有待於赤伏符何耶豈亦未能自信須此而後信於人耶易曰聖人以神道設教又曰神而化之使民宜之凡利用出入通變宜民無非神道非怪誕不根之謂也後世妖妄之説誣惑百端往往記河圖洛書以自詭嗚呼河圖洛書正不如是也愚為光武惜之初宛人卓茂寬仁恭愛恬蕩樂道雅實不為華貌行已在於清濁之間自束髮至白首與人未嘗有爭競鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉哀平間為密令視民如子舉善而教口無惡言吏民親愛不忍欺之民嘗有言部亭長受其米肉遺者茂曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎曰往遺之耳茂曰遺之而受何故言邪民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝民矣凡人所以羣居不亂異於禽獸者以有仁愛禮義知相敬事也汝獨不欲修之寧能髙飛逺走不在人間邪吏顧不當乘威力強請求耳亭長素善吏嵗時遺之禮也民曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎一門之內小者可論大者可殺也且歸念之初茂到縣有所廢置吏民笑之鄰城聞者皆蚩其不能河南郡為置守令茂不為嫌治事自若數年教化大行道不拾遺遷京部丞密人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求茂茂時年七十餘甲申詔曰夫名冠天下當受天下重賞今以茂為大傅封褒德侯卓太傅平淡樂易粹然君子之風使有聖人為之依歸坐進于道豈易量哉光武即位首訪求而表顯之西都諸君未之有也此雖識見超卓迥出流俗之表蓋亦有感於世道矣髙祖草創姑未暇論文帝天姿最美最為渾厚然崇儒重道之意終有未滿至于武帝則大不然雖曰雅嚮儒術往往徒為具文而其實則所求者跅弛所尚者功利一時紛然坌集者皆貪榮冒險之徒是以汙濁成風節亷道喪衛霍以後趨炎附勢而天下靡然矣延至賊莽竊國如掇無一仗節死義之士出而排止其萬分而上書稱頌者至四十八萬十千餘人張禹孔光劉歆揚雄諸子俱號名儒夷考其行曽狗彘之不若無他熏煮腐爛俗壞而不知恥故也光武伏於民間有見乎其訪求草萊為有天下第一急務嚴光周黨又屈己禮下而不以為異焉此豈偶然之故哉名節之風標示一立士習相承久而彌勵是故身可死而義不可屈黨可斥而守不可困雖國命危於綴旒而亂臣賊子終有所憚而不敢動視西都之季何如也愚是以上下世變於光武斯舉而重有感云二年春正月庚辰悉封諸功臣為列侯梁侯鄧禹廣平侯吳漢皆食四縣博士丁恭議曰古者封諸侯不過百里強幹弱支所以為治也今封四縣不合法制帝曰古之亡國皆以無道未聞功臣地多而滅亡者也髙帝大封諸將連城數十非得已也勢也其後叛者踵起誅戮殆盡而帝亦竟死矣至後漢光武時皆多不過四縣蓋有所懲矣暨答丁恭之言乃曰未聞功臣地多而滅亡何耶若然則荆楚九江之地曷為而不分於諸將也此語殆出於權詐惟我藝祖區處功臣最為得體待之有恩而不假以權使之享富貴而不使其勢足以為亂真萬世之法哉隂鄉侯隂識貴人之兄也以軍功當增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑非所以示天下此為親戚受賞國人計功也帝從之帝以隂貴人雅性寬仁欲立以為后貴人以郭貴人有子終不肯當六月戊戌立貴人郭氏為皇后以其子強為皇太子大赦西都女禍言之可為傷歎此皆人主徇情溺愛不擇配偶是以貪榮冒寵不知禮法以至於是若隂識之辭封與其女弟之遜后深識逺見卓絶如許安有滅宗誤國之禍也哉雖曰往事之敗有所懲戒然非其家風素美兄弟俱賢則亦斷不能爾也故特比而書之宋𢎞為大司空𢎞薦沛國桓談為議郎給事中帝令談鼓琴愛其繁聲𢎞聞之不恱伺談內出正朝服坐府上遣吏召之談至不與席而讓之且曰能自改邪將令相舉以法乎談頓首辭謝良久乃遣之後大會羣臣帝使談鼓琴談見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓談者望能以忠正導主而令朝廷耽恱鄭聲臣之罪也帝改容謝之孔子答為邦之問而終之以放鄭聲鄭聲不放靡靡相尚亂耳蕩志莫此為甚夫人臣者繩愆糾繆格其非心務引君於當道者也孟子謂以言餂人是穿窬之類况繁聲以餂其君乎人臣而以餂君為心則凡邪僻取容諂巧求媚者將何所不至也因念世俗之樂不正甚矣獨琴為近古有和平雅正之音足以滌淫邪消鄙暴古之君子無故不去者非以恱耳所以養德也而乃取之為媚恱之具嗚呼是豈媚恱之具也哉湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之知不可忘糟粳之妻不下堂帝顧謂主曰事不諧矣漢氏家法大抵不正觀董偃丁外人之事雖閭閻下俚猶且恥之而當時之君不以為異也良由髙帝起自匹夫禮法素不明閨門素不肅其源既濁渾渾流波光武欲懲先世之愆則正始齊家此為第一急務矣湖陽新寡而啓之使嫁是教其姊以失節也宋𢎞有妻而誘之易妻是教其臣以不義也傳曰忠臣不事二君烈女不事二夫夫婦同牢死即同穴一旦得志遂相棄背此宜市井無賴之所不忍曽謂學士大夫而可為歟名檢有虧節介不立欺君罔上賣主乞降凡可以茍富貴利達甘心狗彘之行而不顧者即此易交易妻之徒之心也人君而出是語非特無以正風化之原且將何以望人臣之不懷二心哉魯陽公主為張敖妻凡幾何年髙帝一動於婁敬之説遽欲奪之以嫁胸奴與此黜妻而娶帝姊正相類是皆茍焉集事而不明於大義愚故重為光武惜也四年隗囂使馬援往觀公孫述援與述同里閈相善以為既至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更為援制都布單衣交讓冠會百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車磬折而入禮饗官屬甚盛欲授援以封侯大將軍位賔客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士與圖成敗反修飾邉幅如偶人形此子何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方囂乃使援奉書雒陽援初到良久中黃門引入帝在宣德殿南廡下袒幘坐迎笑謂援曰卿遨逰二帝間今見卿使人大慙援頓首辭謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有真也英雄豪傑之士惟度量足以容之非可以小數屈也髙帝自謂運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信然而一世豪傑莫不甘心為之用者服其大耳光武智謀風采料敵制勝種種過於髙帝至若氣象則終不及之無他不及其大也其所以過之者乃其所以不及者也雖然視髙帝則不及視囂述輩則相去萬萬矣此馬援所以一見而遂傾心歟五年詔徴處士太原周黨會稽嚴光等至京師黨入見伏而不謁自陳願守所志帝少與嚴光同遊學及即位以物色訪之得於齊國纍徴乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家天下有道則見無道則隱此聖賢出處之大凡也雖然隱居而不求其志行義而不達其道則是出處之本且猶未明矣而何隱見之足言哉是故自昔遁世之士有抱道懷德仕於亂世全身逺害用晦而明者箕子之佯狂是也運逢革命義不二適堅節正操守死不渝者夷齊之不食周粟是也隂柔浸長禍亂將作知幾而逺引者肥遁之所以無疑也上下不交儉德避難不可榮以祿者大人之所以否亨也蠱壞之極不可以有為獨善其身樂道忘勢者不事王侯高尚其事者也居易俟命不求聞達素位而行無入而不自得者履道坦坦幽人貞吉者也有自知學未足以成身德未足以善世而潛藏不耀與時消息者隱而未見行而未成是以君子弗用者也若夫未志於經世不貴於明倫稿死巖穴之中離處綱常之外沈虛陷寂守一偏一曲以自好此則素隱行怪萬世名教之罪人非吾聖人之所謂道也或曰春秋之末亦極蠱矣孔子曷為而皇皇無道則隱豈其然乎曰磨而不潾涅而不緇聖人之事也南容蘧伯玉諸子孔子亟稱之至若用之則行捨之則藏乃獨於回也而曰唯我與爾有是是行藏係乎君之用捨而不係乎世之治亂伊尹治亦進亂亦進就桀就湯所以為聖之任也傅説吕望恐未進此豈南容蘧伯玉輩地步所可擬哉後世不以德行道藝取士而士亦不復以德行道藝為學自其童稚即以富貴利達相標凖幼而學之者何道壯而欲行之者何事乎汙濁成風節亷道喪鼓一世於浮競之塗貪榮冒而不知恥於是而有人焉脫身勢利髙蹈林泉優遊恬退以終其身雖消息盈虛與時偕行未必合聖人之中道而風節凛凜足以激頽波厲汙俗此嚴光周黨之徒後世猶有取焉不暇論其所學之果如何也出處之義士君子之大要愚故極論願與學者共明之六年九月丙寅晦日有食之執金吾朱浮上疏曰昔堯舜之盛猶加三考大漢之興亦纍功效吏皆積久至長子孫當時吏職何能悉治論議之徒豈不喧譁蓋以為天地之功不可倉卒艱難之業當纍日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保迫於舉劾懼於刺譏故爭飾詐偽以希虛譽斯所以致日月失行之應也夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也願陛下遊意於經年之外望治於一世之後天下幸甚帝采其言自是牧守易代頗簡自古聖黜陟之法不明而封建壞惟擇賢久任尚庶幾焉捨是而求俗化之美終茍道也何者君子之規模必漸摩以嵗月小人之志慮常茍且於旦暮是故擇賢而不久任雖有教化安能遽孚雖有事業安能驟集則亦輟於中道廢於半途而已耳況不擇賢乎易曰日月得天而能久照四時變化而能久成聖人久於其道而天下化成不久於其道而欲化之成無是理也卓茂為密令初到縣有所廢置吏民笑之鄰城聞者皆蚩其不能居數年而後教化盛行向使不二三年輒已易去則後日之效何由見哉七年大司農江馮上言宜令司𨽻校尉督察三公司空掾陳元上疏曰臣聞師臣者帝賔臣者霸故武王以太公為師齊桓以夷吾為仲父近則髙帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰專操國柄以偷天下况已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明激訐為直至乃陪僕告其君長子弟變其父兄罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜修文武之聖典襲祖宗之遺德勞心下士屈節待賢誠不宜使有司察公輔之名帝從之漢襲秦陋使後世不復知有三公之重自髙帝始矣非無三公也三公之名不正也三公之名不正者由不知三公之實為何官也君德之無輔國體之不尊此其故與展轉承訛至是凡幾變獨建太傅一人為上公而太尉司徒司空之號終已不改是不特不識三公之為重且併與六卿而不識矣道隆德盛為師為保真若伊尹之阿衡周召之左右當時小臣安敢有督察之請而光武亦何敢以吏事責之乎光武方以吏事責三公正使司𨽻校尉督察以下又烏足怪也陳元不能發明周官之本旨而但舉髙帝優相國之禮以為法相國之禮果優矣乎請田宅地遽繫之獄坐而論道顧當爾乎孟子曰子誠齊人也知管仲晏子而已矣豈不陋哉帝好圖讖與鄭興議郊祀事曰吾欲以讖斷之何如對曰臣不為讖帝怒曰卿不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解郊祀國之大禮古聖制作昭然明甚馬援謂帝經學博覽抑常有見於斯矣乎何乃謬信妖妄以自詭也因考漢之諸君不明正道是故多惑於異端自文帝先之以黃老再變而遂有武帝之神仙又再變而王莽遂以符命期天下此光武所親見可以省矣而圖讖之説終迷而不悟甚矣人主之不可以不學而源流之不可以不正也鄭興既知其謬所宜闡明聖典開悟君心天地鬼神臨之在上縱使不幸如桓談之黜逐以死亦人臣事君之一效豈不甚偉一逢其怒輒相詭隨嚴光有言阿諛順旨要領絶若興者安所逃罪於天地間哉九年盜殺隂貴人母鄧氏及弟欣帝甚傷之封貴人弟就為宣恩侯復召就兄侍中興欲封之置印綬於前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望誠所不願帝嘉之不奪其志貴人問其故興曰夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所議貴人感其言深自降挹卒不為宗親求位自古貴戚鮮有不及於禍者皆由寵利而無厭盛滿而不知戒也隂貴人兄弟斂然以退遜為家風其言切實無愧昔賢可為萬世后族之標凖矣故不一書之十二年公孫述困急謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑岑於市橋偽建旗幟鳴鼓挑戰而濳遣竒兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出漢軍餘七日糧隂具船欲遁去蜀郡太守南陽張堪聞之馳往見漢説述必敗不宜退師之䇿漢從之乃示弱以挑敵冬十一月臧宫軍咸陽門戊寅述自將數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因使護軍髙午唐邯將鋭卒數萬擊之述兵大亂髙午奔陳刺述洞胸墮馬左右輿入城述以兵屬延岑其夜死明旦延岑以城降辛巳吳漢夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓劉尚曰城降三日吏民從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁良失斬將弔民之義也光武之敕馮異有曰征伐非必略地屠城要在平定安集之耳諸將非不健鬭然好虜掠念自修敕無為郡縣所苦旨哉斯言此正髙帝之所以開基而光武之所以再造者也海內之民皆吾赤子不幸而淪於非類豈其本心之所願哉殱厥渠魁復還舊觀配天其澤咸與惟新當使之欣然如脫豺虎之羣而得慈父母乃為盡善漢也異時徇南陽多侵暴以致鄧奉之叛今蜀已降不務安集而又放兵大掠此何為者也殘暴鷙忍與項籍無異弔民伐罪顧如是乎光武未録其功而首督其過不以平敵為喜而以縱虐為怒可以懷赤子之心得為民父母之體矣初述徵廣漢李業為博士業固稱疾不起述羞不能致使大鴻臚尹融奉詔命以劫業若起則受公侯之位不起賜以毒酒融譬旨曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官闕位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎業乃歎曰古人危邦不入亂邦不居為此故也君子見危授命何乃誘以高位重餌哉融曰宜呼室家訣之業曰丈夫斷之於心久矣何妻子之為遂飲藥而死述恥有殺賢之名遣使弔祀賻贈百匹業子翬逃辭不受述又聘巴郡譙玄玄不詣亦遣使者以毒藥劫之太守自詣玄廬勸之行玄曰保志全高死亦奚恨遂受毒藥玄子瑛泣血叩頭於太守願奉家錢千萬以贖父死太守為請述許之述又徵蜀郡王皓王嘉恐其不至先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主况於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎曰後之哉乃對使者伏劒而死犍為費貽不肯仕述漆身為癩陽狂以避之同郡任永馮信皆託青盲以辭徵命帝既平蜀詔贈常少為太常張隆為光祿勳譙玄已卒祠以中牢敕所在還其家錢而表李業之閭徵費貽任永馮信會永信病卒獨貽仕至合浦太守愚每觀後世仗節死義之士未嘗不為之敬歎雖詩之保身易之辟咎容有未盡不暇論也嗚呼人孰不欲富貴孰不貪生而畏死顧肯甘心捨富貴而就死地哉世衰俗薄人欲橫奔但茍目前之微榮莫明天下之大義平居無事竊位取容一有危疑投降恐後若是者真犬馬之不若其視李譙王費諸子果何如也是雖其識見超卓逈出流俗之表然亦忠貞之性剛毅之質有非世俗所可轉移者斯人之徒與入堯舜之道託孤寄命特餘事耳子路仕衛而結纓於將死豈足多乎十三年異國有獻名馬者日行千里又進寶劒價直百金詔以劒賜騎士馬駕鼓車族獒有曰犬馬非其土性不畜珍禽竒獸不育于國召公拳拳惟欲武王却而不受耳未聞受之而賤用也人之與物雖然不同用違其才失所則一是故古之聖人不使一物之失所光武受千里馬之獻而處之鼓車之下以示無用孰若文帝謝絶之之為得體哉朱祐奏古者人臣受封不加王爵丙辰詔長沙王興真定王得河間王邵中山王茂皆降爵為侯丁巳以趙王良為趙公太原王章為齊公魯王興為魯公是時宗室及絶國封侯者凡一百三十七人晉文公有大功於王室請隧於襄王襄王不許曰王章也未有代德而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是乎懼而不敢違噫衰周之君亦有是言哉孔子作春秋於月而加王於王而加天以明尊無二上之義楚雖僭號例削而書子其於君臣大分凜乎天尊地卑之不可踰後世相承遂以王爵為封國之常事春秋以後莫有明斯義者而朱祐言之真可為後世法矣吳漢自蜀振旅而還至宛詔過家上冢賜穀二萬斛夏四月至京師於是大饗將士功臣增邑更封凡三百六十五人其外戚恩澤封者四十五人定封鄧禹為髙密侯食四縣李通為固始侯賈復為膠東侯食六縣餘各有差已殁者益封其子孫或更封支庶帝在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及鄧禹賈復知帝偃干戈修文德不欲功臣擁衆京師乃去甲兵敦儒學帝亦思念欲定功臣爵土不令以吏職為過遂罷左右將軍官耿弇等亦上大將軍將軍印綬皆以列侯就第加位特進奉朝請鄧禹內行淳備有子十三人各使守一藝修整閨門教養子孫皆可以為後世法資用國邑不修産利賈復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是故列侯唯髙密固始膠東三侯與公卿參議國家大事恩遇甚厚帝雖制御功臣而每能曲容宥其小失逺方貢珍甘必先遍賜諸侯而太官無餘故皆保其福祿無誅譴者收功臣兵柄罷將軍官不用為三公足以革先漢之弊垂後代之法矣此雖光武識見度越有此舉措而鄧賈諸公儼然儒者氣象知幾逺嫌釋兵崇學以成光武之志亦豈絳灌輩所可企及然則忠臣義士捐軀徇國有土宇大功者宜知所以自處哉甲寅以冀州牧竇融為大司空融自以非舊臣一旦入朝在功臣之右每朝會進見容貌辭氣卑恭已甚帝以此愈親厚之融小心久不自安數辭爵位上疏曰臣融有子朝夕教導以經藝不令觀天文見讖記誠欲令恭肅畏事恂恂守道不願其有才能何況乃當傳以連城廣土享故諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓職還土故命公暑熱且自便今相見宜論他事勿得復言融乃不敢重陳請光武不用功臣為三公所以處功臣則善矣而乃責三公以吏事所以處三公得無有未盡善乎三公之名雖與古殊論道經邦即此其任是安可以吏事責也三公而責以吏事則三公之選止以吏事取人而不復知有道德之為重矣將何所不至乎後年春正月大司徒韓歆以直言自殺歐陽歙代之冬十有一月復以度田不實死獄中又五年大司徒戴涉坐入故太倉令罪下獄死且以三公連職併免竇融嗚呼光武每事懲先漢之弊而輕殺大臣乃不異武宣之世皆由不知三公為何官而責之以吏事之效也可勝歎哉以是觀之竇融此日辭之懇懇亦可謂有先見之明矣兩漢筆記卷八
