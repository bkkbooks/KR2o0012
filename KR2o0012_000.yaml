body:
  text: 兩漢筆記史評類提要臣等謹案兩漢筆記十二卷宋錢時撰時有融堂書解已著録此書皆評論漢史嘉熙二年嘗經奏進前有尚書省劄稱十二卷與此本合葉盛水東日記以為不完之本非也其例以兩漢書舊文為綱而各附論斷于其下前一二卷頗染胡寅讀史管見之習如蕭何收秦圖籍則責其不收六經又何勸高帝勿攻項羽歸蜀則責其出於詐術以曹參文帝為陷溺于邪説而歸其過于張良于陸賈新語則責其不知仁義皆故為苛論以自矜高識三卷以後乃漸近情理持論多得是非之平其中如于張良諫封六國後論封建必不可復郡縣不能不置于董仲舒請限民名田論井田必不可行于文帝除肉刑亦不甚以為過尤能滌講學家胸無一物高談三代之窠臼至其論董仲舒對策以道之大原不在天而在心則金溪學𣲖之宗旨論元帝以客禮待呼韓邪論光武閉關謝西域皆極稱其能忍善讓則南渡和議之飾詞所為有為言之者置而不論可矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:76fc1735a05f04464da27ab4ae36223a87afe1ff4fef35e8de527a1a0352f407
