body:
  text: 兩漢筆記卷四宋錢時撰武帝建元元年冬十月詔舉賢良方正直言極諫之士上親䇿問以古今治道廣川董仲舒對曰事在強勉而已矣強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有效者也詩曰夙夜匪懈書云懋哉懋哉皆強勉之謂也道者所繇適於治之路也仁義禮樂皆其具也武帝即位而首訪大道之要仲舒對䇿而首以學問為言此三代而下君臣相問答者所未有也豈不美哉雖然真知所以為學問則大道之要在是矣夫道者無方無體無所不至無所不通大傳曰易有太極是生兩儀兩儀生四象四象生八卦是天地萬物同出於道範圍發育無非此道之變化父子之所以親君臣之所以義夫婦之所以别長幼之所以序朋友之所以信日用常行起居食息皆此道也故曰誰能出不由戶何莫由斯道仲舒謂道之大原出於天其以成象者而言乎抑以理言乎以理而言天即道道即天何原何出之可别也以成象者而言則天特範圍中之一物耳謂之大原尤不可也然則斯道之大果有要乎曰在乎心人心之良本無非道感物而動意蔽情昏始日用而不知終冥迷顛倒而不自反是故不可以無學焉學而不問則疑無與決窒無與通邪正無與分真偽無與辨雖學猶不學也故易曰學以聚之問以辨之中庸曰博學之審問之曰學曰問兩不偏廢則本心日明六通四闢矣知此謂之智得此謂之德全此謂之仁宜此謂之義履此謂之禮樂此謂之樂非由外鑠我也我固有之也兢兢業業者兢業乎此也無怠無荒者無怠荒乎此也於穆不已者不已乎此也夙夜罔或不勤者勤乎此也曰為之不厭曰自強不息者不厭不息乎此也是勉也非可強也一有強勉之意即有時而作輟非不厭不息之運也順此則為治逆此則為亂順此則為吉逆此則為凶順此則為安為存逆此則為危為亡所貴於大學者以此教也所貴於守令者以此師帥也所貴於更化者以此躬行於上而天下自丕變也故曰一家仁一國興仁一家讓一國興讓又曰君子之德風小人之德草草上之風必偃此感化之妙也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬順而民不爭導之以禮樂而民和睦示之以好惡而民知禁上以實感下以實應不言而信不令而從非徒區區革一弊新一政而謂之更化也唐相楊綰而減騶徹樂者聳然於制下之日豈待告語而復從事哉自然之應不可強也仲舒曰道者所繇適於治之路也仁義禮樂皆其具也是特指事物為仁義以玉帛鐘鼓為禮樂而實未嘗知此心之即道也茍不明道而求先王於形迹之末則後世玉田可以為三代而舞韶簫者即得謂之舜矣武帝好大喜夸氣象已見於發䇿之初仲舒但云學問而不明其所以學問之旨使之斂華就實反求諸心而力行之徒佐其上嘉下樂之鋒而大道之要終茫然迷眩無所歸宿愚是以不能忘言上雅嚮儒術嬰蚡俱好儒推轂代趙綰為御史大夫蘭陵王臧為郎中令綰請立明堂以朝諸侯且薦其師申公秋天子使使束帛加璧安車駟馬以迎申公既至見天子天子問治亂之事申公年八十餘對曰為治者不在多言顧力行何如耳是時天子方好文詞見申公對默然然已招致則以為太中大夫舍魯邸議明堂改厯服色事愚每愛申公力行何如之語與汲黯內多欲而外施仁義之言切中武帝之病使其能受則所履皆實地所進皆實德所行皆實用豈易量哉惜乎趨向不投竟成落落雖有金丹大藥無救護疾忌醫者之死是可歎也因觀武帝天姿過齊宣王逺甚孟子之啓迪之也皆隨其所好而利導之是以雖未能用而亦不遽至於扞格英鋭之主方虛驕侈大安能遂聽霜降水涸之言要當委曲隨順啓諭庶可漸漬而入犯其所忌直發不顧一與之背遂難再合此亦進言者所當戒云二年太皇竇太后好黃老言不悅儒術趙綰請毋奏事東宫竇太后大怒曰此欲復為新垣平邪隂求得趙綰王臧姦利事以讓上上因廢明堂事諸所興為皆廢下綰臧吏皆自殺丞相嬰太尉蚡免申公亦以疾免歸後世儒學每不能勝異端非異端之勝也為儒者之無以勝也孟子在戰國固以王政為主而未嘗不以轉移心術為先有不忍人之心斯有不忍人之政此萬世不易之要旨矣今也名為儒學而根底工夫實無以轉移人主之心乃急急從事於外為觀美夷考其行又不能無可議一且取敗身且不保尚何望其引君於當道哉異端者乃不然不為經世之規模而専以清修為事實一受其病深入膏盲死不可奪無他其所學雖不正而所用力者亦曰在心故也武帝即位之初以儒術取士曽未數月不特興為之事皆廢而人且獄死咸謂太后好黃老實害之不知臧綰固自取也然則儒者之學果不足以勝異端歟三年上自初即位招選天下文學材智之士待以不次之位四方士多上書言得失自眩鬻者以千數上簡拔其俊異者寵用之莊助最先進後又得吳人朱買臣趙人吾丘壽王蜀人司馬相如平原東方朔吳人枚臯濟南終軍等並在左右每令與大臣辨論中外相應以義理之文大臣數屈焉每疑文帝愛賈誼辭博一嵗中超遷至太中大夫及請立漢制更秦法則謙遜未遑一聞大臣年少初學擅權紛亂之語即疏之不用其議出為長沙王傅而遂不留夫立漢制更秦法以為未遑固若不滿人意然嗣位之初輕俊之言一售使紛更變亂之門由是而起則文帝殆不為無見也是故雖愛其才而終不用其議雖超遷之使之貴而終不使之得以間大臣夫大臣古之所謂百揆四嶽上與天子坐而論道而下則表帥羣工百辟者也伊尹咸有一德謂任官惟賢材左右惟其人其人者一德之人也庶官則凡賢材皆可任至若左右大臣則斷非一德不可如不可用寧不用耳安有崇奬輕俊環列左右尚辭辨以相折屈此其舉措視文帝何如哉雖然此亦大臣非其人之明驗也非大臣之罪也武帝不知大臣之為重而所用者不惟其人也亦非不惟其人也武帝少年之氣與輕俊者之心合而不知有大臣也自時厥後侈心日肆長駕逺馭天下騷然文景數十年之元氣耗竭殆盡皆此曹實從臾之史氏謂中外相應以義理之文果然乎否也是嵗上始為微行夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度是故從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡武帝者豈特為流連之樂荒亡之行而已哉萬乘之國尊詭名夜出馳騖禾稼而民號呼罵詈鄠杜令欲執之投宿逆旅而主人翁疑為姦盜聚少年欲攻之乍居天位不自愛重侈心狂縱身幾不保何貴於天下之表儀也向使賢人君子在其左右有師保正救之德必不至是可以為萬世戒矣六年武安侯田蚡為丞相蚡驕侈治宅甲諸第田園極膏腴市買郡縣物相屬於道多受四方賂遺其家金玉婦女狗馬聲樂玩好不可勝數每入奏事坐語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏已盡未吾亦欲除吏嘗請考工地益宅上怒曰君何不遂取武庫是後乃稍退丞相薦人或起家至二千石而史謂權移主上此有以見漢之相權甚輕而吏皆天子自除明矣夫冢宰掌建邦之六典於百官無所不統旁招俊乂列于庶位正其職也安有天子而下與之爭除吏者舜禹宅百揆皆四嶽所薦丞相薦人至二千石又足為異乎由是而論非相之不可以除吏除吏而以之為市者非相耳因觀建元二年冬十月武帝年未弱冠田蚡迎淮南王安霸上遽作不順語安大喜遂厚遺金錢財物卒啓賊心以成元狩之變此賣主之姦也以天子為市而且不恤又奚暇論除吏之可不可哉時上方招文學儒者上曰吾欲云云汲黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戅也羣臣咸數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身奈辱朝廷何孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣夫心不可以存亡言也惻隱羞惡是非辭讓人皆有之非由外鑠雖甚晦蝕未有不存者但日用而不知耳欲不可有也又烏可以寡言也纖毫意念即昏即差謂之寡欲則是不能無矣則是雖不能無而亦不為心害是奚可乎孟子之言殆為誘進初學而發也一無所纍靈明湛然此心即仁此心即義推而放諸四海而準無非此心之妙用安有內多欲而仁義可以外施者內多欲則施於外者之非仁義明矣黯固未為其知仁義也學黃老言亦知多欲之害心故有是語然針砭武帝之膏盲則大矣因觀黯之為人風節凜凜不可撓如秋霜夏日可為漢臣第一流向使得聖人為之依歸學吾儒之所謂學則其所到豈易量哉如許美質未免溺於黃老公孫𢎞之徒乃以儒稱於世而黯且未免有毁儒之名儒不可毁也殆詆斥公孫𢎞耳後世皇極不建聖道不明學者無所師資往往髙明英特之士鮮有不淪於異端者不特一汲黯而已是可歎也元光二年鴈門馬邑豪聶一因大行王恢言胸奴初和親親信邊可誘以利致之伏兵襲虜必破之道也詔問公卿曰朕飾子女以配單于金幣文繡賂之甚厚單于待命加嫚侵盜無已邊境被害朕甚閔之今欲舉兵攻之何如大行王恢建議宜擊夏六月御史大夫韓安國為護軍將軍衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出六月軍罷將軍王恢坐首謀不進下獄死中國之所以異於夷狄者有德以懷之有信義以服之耳漢與胸奴和親固已大繆安有許之未幾遂乘其親信而誘致之而設伏以襲擊之者是捐子女為餌行險以徼幸也市井狙詐之徒猶或知恥曽謂堂堂中國而忍為之乎小人不顧大體挑釁誤國大抵若是言之可為哀痛自時厥後四十年間胸奴入上谷鴈門者各四入代定襄者各三入漁陽五原者各二入遼西上郡右北平者各一虛內事外嵗尋干戈海內蕭然戶口減半恢實啓之也或曰由此遂絶和親似未為失曰必欲絶之豈無其道而因之以為餌是奚可也五年女巫楚服等教陳皇后祠祭厭勝挾婦人媚道事覺上使御史張湯窮治之湯深竟黨與相連及誅者三百餘人楚服梟首於市乙巳賜皇后册收其璽綬罷退居長門宫周官閽人掌守王宫之中門之禁竒服怪民不入宫先王防患之意微矣大抵邪術左道惟婦人最為易惑妖巫幻婦一入於內未有不為其所變亂者雖閭巷士庶以至公卿大夫之家皆當嚴之况天子宫禁乎楚服之事可以監矣而他時復有祭木人度厄者入之而卒以稔成巫蠱之禍此皆武帝自信妖妄有以致之也可不戒哉上為竇太主置酒宣室使謁者引內董偃是時中郎東方朔陛戟殿下辟戟而前曰董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋方積思於六經偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲是乃國家之大賊人主之大蜮其罪三也上默然不應良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以豎刁為淫而易牙作患慶父死而魯國全上曰善有詔止更置酒北宫引董君從東司馬門入賜朔黃金三十斤董君之寵由是日衰是後公主貴人多踰禮制矣東方朔以詼諧侍左右而侃侃之論如此良可喜也武帝才髙而過失最多一時進用往往皆快心逞意之徒務投所好以相從諛鮮有正救之者茍正救之亦自能聽向使在廷隨事納忠皆如斯言之侃侃則武帝必不至於己甚每見東甌告急聶一設詐可否兩端初不自決非莊助王恢啓其端萌而鼓其狂念安有後日窮征逺討之禍哉類而推之可為浩歎者多矣愚是以有感於朔而重為武帝惜云元朔五年以公孫𢎞為丞相封平津侯丞相封侯自𢎞始𢎞性意忌外寬內深諸嘗與𢎞有隙無近逺雖陽與善後竟報其過董仲舒為人亷直以𢎞為從諛𢎞嫉之膠西王端驕恣數犯法所殺傷二千石甚衆𢎞乃薦仲舒為膠西相仲舒以病免汲黯常毁儒面觸𢎞𢎞欲誅之以事乃言上曰右內史界部中多貴人宗室難治非素重臣不能任請徙黯為右內史上從之內君子而外小人是君子小人皆得位也故泰內小人而外君子是小人君子皆失位也故否一相當國而使君子不容於內則時事可知矣邪正不並立是非難兩存小人之情惟恐君子之不利於己也而厄之百方而擠之是故屏逺竄逐使人主終身不見其面然後惟吾所為無不可者豈容一日安於朝廷之上哉武帝之有汲黯董和如麒麟鳳凰真希世之瑞公孫𢎞為丞相方開東閣以延賢人而首以危機中之不知所延者果何賢乎史氏謂其意忌報隙愚謂雖無隙𢎞亦不容也大將軍青雖貴有時侍中上踞厠而視之丞相𢎞燕見上或時不冠至如汲黯見上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此大抵端方之士足以使人敬而每難於使人親無他不能隨徇相媚悅故也武帝放浪馳縱而獨斂然於黯如此非有以使之心服不至是然在武帝亦豈不甚可喜哉及取黯始末觀之往往以數直諫不得久居位聞多欲之語則怒變色聞積薪之喻則怒其言益甚諫匿馬則為之默然諫賈人市者坐當死則以為復妄發諫廟歌則不説諫殺士則信其為愚後既免官投間田園起守淮陽竟死於外願為中郎出入禁闥補過拾遺而不可得矣則是雖敬而實未嘗用也得非嚴憚有素而未必真知所敬歟向使以其敬黯者用黯則賢人得路而天人治矣寧肯甘心公孫𢎞張湯之儔乎六年是時漢比嵗發十餘萬衆擊胡斬捕首虜之士受賜黃金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉於是大司農經用竭不足以奉戰士六月詔令民得買爵及贖禁錮免贓罪置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵至千夫者先得除為吏吏道雜而多端官職耗廢矣左氏傳曰天生民而立之君使司牧之勿使失性書曰四征弗庭綏厥兆民是故制兵以威不軌無非所以衛吾赤子也東夷西戎南蠻北狄謂之四海上世聖王所以柔逺人者豈窮征討利開拓云哉服則懷之叛則威之使外內有截不為民害則已耳武帝竭中國之力以逞其好大喜誇之志通西南夷東置滄海北築朔方郡嵗出擊胡動十餘萬驅生靈就鋒鏑瀝膏血事荒逺大農費匱掊取百端後雖胸奴逺遁幕南無王庭而海內則蕭然矣尺寸之地不知其為幾萬萬民命之市也悲夫元狩三年上招延士大夫常如不足然性嚴峻羣臣雖素所愛信者或小有犯法或欺罔輒按誅之無所寬假汲黯諫曰陛下求賢甚勞未盡其用輒已殺之以有限之士恣無已之誅臣恐天下賢才將盡陛下誰與共為治乎黯言之甚怒上笑而諭之曰何世無才患人不能識之耳茍能識之何患無人夫所謂才者猶有用之器也有才而不肯盡用與無才同不殺何施黯曰臣雖不能以言屈陛下而心猶以為非願陛下自今改之無以臣為愚而不知理也上顧羣臣曰黯自言為便辟則不可自言為愚豈不信然乎趙簡子使聘孔子孔子至河聞簡子殺竇犫鳴犢及舜華乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇犫鳴犢舜華晉之賢大夫也丘聞之刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳳凰不翔其邑何則君子違傷其類也鳥獸之於不義尚知避之况於人乎上有殺賢之主則知幾之士有遁而已矣賢者逺遁而無恥之徒競進况觸刑辟以誅戮者皆赴火之蛾也鴻飛冥冥弋人何慕黯也不明斯義而恐賢才將盡無與共為治嗚呼果賢者乎武帝將不得而有也矧可得而殺也若乃貪夫嗜利萬死不顧其身雖殺之豈有盡乎宜武帝之不患無人而反笑黯為愚也主父偃始從齊來一嵗驟用大臣畏其口賂遺纍千金或謂大橫偃曰吾生不五鼎食死即五鼎烹耳明年竟以齊事遭族甚矣武帝之忍於殺士而欺人之徒忍於自殺其身也此可以觀矣四年冬有司言縣官用度大空而富商大賈冶鑄煮鹽財或絫萬金不佐國家之急請更錢造幣以贍用而摧浮淫并兼之徒是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺緣以藻繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫為白金三品大者圜之其文龍直三千次方之其文馬直五百小者橢之其文龜直三百令縣官銷半兩錢更鑄三銖錢盜鑄諸金錢罪皆死而吏民之盜鑄白金者不可勝數於是以東郭咸陽孔僅為大農丞領鹽鐵事桑𢎞羊以計算用事咸陽齊之大煮鹽僅南陽大冶皆致生絫千金𢎞羊洛陽賈人子以心計年十三侍中三人言利事析秋毫矣詔禁民敢私鑄鐵器煮鹽者􅎂左趾沒入其器物公卿又請令諸賈人末作各以其物自占率緡錢二千而一算及民有軺車若船五丈以上者皆有算匿不自占占不悉戍邊一嵗沒入緡錢有能告者以其半畀之其法大抵出張湯湯每朝奏事語國家用日晏天子忘食丞相充位天下事皆決於湯百姓騷動不安其生咸指怨湯武帝之虛耗原於文景之恭儉何者省費尚朴身先天下兩君相繼凡四十年粟腐貫朽海內殷富非天雨而鬼輸也武帝嗣服但見財用豐衍而不知其所自來是以胸膽開張耳目盈蕩恣所欲為而不暇計其後譬如膏粱之子狃於貴盛侈費無藝意氣咈然以妄為常難可復斂一有不給遂至刻剝茍求賣田宅貨簪珥什物以繼其欲而弗悟斯武帝之謂矣周公作無逸首陳稼穡之艱難而七月一詩下至男耕女桑蔬果生菹之候纖悉無所不具正恐成王年少驟處盈盛之運而侈心易生也經曰民為邦本又曰上以厚下安宅武帝虛內而事外危國命而戰逺夷經用大空窘無以繼輪臺之悔可以速下矣乃方甘心酷吏殘虐於上計析秋毫之徒搜獵於下縱豺虎羔犢之羣而莫恤烏在其為民父母也繼世之少主其毋怵於目前之殷富而自效其侈心哉六年大農令顔異誅初異以亷直稍遷至九卿上與張湯既造白鹿皮幣問異異曰今王侯朝賀以蒼璧直數千萬其皮薦反四十萬本末不相稱天子不説張湯又與異有隙及人有告異以他事下張湯治異異與客語初令下有不便者異不應微反脣湯奏異當九卿見令不便不入言而腹誹論死自是之後有腹誹之法比而公卿大夫多諂諛取容矣欲加之罪何患無辭若湯之殺顔異真可謂無辭矣使有可議寧當至腹誹乎益足以驗異之賢而湯之巧詆凶殘無狀也自古小人用事必先設法以鉗人之口腹誹且死况敢有公言卿大夫諂諛取容一律而從湯矣為人君者曷亦謹所信任哉後二年湯竟有罪自殺因厯觀酷吏傳少有得其死者殺人之事習熟於君之耳目即教君以殺已之道也出爾反爾信哉是言元鼎四年初條侯周亞夫為丞相趙禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深不可以居大府及禹為少府比九卿為酷急至晚節吏務為嚴峻而禹更名寬平中尉尹齊素以敢斬伐著名及為中尉吏民益雕敝是嵗齊坐不勝任抵罪上乃復以王溫舒為中尉趙禹為廷尉後四年禹以老貶為燕相漢家寬厚之風始於髙而成於文而刻薄之禍則兆於景而成於武髙帝以寬大長者扶義而西入關之初定三章之約文帝尚愷弟除肉刑一時將相莫不務為寬厚恥言人過禁罔疏闊幾至刑錯景帝繼之雖減笞法而刻薄之禍則已兆矣何者景帝之刻薄兆於朝錯之術數也至於武帝遂極慘酷而數十年寬厚之風無復影響宣帝中興踵武相繼刑名繩下守為家法滔滔焰焰降以不返嗚呼一代之風俗有一人焉成之必有一人焉壞之成壞之變雖係乎君德之隆汙而成壞之機則關乎君子小人之用舍吁甚可懼也愚是以觀趙禹之始末上下世變而為之重歎云是時吏治皆以慘刻相尚獨左內史兒寬勸農桑緩刑罰理獄訟務在得人心擇用仁厚士推情與下不求名聲吏民大信愛之收租稅時裁闊狹與民相假貸以故租多不入後有軍發左內史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶課更以最上由此愈竒寬自古賢哲無往而不行其志謂有所扼而不得行者殆非也是故可仕而仕行之於致君澤民者此志也可遁而遁行之於挂冠納履者亦此志也不幸居危邦事亂君義不可去而不得去雖如龍逢比干死於諫諍而此志亦未嘗不行也故曰素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難安有居官任責不能盡其職分而但歸咎於時之不可為哉此無他中無定守志在隨人汙濁相挺合為一律是以剝下媚上貪得患失而不暇顧其非義耳當時吏治慘刻相尚如在湯鼎中兒寬職居三輔一境之民盎然春風和氣乃如此不特終能免禍而上亦且竒之孰謂乖時礙俗而為君子者果不可以行其志也元封二年上以旱為憂公孫卿曰黃帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎黃帝古聖人也通變宜民垂衣裳而天下治舟車門柝臼杵弧矢之利所以取象於易者無非生民日用之常豈迂僻幻怪遊方之外者哉孔子定書討論墳典髙辛而上皆在所略非以其怪誕而略之也墳言大道典言常道古聖相傳初無異旨特以上世洪荒垂世立教者未備孔子將取之以示百王之標凖萬世不刋之鵠的故斷自唐虞以還下訖於周耳周禮周公之大訓也儻涉怪誕則三皇五帝之書曷為而掌之外史乎戰國縱橫異端蝟起凡託黃帝以名書者如道如名如隂陽如小説如醫卜神仙之類不一而足至若封禪登天恍蕩不根之論漢之方士往往率類聚而歸焉是何誣黃帝之甚也使古聖而行封禪則二帝三王行之矣血祭五嶽聖經具在不聞封禪之名况又有所謂乾封者乎君能以旱為憂此正恐懼修省之端羣臣所宜盡忠警告使之改過進德以弭天變公孫卿何人而敢為誣妄如許欺君欺天以欺天下而帝亦安受其詐言之不怍吁抑愚矣哉三年定朝鮮為樂浪臨屯玄菟真畨四郡玄菟樂浪本箕子所封昔箕子居朝鮮教其民以禮義田蠶織作為民設禁八條相殺以當時償殺相傷以穀償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售是以其民終不相盜無門户之閉婦人貞信不淫辟其田野飲食以籩豆都邑頗倣效吏往往以杯器食郡初取吏於遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄今於犯禁寖多至六十餘條孟子曰惻隱之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之陸文安公亦云東海有聖人出焉此心同也此理同也南海有聖人出焉此心同也此理同也西海北海有聖人出焉此心同也此理同也是故有是心而自謂不能者自賊者也事是君而謂其君不能者賊君者也治是民而謂其民不能者賊民者也建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑昭然灼然不可誣也夫安有中國夷狄之異哉在為人上者所以教化之何如耳朝鮮逺在海外一被箕子之澤而習俗醇美如此况生長二帝三王衣冠禮樂之地而有不可化者哉雖然國風所刺去周先王未逺也而敗俗亂倫言之可為羞赧武帝去箕子且千年而餘風遺韻如出一日豈中國之民反不如夷狄而諸大聖人之教曽一箕子之不若乎無他海島而居質實朴野一國之內自為風俗耳目無所慘心志無所蕩而醇氣美質無所凋喪是以一習其教世守而不變非有意於守也安於日用之常而自不變也中國乃不然教化一衰情偽相鑿姦聲亂色浮靡百端凡接於目而感於耳者無非害心蕩志之具益熾益烈如火焰焰益流益下如水滔滔先王之教所以易壞而中國之俗反不若逺夷之美且久者抑其勢之所必致歟且愚於是而有感矣心無有不良性無有不善固也然而進德甚難趨惡甚易猶之詩書禮義之族耳目日熟乎賢人君子之事非不美矣不幸而有小人焉倡之往往決壞隄防順流東注而不可遏夫以千載箕子之國而敗於一日遼東之小吏不知一壞而有能復返之者否乎如箕子闕能復可久乎愚是以於俗稍益薄之語痛傷風敗教之端而為之重歎也五年上以名臣文武欲盡乃下詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫泛駕之馬跅弛之士亦在御之而已其令州郡察吏民有茂材異等可為將相及使絶國者武帝取士而以跅弛為的抑何異也夫人主之好惡風俗之樞機上以跅弛求之下亦跅弛而奔之相延成風聲生氣化如是而望士習之美為邦家之光寧有是理也哉舜大聖人首舉元凱生乎百世之下而坐想宣慈惠和明允篤誠之美猶藹然如春風和氣之襲人如參芩耆术之可以養生如麒麟鳳鳯之出為世瑞也周公告成王一則曰其惟吉士二則曰其惟克用常人而詩人亦以藹藹王多吉士藹藹王多吉人稱之然則太和之在唐虞成周亦惟聖明在上而所用者固太和之人耳雖然其教之也有道其養之也有素故其用之也隨所取而皆君子後世不養不教不惟德行之是選而徒跅弛以快非常之用平居無事狂縱叫呼任俠妄行不可檢束一旦有釁則從臾而出聚為羣盜謀僭亂姦典憲殺身赤族而不顧者皆此跅弛之謂矣用舍之際曷亦謹其的哉兩漢筆記卷四
