body:
  text: 兩漢筆記卷十一宋錢時撰安帝詔告司𨽻校尉河南尹南陽太守曰每覽前代外戚賓客濁亂奉公為民患苦咎在執法怠懈不輙行其罰故也今車騎将軍隲等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢敕勿相容䕶自是親屬犯罪無所假貸觀此檢敕之詔則鄧氏賢於章后逺矣雖然與其繩法孰若教之以禮與其貴驕而冒禁孰若退而不納於邪鄧氏臨朝首進兄弟定簾大事謀諸禁中日長炎炎卒貽後禍視隂馬何如也愚是以三復此詔太息而書之尚書郎南陽樊凖以儒風浸衰上疏曰臣聞人君不可以不學光武皇帝受命中興東西誅戰不遑啟處然猶投戈講蓺息馬論道孝明皇帝庶政萬機無不簡心而垂情古典遊意經蓺毎饗射禮畢正坐自講諸儒並聽四方欣欣又多徵名儒布在廊廟每讌㑹則論難衎衎共求政化期門羽林介胄之士悉通孝經化自聖躬流及蠻荒是以議者毎稱盛時咸言永平今學者益少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭臣愚以為宜下明詔博求幽隱寵進儒雅以俟聖上講習之期太后深納其言詔公卿中二千石各舉隱士大儒務取髙行以勸後進妙簡博士必得其人新君少主紹承大統而縉紳之論首以崇儒講學為先可謂知所務矣雖然論學而不以堯舜禹湯文武為的非帝王之所謂學也夫告君而拳拳於法祖宗自三代莫不皆然夏祖禹商祖湯周祖文武皆聖人也其學皆聖學也其政皆聖政也其守之以為家法固也若孟子談王道於戰國而亦使之視乃厥祖可乎是故言必稱堯舜而非堯舜之道則不敢陳於王前一脈相承如薪傳火無他道也自漢以下創業垂統紀綱法度豈無可遵守者而繼體之主建議之臣例謂祖宗不足法則固未可樊準論學而亦獨指光武明帝為標準是焉知堯舜禹湯文武眞所謂帝王之學者哉永初二年夏旱五月丙寅皇太后幸洛陽寺及若盧獄録囚徒洛陽有囚實不殺人而被考自誣羸困輿見畏吏不敢言将去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宫澍雨大降母后臨朝已非古典况親臨獄戸録囚徒者乎司寇得人式敬由獄将使天下舉無寃民苦也受王嘉師淫刑以逞則海宇之廣不得其平者多矣豈一婦人耳目所能遍及逞小慧於犴狴失大體於宫庭非所以為訓也且自臨朝水旱十載盜賊内起四夷外侵隂盛陽衰昭乎可驗而史氏獨書澍雨為一囚之應何哉四年鄧隲在位頗能推進賢士𢎞農楊震孤貧好學明歐陽尚書通達博覽諸儒為之語曰關西孔子楊伯起教授二十餘年不荅州郡禮命衆人謂之晚暮而震志愈篤隲聞而辟之時震年已五十餘累遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王密為昌邑令夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知地知我知子知何謂無知者密愧而出後轉涿郡太守性公亷子孫常蔬食步行故舊或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎曾子曰十目所視十手所指其嚴乎子思亦曰君子所不可及者其唯人之所不見乎不睹不聞常戒常懼所以為謹獨之學也凡小人之為不善其始未嘗不幸人之不知而隂為之遂至為姦為宄為賊為盜無所不為楊震不受饋金未為髙節而何謂無知之語則誠士大夫律已之端常存此心内省不疚暗室屋漏無異十目十手之時則庶乎其不欺矣延光元年汝南太守山陽王龔政崇寛和好才愛士以袁閬為功曹引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏閬不修異操而致名當時蕃性氣髙明龔皆禮之由是羣士莫不歸心憲世貧賤父為牛醫潁川荀淑至愼陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閬所未及勞問逆曰子國有顔子寧識之乎閬曰見吾叔度邪是時同郡戴良才髙倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度自以為無不及既覩其人則瞻之在前忽焉在後固難得而測矣陳蕃及同郡周舉常相謂曰時月之間不見黄生則鄙吝之萌復存乎心矣太原郭泰少游汝南先過袁閬不宿而退進往從憲累日方還或以問泰曰奉髙之器譬諸氿濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也憲初舉孝亷又辟公府友人勸其仕憲亦拒之暫到京師即還竟無所就年四十八終三代而下人才莫盛於漢季嗚呼人才之盛世道之衰也何者明王不作羣邪用事士君子激於時變發於忠憤而風節著焉此豈得已也哉然大抵多激切而少寛平饒鋒鋩而乏醖藉日胎月醖竟成黨錮之禍蓋有由矣惟黄叔度渾然圭角即之者不見其涯涘是雖天姿粹美大璞不瑕然非涵養履踐有自得之功亦未易至此惜乎其言不傳無以觀所學之淺深耳史氏謂淵乎其似道未為知憲之論也三年初樊豐周廣謝惲等見楊震連諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木各起冢舍園池廬觀役費無數震復上疏曰臣備台輔不能調和隂陽去年十二月四日京師地動其日戊辰三者皆土位在中宫此中臣近官持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝拄而已而親近倖臣未崇斷金驕溢踰法多請徒士盛修第舍賣弄威福道路讙譁地動之變殆為此發又冬無宿雪春節未雨百僚焦心而繕修不止誠致旱之徵也唯陛下奮乾剛之徳棄驕奢之臣以承皇天之戒震前後所言轉切帝既不平之而樊豐等皆側目憤怨以其名儒未敢加害㑹河間男子趙滕上書指陳得失帝發怒遂收考詔獄結以罔上不道震上疏救之曰臣聞殷周哲王小人怨詈則還自敬徳今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不聽騰竟伏尸都市及帝東巡樊豐等因乗輿在外競修第宅太尉部掾髙舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等惶怖㑹大史言星變逆行遂共譛震云自趙騰死後深用怨懟且鄧氏故吏有恚恨之心壬戌車駕還京師便時大學夜遣使者䇿收震太尉印綬震於是柴門絶賓客豐等復惡之令大鴻臚耿實奏震大臣不服罪懷恚望有詔遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰死者士之常分吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祀因飲酖卒𢎞農太守移良承樊豐等旨遣吏於陜縣留停震喪露棺道側讁震諸子代郵行書道路皆為隕涕是時朝廷為羣小之窟宅獨一楊震盡忠竭節極言排救上章數四切中膏肓之病若能聽納用其規模則一轉移可以丕變而竟擠死於嬖悻之手則天下大勢不必復置論矣雖然尚有可議者永寧元年震為司徒明年太后崩而王聖及李閏江京之謀行位居大臣為國梁棟所宜防微杜漸遏其端萌外正朝綱内清宫掖而乃坐視羣小鼓君聽執國命親王貴戚誅斥惟意而不能早為之所逮其事定根據權要乃方呶呶然爭於頰舌之間則已後矣首論王聖再論劉瓌言既不行徒招忿恚去就之義亦冝早決後二年太尉復論王聖等之起第舍明年又極論樊豐等之弄威福空言無濟其跡遂危臨将飲酖乃始歎曰疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月此君子之論所以惜之而於震猶有所未滿也右安帝在位十九年崩年三十二順帝北鄉侯病篤中常侍孫程謂濟隂王涓者長興渠曰王以嫡統本無失徳先帝用䜛遂至廢黜若北鄉侯不起相與共斷江京閻顯事無不成者渠然之又中黄門南陽王康先為太子府史及長樂太官丞京兆王國等並附同於程江京謂閻顯曰北鄉侯病不解國嗣宜以時定何不早徵諸王子簡所置乎顯以為然辛亥北鄉侯薨顯白太后秘不發喪而更徵諸王子閉宫門屯兵自守十一月乙卯孫程王康王國與中黄門黄龍彭愷孟叔李進王成張賢史汎馬國王道李元楊佗陳予趙封李剛魏猛苗光等聚謀於西鐘下皆截單衣為誓丁巳京師及郡國十六地震是夜程等共㑹崇徳殿上因入章臺門時江京劉安及李閏陳達等俱坐省門下程與王康共就斬京安達以李閏權執積為省内所服欲引為主因舉刃脅閏曰今當立濟隂王無得揺動閏曰諾於是扶閏起俱於西鐘下迎濟隂王即皇帝位時年十二戊午遣使者入省奪得璽綬帝乃幸嘉徳殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄誅家屬皆徙比景遷太后於離宫己未開門罷屯兵壬戌詔司𨽻校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸封孫程等皆為列侯程食邑萬户王康王國食九千戸黄龍食五千戸彭愷孟叔李建食四千二百戸王成張賢史汎馬國王道李元楊佗陳予趙封李剛食四千戸魏猛食二千戸苗光食千戸是為十九侯加賜車馬金銀錢帛各有差李閏以先不豫謀故不封擢孫程為騎都尉宦官定䇿此天地之大變自古所未有也尚忍言之然尋其禍根則自鄭衆始矣何者竇氏之誅獨謀於衆由是宦官用事得以制外戚之死命一舉而竇再舉而鄧又再舉而閻而天子廢置遂出於其手十九侯之事豈一朝一夕之故哉雖然其血脈源流又有自來也伊周不可見矣僅得顧命大臣如霍光者受先君之託雖百鄭衆亦何能為惟夫嗣君童幼母后擅朝是以閹腐得志宫庭玩天子如嬰孩竊弄神器若掌股間物矣是可歎也或曰濟隂王保既以讒廢太后欲久專國貪立幼年向微孫王之徒則天下事殆有大可慮者似亦未容輕議也曰小人出而執國命豈皆悖繆而天下之權歸之當人心憤鬱不平之日其所舉錯亦必有深愜乎天下之公論然後時君世主甘心而聽命焉竇氏之姦不異王莽謂非鄭衆之力則固未可嗚呼綱淪法斁世道陵遲無大君子底柱頹波而使小人焉有功於天下太阿之柄因以不返此愚所以又歎也司空劉授以阿附惡逆辟召非其人䇿免楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎贈錢百萬以禮改葬於華隂潼亭逺近畢至有大鳥髙丈餘集震喪前郡以状上帝感震忠直詔復以中牢具祠之士大夫立乎人之本朝凡今日所為當使後日可觀貪目前之微榮負天下之清議茍一時之寵利遺萬世之羞辱由君子觀之不翅犬豕之處泥塗蛆蠅之在糞溷彼方洋洋自以為得志吁可哀也已延光二年楊震為太尉耿寳閻顯薦人於震不從司空劉授聞之即辟此二人由是震益見怨愚每觀此使人唾斥不暇小人情状其可惡一至於此俱位三公事同一體所宜戮力秉公持正共振朝綱翊扶宗社而乃背忠直而從邪媚權貴而取容一敗塗地禍不旋踵是非善惡白黑昭然因念世間若無公論則盜跖而夷齊矣寵辱之境曷審思焉陽嘉二年六月丁丑洛陽宣徳亭地拆長八十五丈帝引公卿所舉敦樸之士使之對策及特問以當世之敝為政所宜李固對曰臣伏在草澤痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘貴爵之寵然上畏天威俯案經典知義不可故不封也今宋阿母雖有大功勤謹之徳但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虛必有遜讓陛下宜許其辭國之髙使成萬安之福夫妃后之家所以少完全者豈天性當然但以爵位尊顯顓總權柄天道惡盈不知自損故至隕仆先帝寵遇閻氏位號大速故其受禍曽不旋時老子曰其進銳者其退速也今梁氏戚為椒房禮所不臣尊以髙爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲埶振天下子弟祿仕曾無限極雖外託謙默不干州郡而諂僞之徒望風進舉今可為設常禁同之中臣又曰譬之一人之身本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患也又曰宜罷退宦官去其權重裁置常侍二人方直有徳者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致上覽衆對以李固為第一即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦者皆疾之詐為飛章以陷其罪事從中下大司農南郡黄尚等請之於梁商僕射黄瓊復救明其事久乃得釋出為洛令固棄官歸漢中觀順帝一覽李固之對即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然其是非之心果決不疑如此亦豈不足與有為哉然而固也終被誣陷不能以一朝安無他病在腹心故也當是時宦官挾定䇿之功后族怙宫闈之寵根據内外禍蟠腹心左雄黄瓊李固周舉之徒極言竭論號于王庭非不足以快一時之公論而天下大勢終無補益朝廷之上小人為之主宰開陳者愈切而嫉之者愈深正救者愈力而害之者愈甚耳自非英明之主天徳剛健篤信讜忠洞昭姦回使之言行而不讒身安而不及於禍未見其可也漢安元年遣侍中河内杜喬周舉守光禄大夫周栩馮羨魏郡欒巴張綱郭遵劉班分行州郡表賢良顯忠勤其貪汙有罪者刺史二千石驛馬上之墨綬以下便輒收舉喬等受命之部張綱獨埋其軍輪於雒陽都亭曰豺狼當路安問狐狸遂劾奏大将軍冀河南尹不疑以外戚䝉恩居阿衡之任而專肆貪叨縱恣無極多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦時皇后寵方盛諸梁姻族滿朝帝雖知綱言直不能用也張綱之言可謂膏肓之鍼砭順帝省悟思所以處之則當時沈痼可以立起奈之何其不能用也然嘗思之帝方溺於寵愛無剛明之斷而冀之跋扈亦豈遂甘心於盡言者玩此辭㫖沈痛深切勇往突發雖殺身有所不顧是殆激於忠憤孟浪之言耳揆之事勢斷斷乎其未必有濟也因觀自古聖賢遭時間關而所以行其志者不一端而足居危邦事亂君心知其不可而義不容於自嘿者比干之諫死是也諫不行言不聽而義不可以不去者孔子之不稅冕而行是也亦有處危疑變故而事難於直遂必從容委曲而後濟者狄仁傑之於武后陸贄之於徳宗是也則天固敬梁公者然隂禍險猾之姿篡李以武易唐而周當是時也不勝一朝之忿力抵峻拒觸槐折檻以伸其耿耿之忠則非特不能有濟激變誤事身且不保如宗社何哉徳宗猜忌之主也宣公當國步方艱之日不能委蛇曲折以伸其志首為激烈犯其所忌則不惟後日之言無自而投而忠州之行固不待變故甫定之後也大抵盡言難受人情所同朋友有過義當忠告亦必紆餘委曲使吾言之獲伸而後可以藥其病縱未遽從亦未至於齟齬尚可從容繼進庶幾其或悟也譬之醫然不察虛實補㵼之宜首投毒烈之劑而暴下之元氣一敗勢不可為雖有金丹大藥亦無所用矣况臣之事君乎文帝愛賈誼辭博一歲中超遷至中大夫不可謂不逢知主矣大聲疾呼盡發其藴於一旦之頃抑何躁也善乎蘇文忠公之言曰絳侯親握天子璽而授之文帝灌嬰聯兵十萬以決劉吕之雄雌又皆髙帝之舊将此其君臣相得之分豈特父子骨肉手足哉一旦欲使之盡棄其舊而謀其新亦已難矣為賈生者上得其君下得其大臣如絳灌之屬優游漸漬而深交之使天子不疑大臣不忌然後惟吾所為無不可者此語雖未純正實亦處賈生之至論也故愚每觀後世新君少主有樂善之誠心而公卿大臣尚知有尊君子之美意當此之時斷非委曲不可剛方正直之士雖有甚不平於中且須就其誠心而輔養之因其美意而将順之使君徳日新善類無壅遲之歲月何事不濟乃若一旦傾倒以快其所欲言幸而聽納悉如吾意猶恐忌惡指為朋黨不然則将求一日安於朝廷之上不可矣果何益於人之國乎世衰道微阿諛承迎以茍富貴利達乞墦間之祭而不知恥者比比皆是埋輪直節豈易多見然士君子之行世忠君愛國有不容不深長思者愚是以極言之右順帝在位十九年崩年三十一沖帝太子即皇帝位年二歲太后臨朝以太尉趙峻為太傅大司農李固為太尉參録尚書亊人才者國之元氣也梁后臨朝首用李固此意豈不甚美若一於信任勿有間之使得以展其所藴則雖主少國危尚可扶命脈於将墜豈不猶幸矣哉天下之患莫大乎名尊君子而實小人執其權寵之以祿爵而不任之以事也當是時有梁冀在雖百李固亦不能如之何耳雖然冀也一旦感悟斂然退聽處無用之地就君子之規模則家安而國家可保奈之何其終迷而不改也悲夫右沖帝即位六月崩年三歲質帝徵清河王蒜及渤海孝王鴻之子纉皆至京師清河王為人嚴重動止有法度公卿皆歸心焉李固謂大将軍冀曰今當立帝宜擇長年髙明有徳任親政事者願将軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從與太后定䇿禁中迎纉入南宫封為建平侯其日即皇帝位年八歲蒜罷歸國姦臣擅命惟恐長君之不利於己雖禍敗天下有所弗恤然以愚觀之其為利葢莫大於長君也立長立徳宗社奠安前有定䇿之功後無居寵之咎不特長守富貴免於刑戮而宗族親黨亦同保光榮而無禍矣其為利孰有大於此者乎貪立幼弱禍不旋踵覆轍相繼終已弗悟可為萬世戒也太后委政宰輔李固所言太后多從之黄門宦官所惡者一皆斥遣天下咸望治平而梁冀深忌疾之初順帝時所除官多不以次及固任事奏免百餘人此等既怨又希望冀㫖遂共作飛章誣奏固曰大尉李固因公假私依正行邪離間近戚自隆友黨大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿槃旋偃仰從容冶步曽無慘怛傷悴之心山陵未成違矯舊政善則稱已過則歸君斥逐近臣不得侍送作威作福莫固之甚矣夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟書奏冀以白太后使下其書太后不聽李固之斥逐羣小是矣朝路肅清公論允協是宜天下翕然有治平之望然禍根不除而但翦其枝葉同惡相黨如捍頭目豈一太后所能主張哉賢人君子不幸而遇斯時欲行其志祗以速禍是可悲也右質帝即位一年為梁冀所弑年九歲兩漢筆記卷十一
