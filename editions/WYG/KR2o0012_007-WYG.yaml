body:
  text: 兩漢筆記卷七宋錢時撰元帝初元元年上素聞琅邪王吉貢禹皆明經潔行遣使者徵之禹至拜為諫大夫上數虚已問以政事禹奏言唯陛下深察古道從其儉者大減損乗輿服御器物三分去二擇後宫賢者留二十人餘悉歸之及諸陵園女無子者宜悉遣廏馬可無過數十匹獨舍長安城南苑地以為田獵之囿以方今天下饑饉可無大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娯樂而已也天子納善其言下詔令諸宫館希御幸者勿繕治太僕減榖食馬水衡省肉食獸此正人君進德第一機㑹元帝自為太子已知好儒一即位而貢禹首以明經潔行徴用又上之所素聞者此其傾心祈向豈區區細故末務也哉闡聖學之精㣲明本心之固有蔽解惑去天德昭融是非瞭然邪正自辨特達剛果發於實見雖柔而能立雖懦而能斷矣帝也虚已有問而禹以節儉為請夫節儉固當務也而帝王之學所以清源正本則又有在所當急者病者切於求醫而不能察病之標本昧其藥之所當用何貴於醫哉非不欲治病也欲治病而無其方也是故愈太甲成王之疾者必伊周而後可也二年樂陵侯史高以外屬領尚書事前將軍蕭望之光禄大夫周堪為之副望之名儒與堪皆以師傅舊恩天子任之數宴見言治亂陳王事望之選白宗室明經有行散騎諌大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸導上以古制多所欲斥正上甚郷納之史高充位而已由此與望之有隙中書令𢎞恭僕射石顯自宣帝時久典樞機明習文灋帝即位多疾以顯久典事中人無外黨精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能深得人主㣲指内深賊持詭辨以中傷人忤恨睚眦輙被以危灋亦與車騎将軍髙為表裏論議常獨持故事不從望之等望之等患苦許史放縦又疾恭顯擅權建白以為中書政本國家樞機宜以通明公正處之武帝逰宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人之義由是大與髙恭顯忤上初即位謙讓重改作議久不定出劉更生為宗正君德以剛明為貴而元帝病於弱固不足與有為也然觀其一聞貢禹之言而納善之委用蕭望之周堪之徒而鄉納之猶知儒之當好賢者之當親不猶愈於剛愎自用者乎向使望之諸賢常在其左右雖未能大有為於天下抑亦可與為善也惜乎知儒而不知逺佞小人之言一入而君子之迹遂危每見恭顯之殺望之未嘗不為悲痛元帝一代事體於此乎決矣粤自趙髙亡秦而漢氏宦官之禍實自恭顯之典樞機始孝宣謂亂我家者太子也孰知亂太子者乃孝宣歟永光元年秋上酎祭宗廟出便門欲御樓船薛廣德當乗輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣不説先敺光禄大夫張猛進曰臣聞主聖臣直乗船危就橋安聖主不乗危御史大夫言可聽上曰曉人不當如是邪乃従橋臣之進諫志在聽從委曲開陳豈無其道不幸而居亂邦事亂君如龍逢比干之遭殺此豈人道人之所願哉每見後世號為切直而無𠂻忱惻怛以感動之突發直前殺身不顧以至激人主之怒敗天下之事者多矣忠君愛國不如是也盡言難受萬古同情施之敵已猶知所擇況君乎切而婉直而不訐精忠所發足以感動而不遽至於忤拂一諌而聽固為大幸不然則再諫之又不然則終諌之期委曲以濟事而後可元帝雖弱甚能納諫但是非邪正無所别白而例聽之此則其不明之故而卒亂於小人之䜛也言一不受便欲自刎若廣德者亦太暴矣石顯憚周堪張猛等數譛毁之劉更生懼其傾危上書曰初元以來六年矣按春秋六年之中災異未有稠如今者也原其所以然者由䜛邪並進也䜛邪之所以並進者由上多疑心既已用賢人而行善政如或譛之則賢人退而善政還矣夫執狐疑之心者來䜛賊之口持不斷之意者開羣枉之門䜛邪進則衆賢退羣枉盛則正士消故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也侫邪與賢臣並在交㦸之内合黨共謀違善依惡潝潝訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也放逺佞邪之黨壊散險詖之聚杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至顯見其書愈與許史比而怨更生等君子與小人並處而小人之黨常勝何也君子剛正而小人巧險故也巧險則易入剛正則難親有虞之朝猶以巧言令色孔壬為畏況庸君乎元帝時在朝非無賢者一小人焉横塞其上以塗其君之耳目雖忠言至論鍼砭膏肓將以安君子之跡而祗以速小人之禍三復劉向此書使人歎悼不能已著其大略為後世深戒云五年上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意匡衡上疏曰陛下聖德天覆子愛海内然隂陽未和姦邪未禁者殆論議者未丕揚先帝之盛功乎言制度不可用也務變更之所更或不可行而復行之是以羣下更相是非吏民無所信臣竊恨國家釋樂成之業而虚為此紛紛也治性之道必審已之所有餘而彊其所不足盖聦明䟽通者戒於太察寡聞少見者戒於壅蔽勇猛剛彊者戒於太暴仁愛温良者戒於無斷湛静安舒者戒於後時廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進惟陛下戒之變亂先王之政刑此自古以為戒也然秦漢而下灋制出於己私真有害民蠧國如鹽鐡均輸𣙜酤緡錢之類不一而足豈可例謂不當改乎但元帝以儒取士而言事者不能以儒學格其非心輔成德性徒紛然變更媚上取容是則可罪耳周公曰古之人猶胥訓告胥保惠胥教誨人無或胥譸張為幻匡衡之言亦未為知本之論也建昭二年石顯威權日盛公卿以下畏顯重足一迹初顯聞衆人匈匈言已殺前將軍蕭望之恐天下學士訕已以諫大夫貢禹明經著節乃使人致意深自結納因薦禹天子厯位九卿禮事之甚備議者於是或稱顯以為不妬譛望之矣彌子謂子路曰孔子主我衞卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環乎自古小人竊位盜權自知清議所不容而附㑹君子為文飾之具者多矣惟安於義命不昏於利欲是以進退裕如不降志辱身染汚非類焉貢禹首以明經召用而竟堕石顯之手名曰禮之而實奴之何望其能正君定國也寵辱之境君子審哉右元帝在位十六年崩年四十二成帝丞相衡上疏曰陛下秉至孝哀傷思慕不絶於心未有逰虞弋射之宴誠隆於慎終追逺無窮已也竊願陛下雖聖性得之猶復加聖心焉詩云煢煢在疚言成王䘮畢思慕意氣未能平也蓋所以就文武之業崇大化之本也臣又聞之師曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關睢為始此綱紀之首王教之端也自上世已來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬逺技能臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也及論語孝經聖人言行之要宜究其意臣又聞聖王之自為動静周旋奉天承親臨朝享臣物有節文以章人倫蓋欽翼祗栗事天之容也温恭敬遜承親之禮也正躬嚴恪臨衆之儀也嘉惠和説饗下之顔也舉錯動作物遵其儀故形為仁義動為灋則今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動静之節使羣下得望盛德休光以立基楨天下幸甚上敬納其言匡衡雖未足道而所陳數事則可為大臣告嗣天子之要論矣三代盛時不聞女禍喜妲襃姒乃始出而䘮邦無他先王擇配必稱其德後世惟欲是從惟聲色是奉滛姣邪僻湛溺荒迷而婦言用矣嗚呼家人一卦利在女正男女正天地之大義也此豈閨門嬖䙝之事乎大哉乾元萬物資始至哉坤元萬物資生元者乾坤之所以合德也后之於君即坤之於乾不得乎元何以配天行健母儀天下乎雖然真知聖經之㫖不悖其本性則事親自孝奉天自敬臨下自莊無非吾本性所自有非由外鑠我也殆不止於配偶而已然則聖經何以能明曰在擇師建始元年石顯遷長信中太僕秩中二千石顯既失倚離權於是丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道死諸所交結以顯為官者皆廢罷司𨽻校尉涿郡王尊劾奏丞相衡御史大夫譚知顯等顓權擅埶大作威福為海内患害不以時白奏行罸而阿䛕曲從附下罔上懐邪迷國無大臣輔政之義皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣乃左遷尊為髙陵令然羣下多是尊者衡嘿嘿不自安每有水旱連乞骸骨讓位上輙以詔書慰撫不許壬子封舅諸吏光禄大夫關内侯王崇為安成侯賜舅譚商立根逢時爵關内侯清君側之惡人此正大臣事匡衡身為丞相方石顯之擅權也則阿附之及其失勢也則從而擠之此何為者哉人心之公是非而已人主之權賞罸而已使其有罪雖大臣何恤儻或無罪雖小臣罸不可以浪加當是時王尊激昻奏劾可謂公議之一伸也嗣服之初大明黜陟與天下更始則一舉錯而權綱振矣奈何不忍重傷大臣而反左遷尊耶顯去未㡬諸王並用而外戚之禍反有甚於佞倖之擅權者此皆暗弱無斷威福不由於己與元帝同一病也河平元年夏四月己亥晦日有食之詔公卿百僚陳得失無有所諱光禄大夫劉向對曰四月交於五月月同孝惠日同孝昭其占恐害繼嗣是時許皇后專寵後宫希得進見中外皆憂上無繼嗣故杜欽谷永及向所對皆及之上於是減省椒房掖庭用度服御輿駕所發諸官署及所造作遺賜外家羣臣妾皆如竟寧以前故事皇后上䟽自陳上采谷永劉向所言災異咎驗皆在後宫之意以報之且曰吏拘於灋亦安足過蓋矯枉者過直古今同之且財幣之省特牛之祠其於皇后所以扶助徳美為華寵也咎根不除災變相襲祖宗且不血食何戴侯也傳不云乎以約失之者鮮審皇后欲從具奢興朕亦當灋孝武皇帝也如此則甘泉建章可復興矣昔文皇帝朕之師也皇太后皇后成灋也假使太后在彼時不如職今見親厚又惡可以踰乎皇后其刻心秉德謙約為右垂則列妾使有灋焉孔子曰君子不以人廢言觀成帝報許后之語的的可為後世灋孰得而訾之哉及其溺於趙氏昭陽舍中肜朱髤漆切皆銅沓冒黄金塗白玉階壁帶往往為黄金釭函藍田璧明珠翠羽餙之自後宫未嘗有焉專寵妬悍掖庭御幸生子者輙死飲藥傷墯者無數何其湛溺不悟與所言相反也使成帝能守初語以禮正家師文懲武為有漢賢君乎何乃至於是乎愚故考求始末而詳書之以其語許后者為之灋以其寵趙氏者為之戒云四年瑯琊太守楊肜與王鳯連昏其郡有災異丞相王商按問之鳯以為請商不聽竟奏免肜奏果寢不下鳯以是怨商隂求其短使頻陽耿定上書言商與父傳婢通及女弟滛亂奴殺其私夫疑商教使天子以為暗昧之過不足以傷大臣鳯固爭下其事司𨽻太中大夫蜀郡張匡素佞巧復上書極言詆毁商有司奏請召商詣詔獄上素重商知匡言多險制曰勿治鳯固爭之夏四月壬寅詔收商丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衞者有司奏請除國邑有詔長子安嗣爵為樂昌侯庸君弱主亦未嘗無特達之見往往有所制而不得遂是可歎也觀暗昧之過不足以傷大臣及知張匡言多險制勿治真見特達豈不甚善向使有聖賢為之輔格其非心成其德性内不荒於聲色外不制於姦邪亦豈不足以有為哉愚嘗謂漢之元成輔之以伊周雖大甲成王可也大甲成王而制於顯鳯是亦元成而已耳腹心之任庸可忽諸鴻嘉三年王氏五侯爭以奢侈相尚成都侯商嘗病欲避暑從上借明光宫後又穿長安城引内灃水注第中大陂以行船立羽盖張周帷楫棹越歌上幸商第見穿城引水意恨内銜之未言後微行出過曲陽侯第又見園中土山漸臺象白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓以謝太后上聞之大怒乃使尚書責問司𨽻校尉京兆尹知成都侯商等奢僣不軌藏匿姦猾皆阿縱不舉奏正灋二人頓首省户下又賜車騎將軍音䇿書曰外家何甘樂禍敗而欲自黥劓正相戮辱於太后前傷慈母之心以危亂國家外家宗族彊上一身浸弱日久今將一施之君其召諸侯令待府舍是日詔尚書奏文帝時誅將軍薄昭故事車騎將軍音籍槀請罪商立根皆負斧質謝良久乃已上特欲恐之實無意誅也威福人主之大權本未始不尊也雖久縦而不收甚弱而不振一旦有能奮其剛健制之自我孰得而違之哉王氏專權其日乆矣觀成帝覽劉向封事歎息悲傷不能如之何及其赫然震怒欲有所為則莫不人人悚懼籍槀負斧質若狐鼠然者誰謂太阿倒持之柄果不可復返也成帝此時亦不必誅之以傷太后之心儻遂黜奪其權罷歸私第而漢家天下自上制之威令一伸姦邪削跡矣惜乎有此機㑹徒䙝其威王氏之禍終焉竊國悲夫綏和元年初何武之為廷尉也建言末俗之敝政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官上從之夏四月賜曲陽侯根大司馬印綬置官屬罷驃騎將軍官以御史大夫何武為大司空封汜鄉侯皆增奉如丞相以備三公焉周官曰立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人其人者論道經邦燮理隂陽之人非大明斯道何以經綸天下何以參贊化育必若周召畢榮者而後可也是故不得其人則闕而不置斷不使之徒具其位焉周禮六典無三公之職至典命則云王之三公八命司士則云三公北面東上射人則掌國之三公孤卿大夫之位方相氏則掌三公孤卿之弔勞盖三公無官特取六卿之中其德足以堪者兼任之周公位冢宰而為太師之類是也是可冒取其名茍居其位而下同有司之事乎自秦以丞相大尉御史大夫為三公而古人設官之意無復影響漢襲其陋終莫之改武帝従伐四夷尊尚武事以大司馬易太尉而其權於是獨尊且重衞青之後如霍如王皆以此掌握天下機宻新莽卒致移國何暇論其他哉觀此三公之建㡬於可笑其後又易丞相為司徒位司馬之下源流不審展轉訛繆不特不識三公之為何官而六卿分職所以配天地四時不可闕者亦不知其為何事矣後世有王者作一洗秦漢以來之陋習捨周官將安歸犍為郡於水濵得古磬十六枚議者以為善祥劉向因是説上宜興辟廱設庠序陳禮樂隆雅頌之聲盛揖讓之容以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非臯陶之法也而有司請定灋削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也教化所恃以為治也刑灋所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫至於䧟大辟受刑戮者不絶由不習五常之道也夫承千嵗之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理不示以大化而獨敺以刑罰終已不改帝以向言下公卿議丞相大司空奏請立辟廱按行長安城南營表未作而罷大學曰身修而后家齊家齊而后國治國治而后天下平孟子亦曰天下之本在國國之本在家家之本在身是故朝廷者四方之綱閨門者風化之原也成帝内惑於孽后外制於權臣怠惰滛荒而天下之亂極矣當時乃方以得古石磬為瑞而劉向因上辟廱禮樂之請夫所謂教化者果若是而可興乎刑于二女舜之教化也刑于寡妻文王之教化也此豈人主身外具文之事而天下所謂不言而同然者其又可以文欺乎劉向平時忠言讜論哀痛懇切足以起漢氏之死禍而帝不能用天下之大勢可知矣至是拳拳乎教化良可悲夫右成帝在位二十六年崩年四十五哀帝哀帝初立躬行儉約省減諸用政事由己出朝廷翕然望治焉書曰商監不逺在夏后氏之世况自儲宫而觀先世之事是非得失目擊之昭昭者乎哀帝雖痿痺短祚而初政有如此亦其得之於平時者為監以行於初政者為的持之以久不昬不怠而天下無不可為矣繼體之主庸可忽諸初董仲舒説武帝以秦用商鞅之灋除井田民得賣買富者田連阡陌貧者無立錐之地邑有人君之尊里有公侯之富小民安得不困古井田法雖難卒行宜少近古限民名田以贍不足塞兼並之路去奴婢除專殺之威薄賦斂省繇役以寛民力然後可善治也及上即位師丹復建言今累世承平豪富吏民訾數鉅萬而貧弱愈困宜略為限天子下其議丞相光大司空武奏請自諸侯王列侯公主名田各有限闗内侯吏民名田皆毋過三十頃奴婢母過三十人期盡三年犯官没入官時貴戚近習皆不便也寢不行世之言井田者皆不達時宜之論盖自上古封建以制國井田以養民不特諸大聖人相繼而疆理之而當時諸侯又皆世有其地如治其家事然非如後世州縣數數遷易朝令而夕改也且猶積之數千百載至周而後經制始備然而成康以後旋即陵遲以至春秋以至戰國以至于秦乃其勢之所必至無足怪也何者有黜陟而後封建可乆有封建而後井田可行王者不作黜陟不明諸侯無賢不肖皆得而世襲之而封建亂矣自萬國而併吞之以至于七几分茅胙土於先王者且為之掃地而何里居井授之有哉以是觀之廢井田開阡陌其來殆非一日未必皆秦之罪也後世封建不可行則井田斷無可復之理惟限田一説尚庶㡬焉孟子曰仁政必自經界始經界不正井地不均榖禄不平王公貴人世家大族兼並豪奪無藝而民不聊生甚矣天下所以多亂而少治忍以父母妻子所聊頼之身而自棄於盜賊者職此之由也長此不已其害可勝言乎雖然此非朝暮所可遽革也限之以制持之以久其方來者使之有所格而不得踰其已過制者則如賈誼衆建諸侯之法使後日子孫有分析而無増衍要以如制而止焉數世之後庶乎漸均而經界亦可漸正若夫貴戚近習以為未便則在上之人果決而力行之耳且安有天下長治久安之大計而撓之以便貴戚近習之私哉右哀帝在位六年崩年二十六平帝帝年九嵗太皇太后臨朝大司馬莽秉政百官總已以聽於莽莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅傳曰國有人焉未可圖也淮南謀反而汲黯以守節死義見惮且曰至説公孫𢎞等如發䝉耳亂臣賊子雖有無君之心亦必藐視朝廷舉無足畏而後始肆然無忌惮若張禹孔光之徒真何足道哉成帝疑災異為王氏專政之効親至禹第問之使當時而能效一語雖殺身足以為榮矣禹乃以年老子孫弱而詭辭以對帝由是遂不疑王氏哀帝以董賢為大司馬故令賢私過光光知上欲尊寵之也拜謁送迎甚謹不敢以賔客鈞敵之禮禹光俱號名儒而此舉錯曽狗彘之不若亂臣賊子將何所惮扶顛持危安所頼也是故王莽用事首於光而尊事之且引其壻而貴之而莽之賊心見矣非尊事也知其名足以欺世而其人實易與姑借之以行其姦也夫然後斥逐惟意而天下之大柄歸焉大柄歸而光無用矣與羣臣盛陳功德上安漢之號而已耳大傅四輔榮乎辱乎漢之三公賊之奴乎右平帝在位五年為王莽所弑年十四漢之大禍二諸侯王外戚是也諸侯之禍兆於髙帝而外戚之禍則稔於吕后此皆開基創業始謀不謹遺毒子孫然自七國之變而諸侯王遂不復為患至若外戚則世世作孽前覆而後不戒而王氏終已移國此其故何哉閨門之中每以恩而掩義以情而亂灋自非剛明之君明禮以嚴分鮮有不及於禍者後世擇配非由德選惟聲色是好惟技能是取當時則溺於后族易世則制於母黨此勢之所必至也文帝懲諸吕而殺薄昭人知其不然矣若夫區處二竇斂然成退讓君子此則可以為後世灋而奈何不知所灋也易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣腹心之病其終殺身禍根不除必亂天下是故履霜之戒貴於早辨堅氷已至悔何追乎定安公居攝元年三月己丑立宣帝𤣥孫嬰為皇太子號曰孺子嬰廣戚侯顯之子年二嵗託以為卜相最吉立之尊皇后曰皇太后四年莽去漢號䇿命孺子為定安公封以萬户地方百里立漢祖宗之廟於其國王莽漢之賊也雖篡位自立廢孺子為定安公然斷以大義則天下固定安公之天下豈莽得而盜之厯十有五年而後漢始誅莽揔繫之居攝可也武后篡唐廢中宗范公祖禹復繫嗣聖之年黜武氏之號以為母后禍亂之戒愚亦濳用斯例黜莽偽號以為賊臣篡逆之戒云十二年莽置羲和命士以督五均六筦郡有數人皆用富賈為之乗傳求利交錯天下因與郡縣通姦多張空簿府藏不實百姓愈病是嵗莽復下詔申明六筦每一筦為設科條防禁犯者罪至死姦民猾吏並侵衆庶各不安生又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁納言馮常以六筦諫莽大怒免常官灋令煩苛民揺手觸禁不得耕桑繇役煩劇而枯旱蝗蟲相因獄訟不決吏用苛暴立威旁縁莽禁侵刻小民富者不自保貧者無以自存於是並起為盜賊䧇阻山澤吏不能禽而覆蔽之浸淫日廣臨淮𤓰田儀等依阻㑹稽長州琅琊吕母聚黨數千人殺海曲宰入海中為盜其衆浸多至萬數荆州饑饉民衆入野澤掘鳬茈而食之更相侵奪新市人王匡王鳯為平理諍訟遂推為渠帥衆數百人於是諸亡命者南陽馬武潁川王常成丹等皆往從之共攻離鄉聚蔵於緑林山中數月間至七八千人又有南郡張霸江夏羊牧等與王匡俱起衆皆萬人莽遣使者即赦盜賊還言盜賊解輙復合問其故皆曰愁灋禁煩苛不得舉手力作所得不足以給貢税閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起為盜賊莽大怒免之其或順指言民驕黠當誅及言時運適然且滅不久莽説輙遷官三代之衰不聞匹夫竊發之禍秦漢以後始聚為羣盜謀危天下矣此其故何也古者封建以制國井田以居民伍兩軍師寓之於比閭族黨而民各守其鄉井分茅胙土統之以方伯連帥而諸侯各守其封疆當是時智勇之士足以有為於當世者亦各仕於其國蠢蠢萬衆縦欲為亂而莫為之先故夏商與周之亡也雖暴弱之不同湯武與秦之取天下也雖絶然仁義詐力之有異然而其實則皆以諸侯而革命秦之君臣惟見其然也知封建之為害而不知封建之為利於是置郡縣開阡陌尺寸之地皆天子自守一失其道紐解絲棼雖無大國問鼎之憂而不免隴上輟耕之歎矣掲竿斬木一呼響應共起而亡天下此其勢之所必至而古今之變所以殊也愚甞論之羣盜並起乃天下將亡之候何者人心已離故也故凡羣盜之起未有不因苛暴以失人心然人主知之能自悔悟則亦未至於遽亡武帝是也惟夫盜滿天下而上諱聞焉此則必死不救之疾二世王莽是也嗚呼二世王莽不足置論矣與其悔羣盗於既起孰若固人心於未失有天下者慎無輕蹙國本以自危哉右定安公居國凡十有六年建武元年春方望弓林等共立之為天子更始擊破斬之年二十一兩漢筆記卷七
