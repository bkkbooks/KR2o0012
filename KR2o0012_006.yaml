body:
  text: 兩漢筆記卷六宋錢時撰宣帝初許廣漢女適皇曽孫一嵗生子奭數月曽孫立為帝許氏為倢妤是時霍將軍有小女與皇太后親公卿議更立皇后皆心擬霍將軍女亦未有言上乃詔求微時故劎大臣知旨白立許倢妤為皇后十一月壬子立皇后許氏霍光以后父廣漢刑人不宜君國嵗餘乃封為昌成君人主之趨向羣下所由以響應也孝宣詔求故劎而大臣已默喻其旨向使一念之差則逆探上意而迎合之者皆羣邪從臾之路矣可不謹歟本始元年春大將軍光稽首歸政上謙讓不受諸事皆先關白光然後奏御自昭帝時光子禹及兄孫雲皆為中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宫衛尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據於朝廷及昌邑王廢光權益重每朝見上虛已斂容禮下之已甚大臣受先君之託凡所以定變故安宗社皆其職之所當為非過分也湯崩太甲立於伊尹之手不明而放之思庸而復之既復辟而去之尹固未嘗以為己功而太甲亦豈以為己私恩哉廢賀立宣正自霍光分內事耳光不以寵利居成功必不使其君有芒刺之憚宣帝有天下而不與必不至有禮下已甚之過君臣皆失其分非保終吉之道也小畜者臣畜君之卦上九爻曰既雨既處尚德載婦貞厲月幾望君子征凶幾望而猶征雖君子亦凶况霍光乎况無德以載而黨親根據於朝廷乎初上官桀與霍光爭權光既誅桀遂遵武帝法度以刑罰痛繩羣下由是俗吏皆尚嚴酷以為能而河南太守丞淮陽黃霸獨用寬和為名上在民間時知百姓苦吏急也聞霸持法平乃召以為廷尉正數決疑獄庭中稱平民間所聞天下之公論也宣帝知百姓苦吏急而用黃霸是矣持是以往無所變亂則孝文之遺風可復而孝武之虐焰當為之一洗奈何卒用文法吏而以刑繩下乎甚矣習氣之易移而流於不美者之勢順也大凡初心無有不善後世人主有得於民間之公論行之以果斷持之以悠久毋轉移於氣習變亂其初心哉地節二年帝興於閭閻知民事之艱難霍光既薨始親政事厲精為治五日一聽事自丞相已下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至於子孫終不改易樞機周密品式備具上下相安莫有茍且之意及拜刺史守相輒親見問觀其所由退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其良二千石乎以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉勵增秩賜金或爵至關內侯公卿闕則選請所表以次用之是故漢世良吏於是為盛稱中興焉宣帝親政而以太守吏民之本可謂知所務矣夫太守數易豈止下不安而已乎是故欲致治非久任不可欲久任非擇賢不可數遷數易如寄傳舍政何由成化何由洽也至有治理效則璽書勉勵增秩賜金公卿闕則選諸所表以次用之此意尤善伯禹后稷以至康叔蘇忿生之徒皆由諸侯而入為公卿此古制也宣帝致中興之治其有以哉惜乎所謂良吏止漢世人物而治亦止於漢耳三年夏四月戊申立子奭為皇太子封太子外祖父許廣漢為平恩侯霍顯聞立太子恚怒不食嘔血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輒先嘗之后挾毒不得行詩曰亂匪降自天生自婦人甚矣霍顯之隂謀禍賊一至於此也既殺許后而立其女又教其女殺太子為外孫他日之地覆宗絶祠豈足怪哉觀光初聞許后之死大驚欲自舉發而不忍使於此時竟發其事去一悍妻而全一族斷閨門之私情而全忠臣之大義豈不甚偉一時之不忍而不知有大忍者在其後雖竭節於國而不能正其家有蓋世之功而不能免赤族之禍可為萬世戒矣疏廣為太子太傅廣兄子受為少傅太子外祖父平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜監護太子家示陋非所以廣太子德於天下也上善其言以語魏相相免冠謝曰此非臣等所能及廣由是見器重立太子而植黨於外氏此貴戚擅權之根也疏廣斯言為慮逺矣不擇師傅以教之以養成其德性而徒私外氏以權以助成其偏黨比周之勢此豈天下之福哉帝自在民間聞知霍氏尊盛日久內不能善既躬親朝政魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山領尚書上令吏民得奏封事不關尚書羣臣進見獨往來於是霍氏甚惡之上頗聞霍氏毒殺許后而未察乃徙光女壻度遼將軍未央衛尉平陵侯范明友為光祿勳出次壻諸吏中郎將羽林監任勝為安定太守數月復出光姊壻給事中光祿大夫張朔為蜀郡太守羣孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衛尉鄧廣漢為少府戊戌更以張安世為衛將軍兩宫衛尉城門北軍兵屬焉以霍禹為大司馬冠小冠亡印綬罷其屯兵官屬特使禹官名與光俱大司馬者又收范明友度遼將軍印綬但為光祿勳及光中女壻趙平為都尉光祿大夫將屯兵又收平騎郡尉印綬諸領胡越騎羽林而及兩宫衛將屯兵悉易以所親信許史之子弟代之班史謂霍光不學無識暗於大理夫以大將軍之尊身任天下之重而宗族親戚分據勢要執兵柄環朝廷之上非識暗肯為是哉然嘗考之光之為此蓋基於上官桀之變但知遍置親族植黨與以自固而不悟國之名器非我一家之私物也宣帝黜削其權大明公道選天下忠賢而用之夫誰曰不可奈何奪之霍氏而復易以所親信許史之子弟乎然則與光之見何以異觀霍禹有謂將軍墳墓未乾盡外我家反任許史奪我印綬而凶人之謀乃緣此生此雖權寵醖釀之極必至於是而亦宣帝舉措之不正大有以速禍可為世戒也十二月詔曰間者吏用法巧文浸深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄其為置廷尉平秩六百石員四人其務平之以稱朕意於是每季秋後請讞時上常幸宣室齋居而決事獄刑號為平矣涿郡太守鄭昌上疏言今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令不正其本而置廷平以理其末政衰聽怠則廷平將召權而為亂首矣宣帝傷法巧文深而更置廷平齋居決事其意美矣然刑名繩下終日心於文法吏何也蓋帝天姿大抵刻薄雜霸之習勝而效尤於武帝者多故也舜有好生之德文王視民如傷表立影從風行草偃天下雖有苛刻之吏將安所用乎又豈待一一齋居決事而後始平乎于定國為廷尉民自以不寃當時稱頌與張釋之相亞而無救趙蓋韓楊之徒之死其為寃者大矣雖多廷平之員何益也四年勃海太守龔遂入為水衡都尉先是勃海左右郡嵗飢盜賊並起二千石不能禽制上選能治者丞相御史舉故昌邑郎中令龔遂上拜為勃海太守召見問何以治勃海息其盜賊對曰海瀕遐逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之耶將安之也上曰選用賢良固欲安之也遂曰臣聞治亂民如治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書敕屬縣悉罷逐捕盜賊諸吏持鉏鉤田器者皆為良民吏母得問持兵者乃為賊遂單車獨行至府盜賊聞遂教令即時解散棄其兵弩而持鉏鉤於是悉平民安土樂業遂乃開倉廩假貧民選用良吏慰安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸務農桑各以口率種樹畜養民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢勞來循行郡中皆有畜積獄訟止息愚於此益驗人心之本良人性之本善雖甚顛冥狂悖至於一旦感動未有不可轉移者上之人失所以為民父母之道寒飢弗恤反激之而生變終陷惡逆自新無路豈不甚可痛哉觀遂赤子弄兵之言便使人惻然動哀矜之念一入郡界凡前日之不可禽制者莫不投兵而歸隴畝此固有感於其本心者矣然君臨天下之上其毋遽以盜賊視吾赤子思風動教化之有道生其愧恥起其畏慕而發其本心之良乎元康元年魏相敕掾吏按事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之魯君自謂生於深宫之中未嘗知憂未嘗知懼况貴為天子乎是故不知憂懼者荒寧之端也荒寧者敗亡之路也孝宣起自民間宜知所警然境界習熟則久而易忘魏相居相位而每以逆賊風雨災變奏白知所務矣或者英君少主乍居天位四方首以祥瑞進而弗之絶是開諂諛之門使賊其君者也可不戒哉三年張安世自以父子封侯在位太盛乃辭祿詔都內别藏張氏無名錢以有萬數安世謹慎周密每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶弗復為通有郎功髙不調自言安世安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果選安世自見父子尊顯懷不自安為子延壽求出補吏上以為北地太守嵗餘上閔安世年老復徵延壽為左曹太僕日中則昃月盈則食古人所以戒盛滿也使霍氏而知此義安有夷族之禍乎官賞人主之大權非臣下所得私者舉賢達能不容私謝有功即遷不受私謁大臣之體當如是矣神爵元年上頗修武帝故事謹齋祀之禮以方士言增置神祠聞益州有金馬碧雞之神可醮祭而致於是遣諫大夫蜀郡王褒使持節而求之初上聞褒有俊才召見使為聖主得賢臣頌其略曰世必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝤出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊乂將自至上下俱欲歡然交欣千載一合論説無疑太平之責塞優遊之望得休徵自至壽考無疆何必偃仰屈伸若彭祖詬噓呼吸如僑松眇然絶俗離世哉是時上頗好神仙故褒對及之京兆尹張敞亦上疏諫曰願明主時忘車馬之好斥逺方士之虛語遊心帝王之術太平庶幾可興也上由是悉罷尚方待詔武帝一生惑於方士之言至晚節而後始悔此可為監矣而宣帝復有是好何哉大抵初年是非未嘗不明好惡未嘗不審以宣帝之英爽視武帝前日事昭昭乎辨何啻白黑然至於此且蹈其覆轍而不悟甚矣邪説之易惑而初清明者之難守也雖然人主不能無過患不聞過不患不聞過患不改過武帝受欺方士莫有忠告者豈任意輕殺故遂不敢諫歟宣帝一有所溺而王褒張敞不旋踵諫之帝亦不旋踵而改之此其所以猶幸甚也上頗修飾宫室車服盛於昭帝時外戚許史王氏貴寵諫大夫王吉上疏曰陛下躬聖質總萬方惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長䇿舉明主於三代之隆也其務在於期會簿書斷獄聽訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之故宜謹選左右審擇所使左右所以正身所使所以宣德此其本也孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁壽之域則俗何以不若成康壽何以不若髙宗竊見當世趨務不合於道者謹條奏惟陛下裁擇焉吉意以為世俗聘妻送女無節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫屈於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也又言舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今無益於民宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明示天下以儉古者工不造雕琢商不通侈靡非工商之獨賢政教使之然也上以其言為迂闊不甚寵異也吉遂謝病歸後世積習之弊習熟於耳目之常非有剛明特達之見卓然絶出乎流俗之表未易頓革也孟子談王道於戰國時君咸謂迂濶於事用兵爭強務先權謀其謂之迂闊也固宜王吉之言雖非孟子比然觀其所陳往往皆切中當時之病關係風俗者不細而宣帝亦且以迂濶目之矣蹈常襲故安於卑陋如之何其可革也哉雖然滕文公始見孟子孟子道性善言必稱堯舜斯言一入於心終不忘三年之喪井地之問自續續有所不容已何者先有以感動其本心故也吉也責公卿務在期會簿書斷獄聽訟而不能建萬世長䇿舉明主於三代之隆豈不甚美而其説止於述舊禮革弊事而未見所謂轉移人主之心術者是故雖有英特不世出之君終莫能脫去凡近而進之髙明廣大之地良有以歟二年初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨衆時湯已拜受節有詔更用臨衆病免五府復舉湯湯數醉酗羌人反畔卒如充國之言辛武賢深恨充國上書告中郎將卬泄省中語下吏自殺八議之條深見先王忠厚之意漢世人臣有平日之大功而不能贖一時之小過此最刻薄前後死者相望可為歎息多矣愚觀趙充國老成定慮區畫西羌抗論再三無言不酬顧何負於漢哉至若奏辛湯之之使酒不特不負漢亦且何負於武賢也有弟不能教而充國忠言之此正有識之士所宜端拜引咎佩服為家庭之訓况醉酗致畔若合符契而反敢以為恨乎恨人之言其弟而遂殺人之子武賢不足道也而宣帝忍為之亦薄甚矣哉三年東郡太守韓延壽為左馮翊始延壽為潁川承趙廣漢構會吏民之後俗多怨讎延壽改更教以禮讓召故老與議定嫁娶喪祭儀品略依古禮不得過法百姓遵用其教延壽為吏上禮義好古教化所至必聘其賢士以禮待之廣謀議納諫爭表孝弟有行修治學宫春秋鄉射陳鐘鼓管絃盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期會為大事吏民敬畏趨鄉之又置正五長相率以孝弟不得舍姦人入為馮翊延壽出行縣至髙陵民有昆弟相與訟田自言延壽大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥咎在馮翊當先退是日移病不聽事因入卧傳舍閉閣思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭郡中歙然莫不傳相敕厲不敢犯延壽恩信周遍二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿每見世俗謂頑民不可化古禮不可行未嘗不為之切歎嗟夫何其誣民之甚也大宗伯以五禮防萬民之偽而教之中此正古聖維持風俗之大法故曰人而無禮則近於禽獸又曰無辭讓之心非人也此辭讓之心即本心本中本正本無偏倚情偽一鑿變詐百端始支始離始昏始亂始失其為中焉古聖於是因人性所固有而為之節文而名之曰禮禮非外物也仲虺曰以禮制心制者不踰之謂不踰其則即禮也孔子曰復禮為仁復者能反之謂能反其本即禮也後世教化不明風俗大敗賊恩害義壞禮亂倫往往逐人情之末流而為之窟宅滔滔汩汨惟欲是從安於卑陋淪於汙穢焉知禮為何事也哉昏禮論財務相求責而夫婦用夷虜之道矣日以七數聽命浮屠而死喪用夷狄之教矣濡雨露而莫之感睨狐狸蠅蚋而莫之恤自肥其口自膏其腹窮年卒嵗無一念之及其親回視春秋祭祀以時思之者反若怪物然祭獸祭魚曽豺獺之不若矣雖然非民之罪也風俗雖壞而本心未嘗壞民雖非先王之民而心固先王之民之心也使天下之為郡者皆韓延壽誰謂古禮果不可行乎骨肉有訟閉閣思過而昆弟自悔終身不復敢爭誰謂愚民果不可化乎宣帝不安於雜霸舉斯人者而用之為風俗倡則天下皆潁州也夫誰曰不可而延壽則刑戮死矣惜哉四年春二月以鳳凰甘露降集京師赦天下潁川太守黃霸在郡前後八年政事愈治是時鳳凰神爵數集郡國潁川尤多冬十月鳳凰十一集杜陵是何宣帝鳳凰之多也以愚觀之如蓋如韓真當世之鳳凰矣前年殺寬饒後年殺延壽其為不祥莫甚於此而但紀一禽以為瑞則愚不知其説也孔子生於周末而發鳳鳥不至之歎為世道歎也哀公西狩獲麟而子歌之曰唐虞世兮麟鳳遊今非其時兮來何求麟兮麟兮我心憂於是春秋絶筆焉嗚呼謂宣帝何哉十一月嚴延年坐不道棄市初延年母從東海來欲從延年臘到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閣不見延年免冠頓首閣下良久母乃見之因數責延年幸得備郡守専治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舍母畢正臘謂延年天道神明人不可獨殺我不意當老見壯子被刑戮也殆矣去汝東歸掃除墓地耳遂去歸郡見昆弟宗人復為言之後嵗餘果敗東海莫不賢智其母雋不疑嚴延年之母皆賢母也然不疑教之於平時故雖嚴而不殘延年責之於己日故無能救其禍敗二母殆不能不優劣於此或曰觀嚴母有此明訓平時必非不教者特不率教耳孔子曰父母惟其疾之憂延年所以憂母心者如是雖百其母死何足道哉五鳳元年秋胸奴屠耆單于使先賢撣兄右奧鞬王與烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當戶謀其讒右賢王言欲自立為單于屠耆單于殺右賢王父子後知其寃復殺唯犂當戶於是呼揭王恐遂畔去自立為呼揭單于右奧鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自將兵東擊車犂單于使都隆竒擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犂單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犂單于車犂單于敗西北走屠耆單于即引兵西南留闟敦地漢議者多曰胸奴為害日久可因其壞亂舉兵滅之詔問御史大夫蕭望之對曰春秋晉士丐帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟遣使請求和親海內欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙恩得復其位必稱臣服從此德之盛也上從其議武帝一受聶一之詐誘擊胸奴自後兵聯禍結無嵗不尋干戈海內蕭然戶口減半雖寃寇逺遁幕南無王庭而終不得其要領何者服之以力而無以服其心故也使當時有望之者首明大義窒其禍端亦何至毒天下如是哉甚矣在廷之臣不可以無學識也雖曰夷狄顛倒綱常至於感之則懷激之則怒同此心耳安有堂堂中國為天地萬物之主一旦乘其內亂薄人於險而可為乎論者見宣帝不煩征討而胸奴來朝為以武帝殺伐之效不知望之此議所以服其心者固多也四年大司農中丞耿壽昌白令邊郡皆築倉以穀賤增其賈而糴以利農穀貴時減賈而糶名曰常平倉民便之先王之時補助有法賙恤有政賖貸有時以至斂市之不售貨之滯於民用者此正上下通融君民一體之義桑𢎞羊以市井之智行均輸之術堂堂天子之尊下爭商賈之利真所謂民賊也安得耿壽昌者而與之論常平之意哉斯名一立萬世流波至我本朝又特専使領之為惠愈大或者居常平之任而使斯民負不平之歎則將何所逃罪於壽昌矣甘露元年皇太子柔仁好儒見上所用多文法吏以刑繩下嘗侍燕從容言陛下持刑太深宜用儒生帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也王霸之辨孟子論之詳矣曰以力假仁者霸霸必有大國以德行仁者王王不待大又曰堯舜性之也湯武身之也五霸假之也答齊王曰仲尼之徒無道桓文之事者答公孫丑曰管仲曽西之所不為而子為我願之乎夫所貴於王者純德孔明躬行乎仁義者也發於事業施於政教雖不幸處人道之變為弔民伐罪之舉無往而非仁義之功用也明王不作法斁綱淪禮樂征伐自諸侯出至於春秋天下大亂於是桓文之徒挾天子以令諸侯而雄於其間焉然王室猶藉以維持世道猶賴以扶植討逆誅叛猶知依倣仁義而行也孟子一言以蔽之曰假可為萬世不易之至論矣何則王者安行其所自有其發育猶元氣也霸者非其所有而假借之翦綵成花之類也子路子貢疑管仲之非仁而孔子稱其功非謂其功如是而可也譬之飢羸而投之以粳籺猶愈於溝中之瘠云耳復申之曰如其仁如其仁謂之如其仁則非真有得於仁明矣故雖九合諸侯一匡天下而終不免於器之小功烈之卑假之者固如是也然則王之與霸斬斬乎辨豈可參取而雜用乎孝宣自謂本以霸王道雜之非惟不知王實亦不知所謂霸也真知所謂霸即知以妾為妻之非義矣肯使後宫政君娛侍太子乎知尊賢育才以彰有德矣肯使寬饒延壽之徒以微罪死乎以愚觀之漢家制度非王非霸殆戰國之遺風嬴秦之故習未除耳故曰今之諸侯五霸之罪人也古聖相傳初無他學自十五以至從心所欲不踰矩者此也自格物以至治國平天下者此也不志乎此不足以為儒是故明此以南面堯舜禹湯文武之所以為君明此以北面臯夔稷契伊傅周召之所以為臣非有異道也且伊尹耕於莘野而與湯一德傅説起於版築而指髙宗厥修罔覺之妙其所用力者果安在哉顔子陋巷窮民而有為邦之問孟子亦以禹稷同道稱之曷為而同道也太子雖病於弱而知好儒知用文法吏之為非此其識見正自不茍宣帝因其所好求大儒而師傅之使之坐進此道不滯於章句文義之間漢氏家風尚可丕變貴王賤霸遺音未逺安得而反亂我家也斷斷乎以德教不可純用例以俗儒好是古非今用之而太子之所工者乃獨在乎管絃之末此如俚俗甘心卑陋牢執堅持頑不可破安知詩書禮義之為何事不特自誤其身併與其子而誤之雖有一日之雅趣亦且扼而不得遂矣豈不甚可歎哉二年胸奴呼韓邪單于款五原塞願奉國珍朝三年正月詔有司議其儀丞相御史曰聖王之制先京師而後諸夏先諸夏而後夷狄胸奴單于朝賀其禮儀宜如諸侯王位次在下太子太傅蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也書曰戎狄荒服言其來服荒忽亡常如使胸奴後嗣卒有鳥竄鼠伏闕於朝享不為畔臣萬世之長䇿也天子采之下詔曰胸奴單于稱北藩朝正朔朕之不德不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名呼韓邪單于來朝此雖胸奴衰弱之效然亦宣帝有以信服之乃可致耳向使五單于爭立而用議者因亂舉兵之謀可得而致乎愚是以深取蕭望之幸災之説也夫來朝而待以客禮要亦未為非是荀悅乃謂要荒之君必奉王貢若不供職則有辭讓號令加焉待以不臣加王公之上僭度失序以亂天常此殆失考矣禹貢要荒蓋在九州之內雖五服之制凡二千五百里而其實界則東漸於海西被於流沙朔南暨聲教四方各隨地逺近而為之限耳何以言之東河西河相距千里南河恆山相距千里是甸服也自南河至江千里自江至衡山千里荆州南至衡山正合二千五百里之數若東河至東海千里西河至流沙千里僅有侯綏之地必欲於要荒為限則此二服當在東海之中流沙之外矣固無是理而冀之北至恆山已薄異域雖侯服亦且不備例限之以五服可乎是所為五服者特以南方一境之最逺者定為之制綏服之外五百里與夷雜居為之要約羈縻之而已故曰要服要服之外五百里則與蠻雜居如今徭人湖廣諸郡往往有之正居荆州之境古號荆蠻春秋責楚包茅不入即包匭菁茅之舊在荒服之內故也未聞九州之外聲教所不及而以供貢之事責之者武王伐商復居豐鎬放逐戎夷涇洛之北以時入貢故亦以荒服名之至于穆王已不至矣况自漢興胸奴強盛與之世為婚姻之國此豈荒服之比哉今而來朝禮以接之恩信以結之德義以懷之使之不為中國患則已耳其叛其服置之度外可也必若屈之王公之下責之王貢之修重之以辭讓申之以號令其不至於激天下之變者幾矣愚恐後世不明荒服之義而信荀氏之説故極言之黃龍元年詔曰蓋聞上古之治君臣同心舉措曲直各得其所是以上下和洽海內康平其德弗可及已朕既不明數申詔公卿大夫務行寬大順民所疾苦將欲配三王之隆明先帝之德也今吏或以不禁姦邪為寬大縱釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不謬哉方今天下少事繇役省減兵革不動而民多貧盜賊不止其咎安在止計簿具文而已務為欺謾以避其課三公不以為意朕將何任諸請詔省卒徒自給者皆止御史察計簿疑非實者按之使真偽毋相見亂成湯克寬克仁乾文言寬以居之仁以行之夫仁人心也人之本心虛明無體範圍無外本未始不寬本未始不大也已私一立物我蔽虧蕞爾其形囿於蝸角始失其為寬大耳宣帝平日用法文吏以刑繩下固惼迫刻深之主也使其晚年真有悔過之意內省諸已格其非心天德昭融含覆一視反刑名為忠厚變慘酷為慈祥公卿大夫以德而選政教號令以德而行天下之民翕然向化如風偃草如置郵傳命矣安有平日所用者刻深之法所喜者刻深之人一旦於務行寬大之言督責臣下而求移風易俗追配三王寧有是理乎反覆詔旨雖名寬大而曰止計簿具文曰欺謾避課曰三公不以為意曰御史按察非實是乃宣帝之所以不寬大者也可厚誣哉右宣帝在位二十五年崩年四十三兩漢筆記卷六
