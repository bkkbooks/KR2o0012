body:
  text: 兩漢筆記卷一宋錢時撰高祖秦二世二年初楚懐王與諸將約先入關中者王之當是時秦兵彊諸將莫利先入關獨項羽怨秦之殺項梁奮願與沛公西入關懐王與諸老將皆曰項羽爲人慓悍猾賊嘗攻襄城襄城無遺類皆阬之諸所過無不殘滅且楚数進取前陳王項梁皆敗不如更遣長者扶義而西告諭秦父兄秦父兄苦其主久矣今誠得長者徃無侵暴宜可下項羽不可遣獨沛公素寛大長者可遣懐王乃不許項羽而遣沛公湯伐夏曰與爾有衆請命武王伐商曰元后作民父母此萬世君人之大法弔民伐罪之深㫖秦爲無道羣雄並逐徯后來蘇此其時也如避水火益深益熱烏在其爲民父母哉愚觀項羽盜賊之雄耳凡其失人心處全在殘忍沛公脱秦民於水火者也凡其得人心處全在寛大獨遣長者扶義而西而不許項羽非懐王之賢不至是然亦當時親被苦禍與秦民同在水火之中故其推擇權量的當如是向使從羽之請與沛公俱遣慓悍猾賊如虎狼之求逞必悶悶不快於長者之事而卿子冠軍之劔且轉而之沛公矣其禍可勝言乎沛公入關秦民大喜而漢氏四百年之祚卒定於此日有以也夫元年冬十月沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先入收秦丞相府圗籍藏之以此沛公得具知天下阨塞户口多少彊弱之處始皇三十四年丞相李斯請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者詣守尉雜燒之是所燒者天下之書而博士官所職固無恙也蕭何知所先務悉取而藏之他時律令於焉憲章則先王之大經大法具在一洗秦人之陋及三代盛王之規模其機正在今日高祖雖不脩文學然觀其旣定天下聞陸賈新語而稱善用叔孫通綿蕝之儀而知貴此如田野鄙夫素不知文事之可樂一旦致家富饒則亦從事於禮文教子孫以詩書矣誰謂溺冠跨項終不可與言也且秦所謂丞相者何人哉所藏圗籍不過啇鞅李斯之徒破壊先王成憲爲此殘酷滛虐之具耳何也不急急於聖賢經傳而惟殘酷淫虐之具是取遂使漢家制度動循秦舊後世雖有好文之主出殘編於煨燼而表章之而蕭規曹随守爲鵠的寥寥六藝猶空言也悲夫沛公見秦宫室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫曰沛公欲有天下耶將爲富家翁耶凡此奢麗之物皆秦之所以亡也沛公何用焉願急還覇上無留宫中沛公不聽張良曰秦爲無道故沛公得至此夫爲天下除殘賊宜縞素爲資今始入秦即安其樂此所謂助桀爲虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公乃還軍覇上愚觀沛公西入咸陽諸將皆爭走金帛財物之府分之此其所爲與盜賊無異未嘗不竊怪及沛公欲留居秦宫室則不特張良能諫而樊噲首諫議論卓犖無愧昔賢然後知興王之佐識見固自不同也使沛公一有茍安之意而諸臣不務逺畧遂相與窟宅其中則豈惟不足以規模天下羽之入關也而聞有此必將不勝其忿與沛公决死於一戰雖欲鴻門夜遁不可得矣何者秦宫室所有固沐猴而冠者所必爭也是故寧失關中斷不肯失此於劉氏觀其後日燒秦宫室收寶貨婦女而東其爲人心事可見矣雖然羽不足道也范増切切勸羽殺沛公至若此類乃羽之所以自殺者而噤不能效一語曾樊噲之見不若是楚君臣俱不足道也不旋踵而敗宜哉沛公悉召諸縣父老豪傑謂曰父老苦秦苛法久矣吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆安堵如故秦網苛宻民無所措手足一旦而遇三章之約如脱之湯鼎濯之清波之上其爲喜幸何如哉此高祖入關第一急務其功用可與武王之反商政相配葢由天姿寛厚出於特見非有譜之可按也視古憲章雖尚踈畧而此時此意實漢家一代法制之祖後世子孫當視之如命脉矣而乃有張湯杜周之徒得而甘心焉何也項羽引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅收其貨寶婦女而東秦民大失望韓生説項羽關中阻山帶河四塞之地地肥饒可都以覇項羽見秦宫室皆已燒殘破心思東歸使人致命懐王懐王曰如約項羽怒曰懐王者吾家所立耳非有功伐何以得專主約天下春正月羽陽尊懐王爲義帝徙於江南江都二月羽分天下王諸將羽自立爲西楚覇王王梁楚地九郡都彭城乃曰巴蜀亦關中地也立沛公爲漢王王巴蜀漢中都南鄭而三分關中王秦降將以距塞漢路漢王怒欲攻項羽蕭何諫曰雖王漢中之惡不猶愈於死乎夫能詘於一人之下而信於萬乗之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圗也漢王曰善乃遂就國使項羽而先入關則必責懐王以如約矣關中之地豈他人所得有哉葢其爲人負氣尚勇不肯出沛公之後是以屠咸陽殺子嬰燒宫室收貨寶婦女而動東歸之思非其本心然也及聞懐王如約之言即怒而徙之如逐奴𨽻自王梁楚而遷沛公漢中一旦發露不可得而掩矣使沛公不忍小忿遽起而與之角其不至於自斃者幾希是故羽之粗暴毎毎見容於沛公凡委靡退遜斂然而不敢較者皆沛公之所以勝而項羽之所以敗也沛公當時亦幾不能忍頼蕭何以濟有功多矣惜乎未免出於詐術非王者之所尚云二年漢王南渡平隂津至洛陽新城三老董公遮説王曰兵出無名事故不成明其爲賊敵乃可服項羽爲無道放殺其主天下之賊也大王宜率三軍之衆爲之素服以告諸侯而伐之則四海之内莫不仰德此三王之舉也於是漢王爲義帝發䘮袒而大哭哀臨三日發使告諸侯擊楚之殺義帝者項王旣擊齊欲遂破之而後擊漢漢王以故得率諸侯兵凡五十六萬人伐楚入彭城收其貨寶美人日置酒高㑹項王聞之令諸將擊齊而自以精兵三萬人南從魯出胡陵至蕭晨擊漢軍而東至彭城日中大破漢軍日入榖泗水死者十餘萬人又追擊至靈壁東睢水上漢軍却爲楚所擠卒十餘萬人皆入睢水水爲之不流圍漢王三匝㑹大風從西北起折木發屋揚沙石窈㝠晝晦逢迎楚軍大亂壊散而漢王乃得與數十騎遁去諸侯皆背漢復與楚漢王與項羽比肩而事義帝義帝遭弑而漢王發兵以討賊此人心之公忿萬世之大法也是故義旗一舉而諸侯五十六萬之衆西面而響應之暨入彭城乃收其貨寶美人日置酒高㑹此何爲者哉且前日之袒而大哭者誰也今日之置酒高㑹者又誰也縞素哀臨曾幾何時貨寶美人輙據其窟穴而樂之王者之師顧如是乎使漢王之討賊也發於中心激於大義則入其境踐其宫戚然常若義帝之寃乎其上而哀傷惻怛所在乎見之項羽雖悍亦且䰟褫魄䘮而不能武矣安有五十六萬之衆而摧拉於三萬者惟其信不由中而託名於義帝是山東貪財好色之習雖能彊遏於入關之始而終不能自禁於入彭城之時然則項羽者義帝之賊而漢王者又項羽之賊也漢王之得不死已幸矣諸侯背漢與楚豈待睢水狼狽而後見乎孟子曰今之諸侯五覇之罪人也愚是以於漢王而三歎漢王問群臣曰吾欲捐關以東等棄之誰可與共功者張良曰九江王布楚梟将與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人則楚可破也伊尹醜夏歸亳而成湯伐商之計定民獻十夫于翼而周公東征之謀决賢者之歸天之命也安有誘人之叛臣籠絡而用之而能保其終不我叛者道德不足以服英雄豪傑之心區區術數茍焉以集事而葅醢斧鉞之禍已階於謀捐地之日矣漢之君臣亦險詐矣哉立子盈爲太子赦罪人宥過無大刑故無小𤯝災肆赦怙終賊刑此有虞氏之大法萬世不可改者未聞因事推恩有罪而例赦之也有罪而得以赦免刑小人何所懼而不爲惡哉名曰好生而實陷天下於刑戮此赦罪人之謂矣後世承襲名色益多三嵗一郊巨姦劇猾可以數日而待刑罰如之何其清民如之何其服也或曰一旦驟革恐召怨致亂曰諸葛亮治蜀不赦三年冬十月韓信張耳以兵數萬東擊趙廣武君李左車說成安君曰韓信張耳乗勝而去國逺鬭其鋒不可當臣聞千里餽糧士有飢色樵蘇後㸑師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在其後願足下假臣竒兵三萬人從間路絶其輜重足下深溝高壘勿與戰彼前不得鬭退不得還野無所掠不至十日而兩將之頭可致於麾下否則必爲二子所擒矣成安君嘗自稱義兵不用詐謀竒計曰韓信兵少而疲如此避而不擊則諸侯謂吾怯而輕來伐我矣韓信使人間視知其不用廣武君䇿則大喜乃敢引兵遂下大破趙軍斬成安君泜水上擒趙王歇義師不用詐謀固也信若成安君之不用詐謀以敗則先王政典皆不可用於後世乎曰不然師直爲壮行險而順防患也宻慮敵也周雖不行詐以薄人亦必不墮人之詐以取敗此王者所以萬全而動也後世量力度德莫能相尚所恃以爭勝負者詐謀而已耳無義師之實而欲假義師之名慮敵之不周防患之不宻以致身殞國䘮如探籠穽而屠之遂使流俗之論謂王者之兵眞無用於後世後世非詐謀不可皆宋襄公成安君之徒實誤之也孔子曰我戰則克豈用詐謀楚數侵奪漢甬道漢軍乏食漢王與􅐱食其謀撓楚權食其曰昔湯伐桀封其後於杞武王伐紂封其後於宋今秦失德棄義侵伐諸侯滅其社稷使無立錐之地陛下誠能立六國之後此其君臣百姓必皆戴陛下之德莫不嚮風慕義願爲臣妾德義已行陛下南嚮稱覇楚必斂衽而朝漢王曰善趣刻印先生因行佩之矣食其未行張良從外來謁漢王方食曰子房前客有爲我計撓楚權者具以酈生語告良曰何如良曰誰爲陛下畫此計者陛下事去矣漢王曰何哉對曰臣請借前箸爲大王籌之昔湯武封桀紂之後者度能制其死生之命也今陛下能制項籍之死命乎其不可一也武王入殷表商容之閭釋箕子之囚封比干之墓今陛下能乎其不可二也發巨橋之粟散鹿臺之錢以賜貧窮今陛下能乎其不可三也殷事已畢偃革爲軒倒載干戈示天下不復用兵今陛下能乎其不可四也休馬華山之陽示無所爲今陛下能乎其不可五也放牛桃林之野以示不復輸積今陛下能乎其不可六也天下游士離其親戚棄墳墓去故舊從陛下游者徒欲日夜望咫尺之地今復立六國之後天下游士各歸事其主從其親戚反其故舊墳墓陛下與誰取天下乎其不可七也且夫楚唯無彊六國立者復撓而從之陛下焉得而臣之其不可八也誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗而公事令趣銷印愚嘗謂黜陟明而後封建立有王者作而後黜陟行後世黜陟之法廢凡諸侯子孫無賢不肖皆得而世襲之是以陸梁相吞曰兼曰削而封建壊矣禹㑹塗山執玉帛者萬國周千八百國下逮春秋見於記載二百餘國而已戰國之末遂併爲七焉此封建大弊極壊之時也至秦而郡縣之葢其勢不得不然兩雄方張未知所定乃欲循封建末流之故事割裂大勢立六國後而資之爲犄角之助豈理也哉子房止之是也然但謂天下游士各歸事其主無與取天下而未嘗深明封建之本末是故雖能排酈生之說於一時而終不能弭大封侯國之禍於後日此子房不學之病也至若武王入商封墓表閭散財發粟此吊民伐罪之後興王第一規模顧何不可能之有子房不惟不啟廸之且迎其鋒而拒絶之枚舉歴數斷斷乎限高祖以不能愚是以深惜子房之未嘗學也漢王謂陳平曰天下紛紛何時定乎陳平曰項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王爲人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王曰善乃出黄金四萬斤與平恣所爲不問其出入平多以金縱反間於楚軍宣言諸將鍾離昧等爲項王將功多矣然而終不得裂地而王欲與漢爲一以滅項氏而分王其地項羽果意不信鍾離昧等夏四月楚圍漢王於滎陽急漢王請和割滎陽以西者爲漢亞父勸羽急攻滎陽漢王患之項王使使至漢陳平使爲太牢具舉進見楚使即佯驚曰吾以爲亞父使乃項王使復持去更以惡草具進楚使楚使歸具以報項王項王果大疑亞父亞父欲急攻下滎陽城項王不信不肯聽亞父聞項王疑之乃怒曰天下事大定矣君王自爲之願請骸骨歸未至彭城疽發背而死甚矣反間之可畏也間行於家則家睽間行於國則國亂君臣父子兄弟夫婦至於相殘相賊而不相保吁有由矣武渉説韓信信曰漢王深親信我我倍之不祥雖死不易答蒯徹則又曰漢王遇我甚厚我豈可以鄉利而倍義乎君信其臣故臣亦信其君雖欲間何自入哉隨何之言一行於九江而黥布叛陳平之謀一行於楚而范增鍾離昧之屬危無他意忌信讒反間之路也益告舜曰任賢勿貳去邪勿疑孔子曰浸潤之譛膚受之愬不行焉可謂明也已矣浸潤之譛膚受之愬不行焉可謂逺也已矣此萬世之大訓也觀陳平爲計傾敧巧險如此爲人上者可不戒懼矣哉四年漢王大破楚軍復取成臯軍廣武就敖倉食項羽下梁地聞成臯破乃引兵還漢軍方圍鍾離昧於滎陽東聞羽至盡走險阻羽亦軍廣武與漢相守數月楚軍食少項王患之乃爲高爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾與羽俱北面受命懐王約爲兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲殺之項伯曰天下事未可知且爲天下者不顧家雖殺之無益祗益禍耳項王從之古之王者行一不義殺一不辜而得天下不爲安有不顧其父之死而得天下而可爲歟漢王杯羮之言聞之使人股栗吁忍矣哉此戰國險詐之風不足多罪也然以當時事勢籌之使漢王不忍於太公而遂降楚楚將何以處之乎其死於羽之手也明矣漢王死則太公吕后亦必與之俱死羽方要我而我視之若無有焉羽知殺太公無益於成敗之數且留之猶萬有一於後日是漢王忍於不顧者乃所以全太公也或曰然則䇿莫良於此矣古聖賢處之將安出乎曰王者之師萬全而動葢不至有太公入楚之事也後世行險以徼幸而後視此爲良䇿此君子之所羞稱歟韓信使人言漢王曰齊僞詐多變反覆之國也南邉楚請爲假王以鎮之漢王發書大怒罵曰吾困於此旦暮望若來佐我乃欲自立爲王張良陳平躡漢王足因附耳語曰漢方不利寕能禁信之自王乎不如因而立之善遇使自爲守不然變生漢王亦悟因復罵曰大丈夫定諸侯即爲真王耳何以假爲春二月遣張良操印立韓信爲齊王徴其兵擊楚天無二日民無二王王者天下歸徃之謂也古之封國公侯伯子男凡五等周衰禮樂征伐不出於上而後諸侯彊大僣號此豈天下一家爵命之名也哉項羽襲戰國之陋裂地而王諸侯此其舉措已大可笑安有人臣奉命出征得國自請爲王以鎮之而上不疑者是破趙而請王張耳此韓信欲王之機也破齊而請爲假王此高祖僞遊雲梦之機也觀書至此可爲痛心五年項王至垓下兵少食盡與漢戰不勝入壁漢軍及諸侯兵圍之數重於是項王乗其駿馬麾下壮士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者纔百餘人至隂陵迷失道陷大澤中以故漢追及之項王乃復引兵而東至東城乃有二十八騎漢騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八嵗矣身七十餘戰未嘗敗北遂覇天下然今卒困於此此天之亡我非戰之罪也項羽可君乎曰殘暴忍人也屠城阬卒如斃狐䑕安能爲君可臣乎曰從卿子冠軍則斬卿子冠軍事義帝則殺義帝安能爲臣然則斯人也奚施而可曰是特助漢平蕩之具耳春秋而下用兵爭強英雄豪傑不聞義理之訓而惟富彊之是尚風聲氣習舉世訌然皆戰塲也至秦極殺伐之禍而僅勝之又不能教化以善其心而惟束之以法律忿欝慘毒之氣乆遏而不得逞一旦潰裂如虎豹脱圈檻爪牙競奮所在爲群莫不皆有出類之才絶人之力自非有大才力者雄於其間相與收拾而歸諸漢則天下紛紛豈一沛公所能獨辦也是故有沛公而又不能無項羽使之百戰百勝而終不使之保有尺寸之地若羽者眞助漢平蕩之具也歟楚地悉定獨魯不下漢王引天下兵欲屠之至其城下猶聞絃誦之聲爲其守禮義之國爲主死節乃持項王頭以示魯父兄魯乃降君子素其位而行不願乎其外一願乎外則所主者在物窮通得䘮死生禍福皆得而動之矣易曰困亨曰大人否亨曰習坎有孚維心亨處困處否處險而不失其所亨焉此素位而行所以無入而不自得也漢王之兵薄魯城下而絃誦之聲不廢是豈可以勉強爲哉且自孔氏没歴戰國兵爭之禍矣而此絃誦之聲未嘗兵爭也歴嬴秦焚書阬儒之禍矣而此絃誦之聲未嘗阬焚也鹿走秦原群雄競逐寸天尺地焦然如在湯鼎中而此絃誦之聲家常日用自如也兵屠吾城在頃刻間調度從容無異疇昔此豈一旦倉卒所可辦者踐履純固不間險夷知有絃誦而不知有生死知有孔氏之家法而不知有漢兵也漢王方引天下之兵欲屠之悚然知其爲守禮義之國而遂不敢嗚呼亦賢也已先聖之教於是且行於漢王矣或曰若項羽則何如曰王陵之母不愛一死而教子以母貳心此節義之婦也羽也禮而葬之封其墓而旌表之則非特王陵爲之感動四海聞風亦莫不爲之感動矣乃不勝其怒取而烹焉是一婦人之見不若也豺狼虎豹逢人即噬安知禮義之可貴也哉婁敬因虞將軍求見上上召見問之婁敬曰秦地被山帶河四塞以爲固卒然有急百萬之衆可立具也陛下入關而都之山東雖亂秦之故地可全而有帝問羣臣羣臣皆山東人爭言周王數百年秦二世即亡洛陽東有城臯西有殽澠倍河鄉伊洛其固亦足恃也上問張良良曰洛陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國也關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁敬説是也上即日車駕西都長安孟子曰固國不以山谿之險威天下不以兵革之利得道者多助失道者寡助此萬世不易之確論也帝王都邑初無定所豈專恃險以爲固哉召公之營洛也拳拳乎祈天永命而自疾敬德之外無他說夏啇歴年惟不敬厥德乃早墜厥命婁敬未足多道也西都長安未爲不可也張子房佐髙帝取天下最號有識建都定卜而於我乎問焉此正開陳敬德祈天之時乃獨區區以洛陽爲非用武之國何其與召公之見異也吳起曰在德不在險起何人而有是語爲子房者寕不愧矣哉張良素多病從上入關即道引不食榖杜門不出曰家世相韓及韓滅不愛萬金之資爲韓報讎彊秦天下振動今以三寸舌爲帝者師封萬户侯此布衣之極於良足矣願棄人間事欲從赤松子遊耳王者革命必有以新一代之規模武王之反商政是也秦爲無道不師古治先王之禮樂法度掃地而亡之焚書阬儒純用法律是以卒稔高斯之禍僅二世而遂亡然則漢之所宜反秦政者果安在哉崇儒術明教化與天下更始此第一急務也髙祖不脩文學而性明達二三大臣當有以任其責矣况張良爲帝者師甫從入關即道引辟糓此何爲者也且自古亂世必有大賢君子遁迹於天下是故夏之衰也伊尹在莘商之中㣲也傅說在版築及其亡也吕望在蟠谿戰國至秦天下大亂凡出而自見於當時者大抵挾數用術功利之徒耳抱道懐德遁世無悶者固不屑也兵將屠魯而猶聞絃誦之聲深造自得之功不變亂於死生禍福之境孔氏家法殆有人焉良也不於此時訪求遺逸而尊禮之闡明大道而教化之以開一代太平之基躋斯世於二帝三王之盛乃拳拳乎願棄人間事從赤松子遊謂之知幾免禍則可律以名教不得而辭其罪矣先儒謂子房有儒者氣象嗚呼子房非儒也嘗受教於圯上之老人其本領固黄老之學耳自時厥後清淨如曹參恭儉如文帝而皆不免䧟溺於此主盟斯道者無其人而異端邪説遂稱賢於天下子房實啟之也惜哉後九月項王將鍾離昧素與楚王信善項王死後亡歸信漢王怨昧聞其在楚詔楚捕昧信初之國行縣邑陳兵出入六年冬十月人有上書吿楚王信反者帝以問諸將皆曰亟發兵阬豎子耳帝黙然又問陳平陳平曰人上書言信反信知之乎曰不知陳平曰陛下精兵孰與楚上曰不能過平曰陛下諸將用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而將不能及舉兵攻之是趣之戰也竊爲陛下危之上曰爲之奈何曰古者天子有廵狩㑹諸侯陛下第出僞遊雲夢㑹諸侯於陳陳楚之西界信聞天子以好出遊其勢必無事而郊迎謁謁而陛下因禽之此特一力士之事耳帝以爲然乃發使告諸侯㑹陳吾將遊雲夢上因隨以行楚王信聞之自疑懼不知所爲或說信曰斬鍾離昧以謁上上必喜無患信從之十二月上㑹諸侯於陳信持昧首謁上上令武士縛信載後車信曰果若人言狡兎死走狗烹高鳥盡良弓藏敵國破謀臣亡天下已定我固當烹上曰人告公反遂械繫信以歸還至洛陽赦韓信封爲淮隂侯觀信答武渉蒯通之言豈有背漢之心哉而漢王之疑則已兆於躡足之封矣固陵後期許地始来而漢王之疑成矣項羽一死即奪其軍更齊與楚不少遼緩而信之迹於是危矣地大兵強漢不能過此高祖之所日夜憂虞而不能釋者乃方收納亡將有詔弗捕陳兵出入自爲張皇此豈久安之道乎嗚呼高祖之視信猶養虎以禦羆也虎之得不死者以羆在焉羆死則虎亦死矣謂信爲反人知其誣而信小人固有以自取也至若僞遊雲夢則竊爲高祖羞之天子適諸侯曰廵狩廵狩者廵所守也夏諺曰一遊一豫爲諸侯度是豈可託之爲用詐之地乎今年即皇帝位而明年以僞出狩禽一諸侯何以示信於天下矣此陳平險詐無識有以誤之也上嘗從容與信言諸將能將兵多少上問曰如我能將幾何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何爲爲我禽信曰陛下不能將兵而善將將此乃信之所以爲陛下禽也且陛下所謂天授非人力也古之人功高跡危而有一旦佯狂用晦者此明哲保身之道也多多益善高祖之所以忌信正在乎此奪楚王而侯封之誅戮之兆見矣爲信者斂形遁迹盡䘮其智勇於塊處無用之地尚庶幾焉猶之猛虎方就圈檻而乃呀然出爪牙以自矜耀幾何其不速死也嗚呼愚哉兩漢筆記卷一
