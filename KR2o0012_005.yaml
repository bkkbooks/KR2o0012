body:
  text: 兩漢筆記卷五宋錢時撰武帝太初元年太中大夫公孫卿壼遂太史令司馬遷等言厯紀壞廢宜改正朔上詔兒寬與博士賜等共議以為宜用夏正夏五月內詔卿遂遷等共造漢太初厯以正月為嵗首夏正寅商正丑周正子而孔子獨言行夏之時何也蓋建子之月一陽潛動於黃鍾之管至于三陽天地交泰而發生之功於是著焉后以財成天地之道輔相天地之宜則寅月孟春為嵗首得時之正的的乎其不可易矣此孔子答為邦之問所以首欲正之歟周官正月之吉始和説者謂周之正月而正嵗十有二月令斬氷則曰夏正愚謂二者皆夏正也豈不見秦紀以十月為嵗首及是書以正月為嵗首之文乎例而推之則建子者特以十一月為嵗首建丑者特以十二月為嵗首而四時之序十二月之建未始變也故自秦止太初以前建亥每嵗首必曰某年冬十月而春正月則相次于後夫如是則正月之吉豈可以為建子若建子則十一月正隆寒而謂之始和固不可也然觀春秋傳則又不同僖公五年春王正月辛亥朔日南至是直以建子為春正月而亥月為季冬時與月皆變矣然則凌人所謂正嵗十有二月令斬氷春始治鑒夏頒氷秋刷者豈卯月寒方退而遽頒午月以後方盛暑而遂不用乎不然必用一代之正朔而周公六典孔子春秋何乃不同如此得非六典作時雖以子月為嵗首而夏正固未嘗廢其後悉廢夏正而時與月皆變故孔子傷之遂欲行夏之時歟説者謂孔子以夏時冠周月殆不然也二年以太僕公孫賀為丞相封葛繹侯時朝廷多事督責大臣自公孫𢎞後丞相比坐事死石慶雖以謹得終然數被譴賀引拜為丞相不受印綬頓首涕泣不肯起上乃起去賀不得已拜出曰我從是殆矣漢殺大臣其禍萌於鄼侯之械繫而成於朝錯周亞夫之死至于武帝則視之猶常事矣公孫賀涕泣不肯受而征和二年父子竟死獄中逆知其必然若符契之合者舜曰臣作朕股肱耳目髙宗相傅説命之曰朝夕納誨安有此禍也哉皆由漢承秦弊不知天官冢宰之為重而居是任者亦不知天官冢宰之為何官耳且在坐為起在輿為下有病親問不幸而死親弔論道經邦為師為保此非可以吏事苛責之者也武帝求可為將相之材乃欲得跅弛之士而御之取其跅弛則不以良弼望之明矣而體貌大臣之道又豈可以御言也御之術殺之階歟四年冬胸奴詬犂湖單于死胸奴立其弟左大都尉且鞮侯為單于天子欲因伐宛之威遂困胡且鞮侯單于初立恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也因盡歸漢使之不降者路充國等使使來獻天漢元年春正月上嘉胸奴單于之義遣中郎將蘇武送胸奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等俱既至胸奴置幣遺單于單于益驕非漢所望也會緱王與長水虞常等及衛律所將降者隂相與謀劫單于閼氏歸漢虞常私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之勝許之後月餘單于出獵獨閼氏子弟在虞常等欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得使衛律治其事常引張勝單于怒召諸貴人議欲殺漢使者左尹秩訾曰即謀單于何以復加宜皆降之單于使衛律召武受辭武謂惠等屈節辱命雖生何面目以歸漢引佩刀自刺衛律驚自抱持武馳召醫鑿地為坎置溫火覆武其上蹈其背以出血武氣絶半日復蘇會論虞常欲因此時降武劒斬虞常衛律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劎擬之武不動律曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親為降虜於蠻夷何以汝為見且單于信汝使訣人死生不平心持正反欲鬭兩主觀禍敗南越殺漢使者即時誅滅獨胸奴未耳若知我不降明欲令兩國相攻胸奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中絶其飲食天雨雪武卧齧雪與氊毛并咽之數日不死胸奴以為神乃徙武北海上無人處使牧羝乳乃得歸别其官屬常惠等各置他所孔子曰三軍可奪帥也匹夫不可奪志也此不可奪之志即天德之剛即易之大壯即曽子之大勇所以獨立不懼者此也所以中立不易者此也人同此心所以國有道不變塞國無道至死不變者此也人同此心同有此志杲杲明白本未始不剛健一囿於外物即奪之矣嗚呼死所我惡也而所惡有甚於死貴富我所欲也而所欲有甚於富貴彼其臨之以白刃而不撓誘之以美利而不動閴處海濵無人之地獨抱孤忠凜凜不屈者幾二十年果何所見而自若如是哉從古以來有一旦身處危難不顧分義幸生茍免為萬世名教之罪人者於蘇中郎可以觀矣三年方士之候祠神人入海求蓬萊者終無有驗而公孫卿猶以大人迹為解天子益怠厭方士之怪迂語矣然猶羈縻不絶冀遇其真自此之後方士言神祠者彌衆然其效可睹矣甚矣人主之心不可有所溺也文成五利相繼伏誅亦可以省矣而公孫卿之詐愈甚後雖厭怠而猶庶幾其萬有一焉者無他心有所溺耳自今觀之妖妄之言動以萬計如狎弄嬰孩於掌股之上可怪可笑而帝不虞其詐也舜曰惟精惟一允執厥中無稽之言勿聽一聽無稽即所執者搖矣益曰去邪勿疑疑謀勿成百志惟熙疑於去邪即此心之清明者惑矣後世異端邪説萬徑千蹊何限為人主者盍以聖言為的而反求其本心哉太始三年趙人江充為水衡都尉初充為趙敬肅王客得罪於太子丹亡逃詣闕告趙太子隂事太子坐廢上召充入見充容貌魁岸被服輕靡上竒之與語政事大悅由是有寵拜為直指繡衣使者使督察貴戚近臣踰侈者充舉劾無所避上以為忠直所言皆中意嘗從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者唯江君寬之江充不聽遂白奏上曰人臣當如是矣大見信用威震京師小人進身用事未嘗不託忠直以行其狡險人主弗察而輕授之權則鮮有不為大姦劇惡以亂天下江充盧把之徒是也充為趙王客而詣闕告趙太子隂事則其人可知矣一旦驟用舉劾不避權貴此如市井惡少得所依憑即逞其暴豪肆其凌轢而無所顧忌謂之忠直固不可也觀其奏白太子家使與劾不下司馬門無以異然而君子之論若黑白之不侔者釋之之志在守法奉公而充之志在立威取寵耳日胎月醖卒至以巫蠱殺皇后太子而帝不悟推原禍賊與前日之讒趙太子同一機也吁戒之哉征和元年上居建章宫見一男子帶劒入中龍華門疑其異人收之男子捐劒走逐之弗獲上怒斬門候冬十一月發三輔騎士大搜上林閉長安城門索十一日乃解巫蠱始起天下之本在人主人主之本在一心心無所蔽則清明澄照百志惟熙矣一有所奪則顛迷眩瞀百怪並出矣志曰馳騁田獵令人心發狂况武帝惑於方士妖巫之言浮海而求築宫而候搖搖神馭若將且至則其精神慌惚志氣飛揚蓬萊方壼固無時而不望也如醉如夢以妄為真建章宫中豈果有所見哉心迷而眼亂耳巫蠱之禍於是遂興殺人無數妻子不保由武帝之失其主宰故也禹曰安汝止伊尹曰欽厥止不欽則不安不安則外邪客氣用事古聖垂訓所以為萬世帝王傳心之要法云二年是時方士及諸神巫多聚京師率皆左道惑衆變幻無所不為女巫往來宫中教美人度厄每屋輒埋木人祭祀之因妬忌恚詈更相告訐以為祝詛上無道上怒所殺後宫延及大臣死者數百人上心既以為疑嘗晝寢夢木人數千持杖欲擊上上驚寤因是體不平遂若忽忽善忘江充自以與太子及衛氏有隙見上年老恐晏駕後為太子所誅因是上為姦言上疾祟在巫蠱於是上以充為使者治巫蠱云執左道以惑政者殺此先王之教也蓋視之如稂莠蟊賊惟恐為嘉禾之害安有作君作師作民父母而顧崇奬之為風俗倡哉上有好者則下必有甚焉者矣羣聚於京師亂宫禁禍骨肉無足怪也姑以妖巫言之今之俚俗所在而有苐一愚夫愚婦假託鬼神操死生禍福之説以相蕩惑雖至鄙陋天地間萬萬必無之理而黔首之徒往往多懼而易搖相與彌縫附會以神其怪誕市井駔黠平時狙詐百端不肯負人以智數亦且甘心聽命輸財致禱而不敢吝焉獨不知其何以然也吁抑愚矣死生有命富貴在天內不愧心外不愧人天地鬼神臨之在上固非一妖巫所能妄加禍福於我也禍淫降殃無所逃罪區區淫昏之祀又豈能回天而易命也哉且夫端方有道之士蒞官臨民不可干以私則其不肯黷貨以撓法也明矣况神者聰明正直而一者也載俎束幣惟巫之從而遂能使死者生禍者福是死生禍福之權假妖巫以行其私而天命可以貨取矣尚得謂之神乎又可謂之天命乎故曰丘之禱久矣又曰獲罪于天無所禱也此聖人之言也此惠迪而吉之旨也此作善而降祥之旨也外是無他道也而何有於妖巫也嗚呼豺獺有祭農圃不忘其先夫所貴於春秋祭祀以時思之者履霜露之變悽愴怵惕發於人子之情自然不可誣也黔首之徒何足多罪公卿大夫之家詩書禮義之族不謹先祠而黷淫祀不修禮典而聽妖巫不信君子之言而惑於村氓賤𨽻之説是可歎也必也為父則慈為子則孝為兄則友為弟則悌為士則志學為農則力田為工商則各安其分尊卑上下有辨冠昏喪祭以禮異端邪説抑絶其萌左道怪民不使為幻庶乎其可也武帝已矣可以監矣有王者作此化民成俗之先務云四年三月上耕于巨定還幸泰山修封庚寅祀於明堂癸巳禪石閭見羣臣上乃言曰朕即位以來所為狂悖使天下愁苦不可追悔自今事有傷害百姓靡費天下者悉罷之田千秋曰方士言神仙者甚衆而無顯功臣請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士候神人者是後上每對羣臣歎向時愚惑為方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而已武帝即位至是五十有二年矣顛冥狂眩過失萬端蓋無日而不履禍敗之途無事而不蹈覆亡之轍方其安於所習而未悟也肯自謂狂悖乎肯自謂愚惑乎肯自謂受欺妖妄自謂傷害百姓愁苦天下乎追悔昔非一朝感動如久處幽暗而見天日如乍脫荆棘而行康莊何其幸也此雖多厯年所老成定慮然其端的正由太子之死於巫蠱二師之敗於胸奴摧折頓挫困心衡慮而後得之耳使武帝移後日之悔為初政之端則五十二年禍亂之天下皆治平之世矣豈不美哉雖然斥仙人之盡為妖妄知節食服藥之差可少病固也以愚觀之武帝雖有此悔終未知所歸宿之地也周公謂荒寧罔壽孔子亦云仁者壽仁者心無所纍血氣和平不為事物凋耗不為嗜欲戕賊一荒寧惟鴆樂之從凡逐逐於外者無非自伐之具矣聖人所以養生所以進德所以祈天求命其要旨的的在是穆王馳八駿求神仙幾喪天下及其悔也則賴左右前後有位之士繩愆糾謬格其非心用力處固不在節食服藥兾少病而已也所以齒百篇之義為三代之王歟先是搜粟都尉桑𢎞羊與丞相御史奏言輪臺東有溉田五千頃以上可遣屯田卒置校尉三人分護益種五穀張掖酒泉遣騎假司馬為斥候募民壯健敢徙者詣田所益墾溉田稍築列亭連城而西以威西國輔烏孫上乃下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也乃者二師敗軍士死略離散悲痛常在朕心今又請逺田輪臺欲起亭隧是擾勞天下非所以優民也朕不忍聞大鴻臚等又議欲募囚徒送胸奴使者明封侯之賞以報忿此五霸所弗為也且胸奴得漢降者常提掖搜索問以所聞豈得行其計乎當今務在禁苛暴止擅賦力本農修馬復令以補闕母乏武備而已郡國二千石各上進畜馬方略補邊狀與計對由是不復出軍而封田千秋為富民侯以明休息思富養民也又以趙過為搜粟都尉過能為代田其耕耘田器皆有便巧以教民用力少而得穀多民皆便之武帝悔過方新其言哀矜惻怛藹然有三代仁民愛物之意的的真實聞之使人感動無他發於本心故也心一而已前日此心也今日亦此心也一差之謬如彼一悔之美如此為人君者可不兢兢業業夙謹此心之用哉後元元年時鉤弋夫人之子弗陵年數嵗形體壯大多知上竒愛之心欲立焉以其年稚母少猶豫久之欲以大臣輔之察羣臣唯奉車都尉光祿大夫霍光忠厚可任大事上乃使黃門畫周公負成王朝諸侯以賜光二年春二月上病篤霍光涕泣問曰如有不諱誰當嗣者上曰君未喻前畫意邪立少子君行周公事光頓首讓曰臣不如金日磾金日磾亦曰臣外國人不如光且使胸奴輕漢矣乙丑詔立弗陵為皇太子時年八嵗丙寅以光為大司馬大將軍日磾為車騎將軍太僕上官桀為左將軍受遺詔輔少主三人皆上素所愛信者故特舉之授以後事丁卯帝崩于五柞宫武帝好大喜誇多欲之主也一時人材紛然蝟集凡有以中其欲者皆得而從臾之是故趙綰王臧之言一投則議明堂吾丘壽王之言一投則起上林唐蒙之言一投則通夜郎司馬相如之言一投則通卭莋張騫之言一投則通西域莊助之言一投則徙東甌王恢之言一投則誘擊胸奴李少君之言一投則信祠竈少翁之言一投則欲致天神欒大之言一投則冀安期羡門之可見公孫卿之言一投則真若封禪之可以登天以至張湯之徒之峻刑法桑𢎞羊之徒之言利事江充之徒之治巫蠱皆隨其所投而輒為之動東飄西泊泛泛然如風萍之在江湖略無主宰良可憫笑及其晚年輔少主受顧命則有以得霍光於平時身後之謀先事而定所見卓然斷不他屬雖田千秋一言寤主數月而取宰相封侯亦且不得而與於此見帝天姿本髙從前浮念至是掃滅而真見特達乃如此漢祚之所以未艾歟惜乎上官桀未幾從逆有誤委寄知人自古所難又足以為世戒也右武帝在位五十四年崩年七十一昭帝始元三年初霍光與上官桀相親善光每休沐出桀常代光入決事光女為桀子安妻生女年甫五嵗安欲因光內之宫中光以為尚幼不聽蓋長公主私近子客河間丁外人善説外人曰安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召安女入為倢妤安為騎都尉四年春三月甲寅立皇后上官氏夏六月皇后見髙廟昭帝是年十二後六年始加元服未冠而娶固無是禮且安有上官氏甫六嵗即立為后成婦道見髙廟乎甚矣公卿大臣之不可以不學也但知貪寵榮固權位而事之可否理之是非一切不問冒然為之而不知恥霍光於是不得而逃其罪矣安嘗語光雖曰尚幼然卒使由徑而入可乎夫婦人倫之始朝廷風化之原身受顧命行伊周事甥女方脫襁褓由徑入宫立之為后而不能救事孰有大於此者乎使光開陳大義及時止絶則安父子未至尊盛亦必不至於爭權謀逆矣人皆咎光內女宣帝以成他日之禍愚謂禍端蓋自甥女始甥女之為后與殺許后而竒貴其女同一機也漢世大臣如光者蓋寡輔昭帝初政而繆戾如許不學無識良可嗟夫五年春正月追尊帝外祖趙父為順成侯順成侯有姊君姁賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜無在位者不學則易驕有權則易橫况外戚乎文帝為二竇擇師傅賔客與此厚其賞賜而不使在位皆可以為法矣霍光處此良是然而甥女為后竟成亂階他日內女孝宣大稔身後之禍何也豈靈於人而不靈於己耶由是觀之不假趙氏之權者非有國家深逺之慮其殆桀安輩恐母后之族權寵相扼忌嫉而抑逺之耳有男子乘黃犢車詣北闕自謂衛太子公車以聞詔使公卿將軍二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者並莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出奔輒拒不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用有經術明於大義者繇是不疑名聲重於朝廷在位者皆自以為不及也廷尉驗治何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言冀得以富貴坐誣罔不道要斬成方遂昭紀作張延年聖人作經以垂世詔後非空言也所以明大義示萬世人道之標準也自昔聖賢從容一堂之上斷大事決大疑定大難如辨白黑如數一二瞭然而不惑者無他明於義而已義者人心之公天則之不可渝者非外襲而取之也人惟汨於利欲亂其清明中無權衡外物用事是非顛倒首尾衡決趨利乘便奪攘矯虔以至三綱淪九法斁人道泯泯與夷狄禽獸無異者大義不明故也是故不可以不學焉學以聖經為的學聖經以明義為的世固有號通經術而不適於用無補於治亂興亡之變者是腐儒也實未嘗知義也雖學猶不學也春秋之時雖極禍亂而當時士大夫去先王未逺學有源流尚多知義至于戰國影響不存每見漢興以來君臣之間未免以術數相牢籠以權謀相雄長以險詐相屠戮其於經世之用可知矣茍有以便其私遂其欲雖岑娶少季之事亦且安行而不恥烏知所謂義也哉成方遂之詐一時無能決者故因雋不疑而有是語嗚呼公卿大臣之不可以不通經明誼久矣昭帝霍光抑何知之晚也六年春二月詔有司問郡國所舉賢良文學民所疾苦教化之要皆對願罷鹽鐵酒𣙜均輸官毋與天下爭利示以儉節然後教化可興桑𢎞羊難之以為國家大業所以制四夷安邊足用之本不可廢也於是鹽鐵之議起焉甚矣利端之不可輕啓也其端一啓後來者守為定法以害民蠧國為常事其禍可勝言哉桑𢎞羊一賈孺耳天子作民父母而用賈人斗筲之智以爭利竭赤子之膏血以事荒逺譬猶伐貞氣助狂陽實此曹從臾之武帝末年有志富民而田千秋趙過用選受顧命而得霍光金日磾平生謬妄灑然一洗桑𢎞羊巨蠧也大盜也可去不去而顧以御史大夫輔少主竟使賢良文學之議排抑而不得伸因觀霍光號知時務未幾而罷𣙜酤則賢良文學固有以切中其心矣向微𢎞羊鹽鐵均輸豈不能悉罷乎小人之根不除雖有讜議空言無補機會一失流毒滔滔武帝實遺其禍也元鳳元年上官桀父子既尊盛德長公主欲為丁外人求封侯霍光不許又為外人求光祿大夫欲令得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慙又桀妻父所幸充國為太醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十匹贖罪乃得減死論於是桀安父子深怨光而重德蓋主自先帝時桀已為九卿位在光右及父子並為將軍皇后親安女光乃其外祖而顧専制朝事由是與光爭權燕王旦自以帝兄不得立常懷怨望及御史大夫桑𢎞羊建造酒𣙜鹽鐵為國興利伐其功欲為子弟得官亦怨恨光於是蓋主桀安𢎞羊皆與旦通謀旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主桀𢎞羊等桀等又詐令人為燕王上書言光出都肄郎羽林道上稱蹕太宫先置又引蘇武使胸奴二十年不降乃為典屬國大將軍長史敞無功為搜粟都尉又擅調益莫府校尉光専權自恣疑有非常臣旦願歸符璽入宿衛察姦臣變候伺光出沐日奏之桀欲從中下其事𢎞羊當與諸大臣共執退光書奏帝不肯下明旦光聞之止畫室中不入上問大將軍安在左將軍桀對曰以燕王告其罪不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍無罪光曰陛下何以知之上曰將軍之廣明都郎近耳調校尉以來未能十日燕王何以得知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足治上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毁者坐之自是桀等不敢復言昭帝甫十四而能明燕書之詐昔人謂成王有慙德固矣雖然昭帝止於昭帝而成王進德遂至學有緝熙于光明之盛愚於此則深見天姿雖美不足恃而學問之功為大也昭帝享國則固日淺而成王復辟之年亦方弱冠耳洛誥答周公之語非大進所學有見於道能為是言乎因觀三代而下英君誼辟非無剛明特達之才而不能躋之二帝三王之盛者皆由不學之故非不學也不以二帝三王之所學者為學也非不學二帝三王之所學者也無二帝三王之佐也由是言之成王雖疑周公而周公不負成王昭帝雖不疑霍光而霍光則有負於昭帝多矣元平元年夏四月癸未帝崩迎昌邑王賀六月丙寅王受皇帝璽綬襲尊號既立淫戲無度大將軍光憂悶田延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此否延年曰伊尹相殷廢太甲以安宗廟後世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中隂與車騎將軍張安世圖計光與羣臣連名奏王嗣孝昭皇帝後行淫辟不軌五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭由不孝出之絶之於天下也宗廟重於君陛下不可以承天序奉祖宗廟子萬姓當廢臣請有司以一太牢具告祠髙廟子萬姓皇太后詔曰可歸賀昌邑國除為山陽郡昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅殺二百餘人唯中尉吉郎中令遂以忠直數諫正得減死髠為城旦師王式繫獄當死治事使者責問曰師何以無諫書式對曰臣以詩三百五篇朝夕諭王至於忠臣孝子之篇未嘗不為王反復誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以無諫書使者以聞亦得減死論孟子曰不仁者可與言哉安其危而利其災樂其所以亡者不仁而可與言則何亡國敗家之有龔遂王吉可謂忠貞之臣矣痛言苦口悲傷懇惻真膏肓起死之藥奈何王之不聽也昌邑羣臣坐亡輔道之誼誅殺者二百餘人而遂吉竟以忠諫免事至於此豈其本心之所願也然為人臣而逢君於昏以茍目前之寵者果何利哉雖然太甲既立而後不明非伊尹之過也昌邑素行如此而霍光迎立之亦不審也已右昭帝在位十三年崩年二十一兩漢筆記卷五
