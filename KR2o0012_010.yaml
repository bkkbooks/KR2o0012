body:
  text: 兩漢筆記卷十宋錢時撰章帝建初元年春正月詔兖豫徐三州稟贍飢民去年京師及三州大旱上問司徒鮑昱何以消復旱災對曰陛下始踐天位雖有失得未能致異臣前為汝南太守典治楚事繫者千餘人恐未能盡當其罪夫大獄一起寃者過半又諸徒者骨肉離分孤魂不祀宜一切還諸徙家蠲除禁錮使死生獲所則和氣可致帝納其言東海孝婦之死致旱三年楚獄多寃異時出囚即雨且有證矣鮑昱言之是也但謂始踐天位雖有失得未能致異則大不可書曰克謹天戒傳曰遇災而懼此正大臣沃心納誨之日人主進德修業之端况嗣服之初乎災異譴告惕然內省無一事之不戒懼無一息之不戒懼不欺暗室不愧屋漏上帝臨女毋二爾心盛德明明天地昭格則所謂寃獄者特發政施仁中之一事耳委災異於先帝而曰無與我事可乎哉是時承永平故事吏政尚嚴切尚書決事率近於重尚書沛國陳寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僣刑不濫與其不得已寧僣無濫往者斷獄嚴明所以威服姦慝姦慝既平必宜濟之以寬陛下即位率由此義數詔羣僚𢎞崇晏晏而有司未悉奉承猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大絃急者小絃絶陛下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至德以奉天心帝深納寵言每事務於寬厚舜御衆以寬湯克寬克仁周公亦每每主於裕民而以不寬綽厥心亂罰無罪殺無辜為深戒嗚呼居上而不寬豈為民父母之道也哉先王以德為教以仁為政固未有不寬者三代衰王道息德不足以善世而後專以刑罰從事至秦而其禍極矣漢之髙文號為寬厚然先王之教化則未講道德之澤則未行而秦俗則猶未變也武宣繼之髙文寬厚無復髣佛而秦人殘酷之具乃盡出而用焉或者見元帝柔仁不競漢日以削因謂德教周政真若無用治天下非雜霸不可豈理也哉光武雖號同符髙祖而寬大則不及明帝惼察遂至峻刑其家法蓋有自來也章帝即位而陳寵首及之知所務矣帝能聽納務為寬厚漢自孝文以後方有此氣象向使沈潛剛克三德無頗教化盛行風俗不變則秦俗至是為之一洗而先王之政可望矣惜乎其未有以進此但知寬刑而不知進德天下之治卒無以逺過於前代或反不及之是可歎也二年上欲封爵諸舅太后不聽會大旱言事者以為不封外戚之故有司請依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封黃霧四塞不聞澍雨之應夫外戚貴盛鮮不傾覆故先帝防愼舅氏不令在樞機之位又言我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎且隂衛尉天下稱之省中御者至門出不及履此蘧伯玉之敬也新湯侯雖剛強微失理然有方略據地談論一朝無雙原鹿貞侯勇猛誠信此三人者天下選人豈可及哉馬氏不及隂氏逺矣吾不才夙夜纍息常恐虧先后之法有毛髮之罪吾不釋言之不捨晝夜而親屬犯之不止治喪起墳又不時覺是吾言之不立而耳目之塞也吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自敕但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如遊龍倉頭衣緑褠領袖正白顧視御者不及逺矣故不加譴怒但絶歲用而已冀以默愧其心猶解怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言髙祖約無軍功不侯今馬氏無功於國豈得與隂郭中興之后等耶常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受大官之賜衣食則蒙御府餘資斯豈不可足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐臥而欲先營外家之封違慈母之拳拳乎吾素剛急有胸中氣不可不順也子之未冠由於父母已冠成人則行子之志念帝人君也吾以未踰三年之故自吾家族故得專之若隂陽調和邊境清靜然後行子之志吾但當含飴弄孫不能復關政矣上乃止太后嘗詔三輔諸馬昏親有屬託郡縣干亂吏治者以法聞太夫人葬起墳微髙太后以為言兄衛尉廖等即時減削其外親有謙素義行者輒假借溫言賞以財位如有纎介則先見嚴恪之色然後加譴其美車服不遵法度者便絶屬籍遣歸田里廣平巨鹿樂成王車騎朴素無金銀之飾帝以白太后即賜錢各五百萬於是內外從化被服如一諸家惶恐倍於永平四年有司連據舊典請封諸舅帝以天下豐稔方垂無事癸卯遂封衛尉廖為順陽侯車騎將軍防為潁陽侯執金吾光為許侯太后聞之曰吾少壯時但慕竹帛志不顧命今雖已老猶戒之在得故日夜惕厲思自降損冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所後恨何意老志復不從哉萬年之日長恨矣廖等並辭讓願就關內侯帝不許廖等不得已受封爵而上書辭位帝許之五月丙辰廖光皆以特進就第甚矣家法源流之不可以不正也觀馬太后詔旨使人三復敬嘆太后力止兄弟侯封足以見明帝之家法明帝不得后妃之家封侯與政則又以見隂氏之家法氣脈相承源流有自此其識見光武殆有慙德吕霍輩真何足道哉自當時言之猶未見其效及太后殁而諸馬竟以罪免諸馬免而竇氏之權日盛夫然後知太后之為不可及而章之家法不逮明亦逺矣故具録之後世可以觀云校書郎楊終建言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則帝從之冬十一月壬戌詔太常將大夫博士郎官及諸儒會白虎觀議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決作白虎議奏名儒丁鴻樓望成封桓郁班固賈逵及廣平王羡皆與焉章句之徒破壞大體此聖經之巨蠧楊終言之是矣獨不知漢儒之所謂大體果安所指乎溫柔敦厚而不愚詩之教也疏通知逺而不誣書之教也廣博易良而不奢樂之教也潔靜精微而不賊易之教也恭儉莊敬而不煩屬辭比事而不亂禮與春秋之教也知其為教則知大體矣抑猶未也天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也知其為教則知大體矣六經之旨不必外吾心而他求矣自孔子沒孟軻氏又沒而此旨寥寥寂然不聞有傳豈特遭厄於秦火而已哉漢興收拾殘編於煨燼之餘雖加之表章校其同異而當時傳授不過傳注以為學聖經大體人知其有未明也然在楊終尚有是言後世以時文取士殆又不止於章句之言而已爭奇競麗惟恐破之不巧無以新有司之耳目上下安之以為當然曾未有出一言為大體慮者豈不甚可歎哉所幸人心之靈未嘗泯滅聖經具在可證不誣如珠在泥如金在沙燦然錯落光照天地自有時而發露坐見聖心於千載之上耳乾道變化各正性命首出庶物萬國咸寧愚敢謂正人心息邪説續聖學昌斯文當以講明文體為第一要務八年下邳周紆為雒陽令下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚局蹐京師肅清竇篤夜至止姦亭亭長霍延拔劒擬篤肆詈恣口篤以表聞詔召司𨽻校尉河南尹詣尚書譴問遣劒戟士收紆送廷尉詔獄數日貰出之章帝素號長者愚謂章帝之病則正在不剛耳竇后寵盛固已大失明德家風一受其誣而殺梁竦二梁貴人且復以憂死於是竇族驕橫勢薰天矣周紆為雒陽令而貴戚局蹐京師肅清果誰之紀綱哉帝也因而假借之使之不敢撓天子之法豈不大有益於國體縱亭長有罪罪亭長可也令為天子守法亭長為令守法輕重猶當知所審安得張皇劒戟之士遽收紆而下之詔獄乎湖陽公主蒼頭殺人而董宣格殺之帝以女兄之故一時大怒欲置死地未幾竟敕強項令出賜錢三十萬亦知剛正守法人主不當以私害公故也摧剛正守法之令佐驕橫方張之勢不然甚矣愚故曰章帝之病在於不剛元和元年尚書張林上言縣官經用不足宜自煮鹽及復修武帝均輸之法朱暉固執以為不可曰均輸之法與賈販無異鹽利歸官則下民窮怨誠非明主所宜行帝因發怒切責諸尚書暉等皆自繫獄三日詔出敕之曰國家樂聞駮議黃髮無愆詔書過耳何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱病其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順旨雷同負臣子之義今耳目無所聞見伏得死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事郎問暉起居太醫視疾大官賜食暉乃起謝復賜錢十萬布百匹衣十領人臣苟徇邪謀輕啓利端害民蠧國流禍於無窮者聞朱暉之言可以愧矣武帝不知節以制度用賈人之下䇿而鹽鐵均輸之議起今幸止息尚忍復開之乎向匪朱暉橫塞其衝以死爭之而不顧此事亦幾不免雖然章帝始怒之終感動而聽之且賞賚之則是猶可與忠言也二年春正月乙酉詔曰令云民有産子者復勿算三歲今諸懷孕者賜服養穀人三斛復其夫勿算一歲著以為令又詔三公曰夫俗吏矯飾外貌似是而非朕甚厭之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏民同聲謂之不煩雖未有他異斯亦殆近之矣夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加治民或失職其咎安在勉思舊令稱朕意焉樊遲問知子曰知人樊遲未達子曰舉直錯諸枉能使枉者直此萬世任官之要旨也能用此道則君子連茹而進而天下泰矣是故一舉一錯乃才人消長之機風俗盛衰之候端本澄源於朝廷之上者直枉之不辨舉錯之乖方而徒勤詔書冠蓋接道無益也三年太尉鄭𢎞數陳侍中竇憲權勢太盛言甚苦切憲疾之會𢎞奏憲黨尚書張林雒陽令楊光在官貪殘書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄密事帝詰讓𢎞夏四月丙寅收𢎞印綬𢎞自詣廷尉詔敕出之因乞骸骨歸未許病篤上書陳謝曰竇憲姦惡貫天達地海內疑惑賢愚疾惡謂憲何術以迷主上近日王氏之禍昞然可見陛下處天子之尊保萬世之祚而信讒佞之臣不計存亡之機臣雖命在晷刻死不忘忠願陛下誅四凶之罪以厭人鬼憤結之望帝省章遣醫視𢎞病比至已薨傳言善善而不能用惡惡而不能去為亡國之深病竇憲之姦帝之所知也沁水之事怒責之而不繩以罪鄭𢎞之死激於忠憤徒遣醫視病而不行其言溺於姦回是非無斷雖好賢樂善外為文具何益哉司空第五倫以老病乞身五月丙子賜䇿罷以二千石俸終其身倫奉公盡節言事無所依違性質慤少文采在位以貞白稱或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也若是者豈可謂無私乎泰九二曰包荒用馮河不遐遺此大臣所以廣進人才之路也然有一毫朋比之私即非中矣是故必朋亡而後得尚于中行豈可以賂遺之故而遂不忘於心乎心不能忘者心已動於賂故也雖不受猶受也雖不用猶用也其原弗窒其流滔滔此殖已崇私之病根也雖然却其馬而不受絶其人而不用而獨以心不能忘為私則第五倫亦賢矣博士魯國曹褒上疏以為宜定文制著成漢禮太常巢堪以為一世大典非褒所定不可許帝知諸儒拘攣難與圖始朝廷禮憲宜以時立乃拜褒侍中玄武司馬班固以為宜廣集諸儒共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大音一夔足矣章和元年春正月帝召褒授以叔孫通漢儀十二篇曰此制散略多不合經今宜依禮條正使可施行曹褒依準舊典雜以五經纎記之文撰次天子至於庶人冠婚吉凶終始制度凡百五十篇奏之帝以衆論難一故但納之不復令有司平奏漢至今三百年禮猶未立則一代之政教可知矣中庸曰大哉聖人之道洋洋乎發育萬物峻極于天優優大哉此禮之妙用也故曰禮儀三百威儀三千待其人而後行若曹褒者豈其人乎大宗伯所掌自天子達於庶人於經雖不盡備而儀禮諸書大略可考讖記之文可雜用乎禮者所以經大經立大本位天地育萬物非徒玉帛之云也此事正自非漢時所可及章帝悉屏衆議專成於曹褒之手而以一夔為解豈不誤哉右章帝在位十三年崩年三十一和帝永元三年竇憲既立大功威名益盛以耿夔任尚等為爪牙鄧疊郭璜為心腹班固傅毅之徒典文章刺史守令多出其門競賦斂吏民共為賂遺司徒袁安司空任隗舉奏諸二千石并所連及貶秩免官者四十餘人竇氏大恨但安隗素行髙亦未有以害之太后稱制外戚擅權聲焰氣魄與王氏無異則凡出於其門者如城狐社鼠誰得而呵之安隗斯時乃能舉奏貶秩免官者四十餘人則是猶知畏公論也安隗素行髙亦未有以害之則是猶知畏正人也新莽用事上下靡然雖揚雄劉歆之徒皆入叛黨舉朝無一人能為社稷吐氣然則有正人焉扶公論也道雖壞而風節未衰所以憲卒就戮而漢祚賴以未墜歟詔竇憲與車駕會長安憲至尚書以下議欲拜之伏稱萬歲尚書韓稜正色曰夫上交不諂下交不黷禮無人臣稱萬歲之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲稜舉奏龍論為城旦愚觀自古亂賊雖欲睥睨尚知所畏往往亂賊之徒相與從臾之而後敢無忌憚焉竇憲挾功來會蠢蠢無識之子便靡然有望風阿附之意當是時而皆若人將何所不至也韓稜正色一言而大分遂明小人無君之心至是亦且膽落矣然則國家危然之日不有忠臣義士孰為之紀綱哉四年竇氏父子兄弟並為卿校充滿朝廷穰侯鄧疊疊弟步兵校尉磊及母元憲女壻射聲校尉郭舉舉父長樂少府璜共相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝隂知其謀是時憲兄弟專權帝與內外臣僚莫由親接所與居者閹官而已帝以朝臣上下莫不附憲獨中常侍鈎盾令鄭衆謹敏有心幾不事豪黨遂與衆定議誅憲以憲在外慮其為亂忍而未發會憲與鄧疊皆還京師時清河王慶恩遇尤渥常入省宿止帝將發其謀欲得外戚傳懼左右不敢使令慶私從千乘王伉夜獨內之又令慶傳語鄭衆求索故事庚申帝幸北宫詔執金吾五校尉勒兵屯衛南北宫閉城門收捕郭璜郭舉鄧疊鄧磊皆下獄死遣謁者僕射收憲大將軍印綬更封為冠軍侯與篤景瓌皆就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆迫令自殺初河南尹張酺數以正法繩治竇景及竇氏敗酺上疏方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懷伊吕之忠至乃復比鄧夫人於文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢敕賓客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄今議者欲為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚德帝感其言由是獨瓌得全竇氏宗族賓客以憲為官者皆免歸故鄉西京自成帝而下皆制於王氏竟致移國固不足論以孝宣之英明而誅霍氏甚易然亦往往大費區處然後甫定和帝才十四歲耳一指顧間去諸竇如磔鼠且其方略措置精密詳練以是而論豈非有漢之英君哉然自此以後乃浸微浸消終已不競何也謀不出於王公大人而出於閹官謀之所出者權之所歸故也今日之事雖明典憲愜公論觀其機伏而不露毒發而莫測即隂謀巧計者之所為與他時禍國實同一根是以和帝能去外戚之姦而宦官用權自此始為漢氏膏肓之疾悲夫初班固奴嘗醉罵洛陽令种兢兢因逮考竇氏賓客收捕固死獄中固嘗著漢書尚未就詔固女弟曹壽妻昭踵而成之揚雄班固豈特兩漢之文章千古之文章也然雄事莽固事憲皆不得其死學不明義墮喪名節貪榮冒寵為狗彘行而以區區辭藻著稱後世真遺臭矣哉九年皇太后竇氏崩初梁貴人既死宫省事祕莫有知帝為梁氏出者舞隂公主子梁扈遣從兄禪奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺言狀帝感動良久曰於君意若何酺請追上尊號存録舅氏帝從之會貴人姊南陽樊調妻嫕上書自訟曰妾父竦寃死牢獄骸骨不掩母氏年踰七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡帝引見嫕乃知貴人枉殁之狀三公上奏請依光武黜吕太后故事貶竇太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不尊法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議丙申葬章德太后竇后誣殺二宋而廢太子又欲專召外家而滅梁氏其過惡昭昭不足申論矣愚於追尊梁貴人及貶竇太后尊號則蓋有説焉夫后之配帝即坤之承乾無二坤也並后可乎是故自三公九卿以至八十一元士皆臣也而天子為獨尊自三夫人九嬪以至八十一御妻皆妾也而皇后為獨尊妾之不可以僣后亦猶臣之不可以僣君也后雖無嫡而以庶孽承嫡即后其母矣豈有復后所生之理和帝固梁氏出也而竇氏則先帝之后也有先帝之后在而後先帝者又得追尊所生為皇太后設以支子後先帝亦將追尊所生之父為太上皇可乎宣帝為戾太子議諡有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也此可為追尊所生之例矣薑氏與弒桓公明年三月夫人孫于齊而春秋不書薑氏傳者曰絶不為親禮也竇后誣殺梁竦而二貴人皆以憂死此固人道所深痛然竇氏后也貴人妾也帝既承嫡即母竇后矣况梁竦之死雖出於竇后而先帝實殺之大非薑氏之比為人後者安得以所生之故而追貶先帝之后乎若夫吕武僣立異姓絶先君之世墮劉李之宗社此則大逆不道所謂天下之賊人得而誅之者告于祖廟而黜之與薑氏同罰不為過也右和帝在位十七年崩年二十七殤帝初帝失皇子前後十數後生者輒隱祕養於民間羣臣無知者及帝崩鄧皇后乃收皇子於民間長子勝有痼疾少子隆生始百餘日迎立以為皇太子是夜即皇帝位尊皇后曰皇太后太后臨朝死生有命富貴在天况帝王之嗣將承大統為宗廟社稷之主者乎和帝以失子之故輒隱祕養於民間而羣臣莫知此何為者也古之王者太子初生因舉以禮有司齊肅端冕見之南郊過闕則下過廟則趨故自赤子而教已行焉比其稍長即親師傅使聞正言見正行視此舉措繆戾甚矣且天下事變常出於意外逺出宫庭耳目所不及豈保養嗣子固安國本之道乎又况倉卒之際收襁褓之子於民間而立之羣臣又無知者誠耶偽耶鄧后雖非吕氏比然疑似之迹禍亂之萌貪立孩抱託疾廢長而不顧天下之大計可為萬世戒矣延平元年秋七月庚寅敕司𨽻校尉部刺史曰間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虛飾之譽遂覆蔽災害多張墾田不揣流亡競增戶口掩匿盜賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不愧于人假貸之恩不可數恃自今以後將糾其罰二千石長吏其各實核所傷害為除田租芻稿闕兩漢筆記卷十
