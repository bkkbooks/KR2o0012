body:
  text: 兩漢筆記卷九宋錢時撰光武十七年秋九月河南尹張伊伋及諸郡守十餘人皆坐度田不實下獄死後上從容謂虎賁中郎將馬援曰吾甚恨前殺守相多也對曰死得其罪何多之有但死者既往不可復生也上大笑張釋之謂盜宗廟器而族之假令愚民取長陵一抔土何以加其法乎今守相度田不實而置之死地然則事有大於度田者將何所論罪也古者刑不上大夫况尹視方伯太守視諸侯不幸有罪尚從八議黜爵削地輕重有差安得失實之一眚而遂至於殺也此秦人餘毒先漢所不能革者光武今日而尚忍襲之乎雖然人之本心未嘗不善狃於習俗亂於血氣是以輕舉妄動而不自覺一旦心平氣定事過理明未有不翻然悔者齊宣王不忍牛之觳觫而孟子指是心足以王故善告君者惟恐其不悔惟恐啓迪之無其機光武甚恨之言正本心之所發露有能於此乘其一悔而攻之及其善端方萌而感發之即帝舜之好生即天地之大德抽關發鑰正在此時惜乎馬援學非王佐無以為啓迪之道僅使光武發一大笑良可悲夫郭后寵衰數懷怨懟上怒之冬十月辛巳廢皇后郭氏立貴人隂氏為皇后詔曰異常之事非國休福不得上夀稱慶郅惲言於帝曰臣聞夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也帝進郭后子右翊公輔為中山王以常山郡益中山國郭后為中山太后其餘九國公皆為王甚矣人主不可有所溺也髙帝奪於偏愛欲易太子卒稔吕后之禍幾危劉氏之社稷光武亦嘗有見於此否乎后猶坤也配天行健豈可易動長子震也為國主器豈可輕搖非有大罪皆當含忍為社稷深長之計安得以寵衰之故而輒廢皇后且併與太子而易之哉光武尚憶宋𢎞之言有愧多矣愚嘗謂帝之竒愛東海公者廢郭氏之候也立隂貴人者廢太子之機也自今觀之隂氏雖賢后而太子強亦初不見其罪三代而降皇極不建以是賊天倫禍人道者往往而是為人主者曷亦謹所處哉光武異時從朱祜之請而降王爵是矣今才五年輒自亂之是何舉措之易也至若以郭后為中山太后尤大可怪故諸侯王殁而子嗣立則母為太后耳中山王輔帝子也郭氏帝后也今后雖廢帝固無恙果何從而有太后之稱乎此足以驗帝之懷慙明后之無罪溺情妄動舉措乖方而不暇顧其非是也是嵗莎車王賢復遣使奉獻請都護帝賜賢西域都護印綬及車旗黃金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都護移書諸國諸國悉服屬焉先王盛時內外有截所以嚴夷夏之辨猶天冠地履之不可易置也來者不拒去者不追安用建官以領護之哉後世德不足以懷逺而與之爭勝負於強弱之間方其衰也求助之不暇及其盛也侵暴之無厭界分陵遲紀綱板蕩日消月靡卒致亂華皆由其初貪威服四夷之名而失中國之所以為尊故也上下世變可為哀痛者多矣然則都護之建無乃啓戎心開邊釁之端乎異時光武絶之是矣而今復興之既興之矣而又奪之不特失信於四夷亦且失威於中國安敢以為是也十九年帝以太子舅隂識守執金吾隂興為衛尉皆輔導太子識性忠厚入雖極言正議及與賔客語未嘗及國事帝敬重之常指識以敕戒貴戚激厲左右焉興雖禮賢好施而門無逰俠與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠愚觀先漢外戚之禍有不忍言者故於二隂實行每每喜聞而樂道之嗚呼可為后族之標準矣然光武必以母舅輔導太子此却未安謂其賢而使輔之耶則天下之賢者何止隂氏以太子初立而託於所親耶是植外戚樹黨與以自固尤不可也疏廣有曰太子國副儲副君師友必於天下英俊不宜獨親外家此其為慮逺矣二十年帝苦風眩疾甚以隂興領侍中受顧命於雲臺廣室會疾瘳召見興欲以代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可茍冒至誠發中感動左右帝遂聽之光武之顧命何其與成王異也成王所授以託孤者召公畢公而必同召六卿以及師氏虎臣百尹御事咸在冕服憑几道揚末命恢乎正大與天下共之安得以宗廟社稷之重寄而獨私之一母舅哉夫以隂興之賢而亦慮不及此良可歎也至若大司馬之命錯謬尤甚向非虧損聖德之言足以感動則異時元舅所以階禍者光武且授之柄而不暇計矣為人君者可不戒諸二十七年朗陵侯臧宫楊虛侯馬武上書曰胸奴貪利無有禮信窮則稽首安則侵盜虜今人畜疫死旱蝗赤地疲困之力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文德而墮武事乎今命將臨塞厚縣購賞喻告高句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黃石公記曰柔能制剛弱能制強舍近謀逺者勞而無功舍逺謀近者逸而有終故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚強而屯田警備傳聞之事恆多失實誠能舉天下之半以滅大寇豈非至願茍非其時不如息民自是諸將莫敢復言兵事者光武屢辭西域都護之請後雖置烏桓校尉使胸奴中郎將之類皆迫於不得已焉者蓋其志在偃武與天下休息窮征逺討逞雄心於四夷非其所願也觀國無善政災變不息茍非其時不如息民數語辭旨惻怛藹然有王者氣象漢髙帝唐太宗皆不及矣為人君者反復斯旨其毋輕動於宫武之言哉二十八年春正月己巳徙魯王興為北海王以魯益東海帝以東海王強去就有禮故優以大封食二十九縣賜虎賁旄頭設鐘虡之樂擬於乘輿石碏有曰愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也光武於是不度矣且強之為太子也茍知其賢則不可廢既已廢之奈之何過制踰分姑息以示恩乎此淮南厲王之所以死也幸強謙恭不及於禍耳授之以柄階之為厲豈貽謀燕翼之道哉上大會羣臣問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔大子也今博士不難正朕况太子乎即拜佚為太子太傅以博士桓榮為太傅張佚之言掃除光武偏私之病正破的太子初立既委舅氏以輔導至於疾甚又託舅氏以顧命此其所見與田舍翁無異今且十載忽大會羣臣而謀太子傅豈亦悟往事之非邪在廷無識猶未免以私意窺上皆由前日之舉措有以啓諂諛之路也然則徇一人之獨見而不能博詢天下之公議安得立談之頃破十載之私哉三十年春二月車駕東巡羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汙七十二代之編録若郡縣逺遣吏上夀盛稱虛美必髠令屯田於是羣臣不敢復言光武聞北伐之議則謂國無善政人不自保何復逺事邊外及聞封禪之請則云百姓怨氣滿腹吾誰欺欺天乎此二事武帝一生馳騖竭天下之膏血而不知止者光武一反其所趨而惟民生之是急可謂篤實務本之主矣後三年乃有感於符讖而封禪興焉抑何執德之不固而初心之易惑也三復欺天之語果不欺已乎中元二年二月戊戌帝崩於南宫帝每旦視朝日昃乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黃老養性之福願頥愛精神優遊自寧帝曰我自樂此不為疲也孟子曰存其心養其性所以事天也心本未嘗不存也昏於意念動於物欲是以冥冥妄行日用而不自知則其謂之不存也亦宜矣本心汨焉而性失其養矣惟夫一念不起百慮澄然清明渾融全體皆妙雖日用交錯縱橫萬變而此心未嘗不正非心之外又有性也亦豈他有所謂養哉古聖相傳初無二道安汝止惟幾惟康禹之所以養性也不邇聲色不殖貨利湯之所以養性也去聖逾逺異端滋熾漢之君臣號為知學者往往以黃老為宗故論養性則專言黃老不知吾聖人之學果安所用其力也明帝即位未幾而佛入中國其禍根蓋自黃老始佛入中國而堯舜禹湯文武周孔之家法愈不明矣悲夫右光武在位三十三年崩年六十二明帝永平二年冬十月壬子上幸辟雍初行養老禮以李躬為三老桓榮為五更三老服都紵大袍冠進賢扶玉杖五更亦如之不杖乘輿到辟雍禮殿御坐東廂遣使者安車迎三老五更於大學講堂天子迎於門屏交禮道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝鯁在前祝饐在後五更南面三公進供禮亦如之禮畢引桓榮及弟子升堂上自為下説諸儒執經問難於前冠帶搢紳之人圜橋門而觀聽者蓋億萬計於是下詔賜榮爵關內侯三老五更皆以二千石祿養終厥身賜天下三老酒人一石肉四十斤上自為太子受尚書於桓榮及即帝位猶尊榮以師禮嘗幸太常府令榮坐東面設几杖會百官及榮門生數百人上親自執業諸生或避位發難上謙曰太師在是既罷悉以太官供具賜太常家榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜牀下榮卒上親自變服臨喪送葬賜冢塋于首山之陽子郁當嗣讓其兄子泛帝不許郁乃受封而悉以租入與之帝以郁為侍中明帝尊師之意其禮文亦可謂盛矣因念孔孟皇皇於春秋戰國而卒不遇於斯時也而有真儒洞明正學引其君於當道則其所進豈魯定哀齊宣梁惠之比哉桓榮為帝者師屈天子之尊推崇敬禮無所不備而卒無以發揚聖教啓迪君心使斯道大明於天下身被恩寵徒為文具良可嗟夫四年陵鄉侯梁松生怨望縣飛書誹謗下獄死初上為太子大中大夫鄭興子衆以通經知名太子及山陽王荆因梁松以縑帛請之衆曰太子儲君無外交之義漢有舊防蕃王不宜私通賔客松曰長者意不可違衆曰犯禁觸罪不如守正而死遂不往及松敗賔客多坐之唯衆不染於辭公卿士大夫猶知為子擇師訓以道義不使私交於外以亂其所趨况天子之子國之儲二乎異時博望苑可以鑒矣志謂尹公端人其取友必端觀梁松誣譛伏波傾險如許而使之得以之招致賔客何也鄭衆立志堅確發言正大真可垂戒於後豈特免禍於一已而已哉六年春二月王雒山出寶鼎獻之夏四月甲子詔祥瑞之降以應有德方今政化多僻何以致兹易曰鼎象三公豈公卿奉職得其理邪其賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也武帝得鼎汾水上改元元鼎以侈其事按是時張湯為御史大夫與史義縱王溫舒之徒峻刑酷罰民不聊生論囚輒流血十餘里坐盜鑄死者動數十萬此其氣象大略可睹矣寶鼎之出豈有所感召而致之歟前年丞相蔡義坐盜園堧自殺明年張湯亦有罪自殺又豈可以為鼎象三公之應也自古明王惟知施德行化安養生民為己任君子在野小人在位政不平刑不清禾黍不登邊方不寧天地之間戾氣熏塞或者偶發異代之埋藏而遂指之以為瑞果誰欺哉明帝下詔示不敢當視孝武之改元則有間矣然未免歸美於公卿之得其理而褒賚之又何也八年冬十月楚王英奉黃縑白紈詣國相曰託在蕃輔過惡纍積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黃老之微言尚浮屠之仁慈潔齊三月與神為誓何嫌何疑尚有悔吝其還贖以助伊蒲塞桑門之盛饌初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之武王曰惟人萬物之靈孔子曰心之精神是謂聖人之本心本靈本聖顧所以用之者何如耳隆古聖時有井田以為養有庠序以為學有冠昏喪祭以為禮至於蠻夷猾夏則刑之讒説殄行震驚朕師則急急而止絶之不用靈者如怪物然投之逺裔不齒於中國要在保養此心不失其所謂靈而已是故世教昌明風俗醇一耳目無所亂心志無所蕩其秀異而傑出者則固修德學道為賢為聖農夫小民婦人女子雖日用此心之靈而不知亦莫不習於禮義之化人人有士君子之行異端邪説無自而興三代衰學校廢凡先王教化之道掃地而亡之乃無一事非邪僻壞亂人心之具巧者逞其語勇者逞其力佞者逞其辨諸夏無君天地分裂橫流奔放不可救止孔子生春秋之末僅與其徒私相傳授而道卒不行於天下老氏為周柱史固習於禮者遭世敗壞不能如之何思所以獨善其身用其靈而偏焉乃謂禮為忠信之薄亂之首異端之教由此其根然在當時害猶未著也至于戰國孟軻氏獨守洙泗之家法談王道矻矻不離口不特時君咸謂之迂闊雖其髙第弟子亦且未能盡信矣此無他皇極不建聖教不明學士大夫耳濡目染腐爛焦灼但知有管晏但知有蘇張申韓而不知孔孟之學為堯舜禹湯文武周公之大道也冥冥憒憒以妄為常渾然一波天下大亂然人心之靈未嘗泯滅其間所謂秀異而傑出者不肯甘心淪沒於流俗退而窮居特立獨行思有以反一世之弊而無聖人為之依歸以端其所趨於是楊墨者出或主於為我或主於兼愛用其靈而益又偏焉雖然是豈浮沈世態混混汗濁無恥者之儔哉自當世觀之固大賢也自吾道言之則為大害耳故孟子於儀秦輩止目以妾婦而未嘗與之深辨至楊墨則明目張膽而力排之自其兼愛而推極於無父自其為我而推極於無君無父無君直譬之禽獸蓋刑名縱橫雖為斯世之害而兼愛為我則為斯道之害害世者人惡之害道者人溺之惡之者禍止於一時溺之者禍及於萬世夫養生喪死無憾而不怵於禍福則庶乎其有瘳矣乃若支離傳注膠執文義本心之靈未嘗自得與日用而不知者同一生死但呶呶然曰人其人火其書廬其居無益也壬寅晦日有食之既詔羣臣勉修職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官詔曰羣僚所言皆朕之過民寃不能理吏黠不能禁而輕用民力繕修宫宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄德久而致怠耳人主不患有過患不樂聞過不患不求言患不能受盡言明帝一覽封章深自引咎敷露心腹明白洞達夫如是誰不樂告以善道哉外慕求言之名中懷諱過之實不特君德無補天地鬼神又烏可以文欺也九年帝崇尚儒學自皇太子諸王侯及人臣子弟功臣子孫莫不受經又為外戚樊氏郭氏隂氏馬氏諸子立學於南宫號四姓小侯置五經師搜選高能以授其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學帝崇儒學自皇太子諸王侯而下莫不受經非不美矣然楚王英好黃老浮屠乃從臾之而不能救卒與方士造成大獄廣陵王荆淮陽王延亦皆所交非類祝詛不道所以受經者果為何事耶要之親王出就蕃國為擇老成有學識者為之師傅使知敬憚不納於邪小人之謀無自而入方為盡善若使年少不學驕縱於外而莫之檢非保終吉之道也明帝兄弟十人而三人者不以令終至若楚獄殺戮無數殆有不忍言者而帝友于之義亦且不能如初歲矣區區講受為文具何益哉十年春二月廣陵思王荆自殺國除夏四月戊子大赦天下閏月甲午上幸南陽召校官弟子作雅樂奏鹿鳴帝自御塤篪和之以娛嘉賓還幸南頓甲午還宫間歌合樂工人之事也安有天子而自娛嘉賓者且廣陵之死才三月耳而帝御塤篪以和之得無傷兄弟之情邪十一年春正月東平王蒼與諸王俱來朝月餘還國帝臨送歸宫悽然懷思乃遣使手詔賜東平國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以增歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五歲已上能趨拜者皆令帶之東平王自謂為善最樂此實履之言也嗚呼為善具足以為樂哉人心本良人性本善若有常性自善自樂焉曰惠迪吉非他有所謂吉也所樂即吉也伊尹曰作善降之百祥不必他求所謂祥也此樂即祥也每見吉人孳孳為善安行乎順境心逸而日休食息起居無非樂地至若凶人習為不善雖處廣厦如坐囹圄雖履夷塗如行荆棘終日憂勞終夜憂勞終身憂勞如萬刃攢心而不知悔也樂乎不樂乎何苦而不為善乎故曰君子坦蕩蕩小人長戚戚北海王睦雖號畏謹遣使朝賀乃託辭於聲色犬馬之好以自詭其意欲朝廷不疑耳為善最樂何嫌何疑帝遵奉建武制度無所變更后妃之家不得封侯與政館陶公主為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里茍非其人則民受其殃是以難之守宰號親民之官而宰為尤親茍非其人民受其殃此必至之禍也後世限以舉貟而改官者求必公選至於任而得京官者出宰百里殆可日計何暇論其賢不肖哉明帝之言可為鑒矣后妃之家封侯與政此尤漢室大弊隂氏兄弟懇懇辭避而光武不能革至明帝能革之但列侯十九印令諸王子五歲已上皆帶則大不然史謂成王以桐葉戲小弱弟曰以封汝周公因入賀封于唐栁宗元力辨記者之繆是也以印戲與小弱者為之知周公必無是也明帝儻未忘廣陵之死恩懷諸王豈無其道而乃褻名器於羣稚若弄具然者是奚可哉右明帝在位十八年崩年四十八兩漢筆記卷九
